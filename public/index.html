                                    {(filtroCategorias.length > 0 ? 1 : 0) + (filtroDataInicio || filtroDataFim ? 1 : 0) + (filtroConta ? 1 : 0) + (filtroReembolsavel ? 1 : 0)}
                                </span>
                            )}
                        </button>
                        {temFiltroAtivo && (
                            <button
                                className="button button-secondary"
                                onClick={limparFiltros}
                                style={{ fontSize: '0.8rem', padding: '0.5rem 0.75rem', color: '#ef4444' }}
                            >
                                Limpar filtros
                            </button>
                        )}
                        <div style={{ marginLeft: 'auto' }}>
                            <button className="button button-primary" onClick={openNew}>+ Novo Lançamento</button>
                        </div>
                    </div>

                    {/* Painel de filtros expandido */}
                    {showFiltros && (
                        <div className="card" style={{ marginBottom: '1rem', padding: '1rem 1.25rem' }}>
                            {/* Atalhos de período */}
                            <div style={{ marginBottom: '0.85rem' }}>
                                <label className="form-label" style={{ fontSize: '0.8rem', marginBottom: '0.4rem' }}>Período</label>
                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.35rem' }}>
                                    {periodosPreset.map(p => (
                                        <button
                                            key={p.key}
                                            onClick={() => aplicarPeriodo(p.key)}
                                            style={{
                                                padding: '0.3rem 0.7rem',
                                                borderRadius: '999px',
                                                border: filtroPeriodo === p.key ? '1.5px solid #3b82f6' : '1px solid #e2e8f0',
                                                background: filtroPeriodo === p.key ? '#eff6ff' : '#fff',
                                                color: filtroPeriodo === p.key ? '#2563eb' : '#64748b',
                                                cursor: 'pointer',
                                                fontSize: '0.78rem',
                                                fontWeight: filtroPeriodo === p.key ? '600' : '400',
                                                transition: 'all 0.15s'
                                            }}
                                        >{p.label}</button>
                                    ))}
                                </div>
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '1rem', marginBottom: '1rem' }}>
                                <div>
                                    <label className="form-label" style={{ fontSize: '0.8rem' }}>Data início</label>
                                    <input type="date" className="form-input" value={filtroDataInicio} onChange={e => { setFiltroDataInicio(e.target.value); setFiltroPeriodo(''); }} style={{ margin: 0, fontSize: '0.85rem' }} />
                                </div>
                                <div>
                                    <label className="form-label" style={{ fontSize: '0.8rem' }}>Data fim</label>
                                    <input type="date" className="form-input" value={filtroDataFim} onChange={e => { setFiltroDataFim(e.target.value); setFiltroPeriodo(''); }} style={{ margin: 0, fontSize: '0.85rem' }} />
                                </div>
                                <div>
                                    <label className="form-label" style={{ fontSize: '0.8rem' }}>Conta</label>
                                    <select className="form-input" value={filtroConta} onChange={e => setFiltroConta(e.target.value)} style={{ margin: 0, fontSize: '0.85rem' }}>
                                        <option value="">Todas as contas</option>
                                        {data.contas.filter(c => c.status !== 'arquivada').map(c => (
                                            <option key={c.id} value={c.id}>{c.nome}</option>
                                        ))}
                                    </select>
                                </div>
                                <div>
                                    <label className="form-label" style={{ fontSize: '0.8rem' }}>Reembolsável</label>
                                    <select className="form-input" value={filtroReembolsavel} onChange={e => setFiltroReembolsavel(e.target.value)} style={{ margin: 0, fontSize: '0.85rem' }}>
                                        <option value="">Todos</option>
                                        <option value="sim">Somente reembolsáveis</option>
                                        <option value="nao">Somente não reembolsáveis</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="form-label" style={{ fontSize: '0.8rem', marginBottom: '0.5rem' }}>Categorias</label>
                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.4rem' }}>
                                    {data.categorias.map(cat => {
                                        const ativo = filtroCategorias.includes(cat.id);
                                        return (
                                            <button
                                                key={cat.id}
                                                onClick={() => toggleCategoria(cat.id)}
                                                style={{
                                                    padding: '0.3rem 0.65rem',
                                                    borderRadius: '999px',
                                                    border: ativo ? '1.5px solid #3b82f6' : '1px solid #e2e8f0',
                                                    background: ativo ? '#eff6ff' : '#fff',
                                                    color: ativo ? '#2563eb' : '#64748b',
                                                    cursor: 'pointer',
                                                    fontSize: '0.78rem',
                                                    fontWeight: ativo ? '600' : '400',
                                                    transition: 'all 0.15s'
                                                }}
                                            >
                                                {cat.emoji} {cat.nome}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                            {filtered.length !== data.lancamentos.length && (
                                <div style={{ marginTop: '0.75rem', fontSize: '0.8rem', color: '#64748b' }}>
                                    Mostrando {filtered.length} de {data.lancamentos.length} lançamentos
                                </div>
                            )}
                        </div>
                    )}

                    {/* Barra de resumo */}
                    {sorted.length > 0 && (() => {
                        const totalDespesas = sorted.filter(l => isDespesaReal(l)).reduce((s, l) => s + l.valor, 0);
                        const totalReceitas = sorted.filter(l => isReceitaReal(l)).reduce((s, l) => s + l.valor, 0);
                        const totalEstornos = sorted.filter(l => l.tipo === 'estorno').reduce((s, l) => s + l.valor, 0);
                        const saldo = totalReceitas + totalEstornos - totalDespesas;
                        // Top categorias no filtro atual
                        const catMap = {};
                        sorted.filter(l => isDespesaReal(l)).forEach(l => {
                            const cid = l.categoria_id || '_sem';
                            catMap[cid] = (catMap[cid] || 0) + l.valor;
                        });
                        const topCats = Object.entries(catMap)
                            .sort((a, b) => b[1] - a[1])
                            .slice(0, 3)
                            .map(([cid, val]) => {
                                const cat = data.categorias.find(c => c.id === cid);
                                return { nome: cat ? `${cat.emoji} ${cat.nome}` : 'Sem categoria', val };
                            });

                        return (
                            <div style={{
                                display: 'flex', flexWrap: 'wrap', gap: '0.75rem', marginBottom: '1rem',
                                padding: '0.75rem 1rem', borderRadius: '10px',
                                background: temFiltroAtivo ? '#f0f9ff' : '#f8fafc',
                                border: temFiltroAtivo ? '1px solid #bfdbfe' : '1px solid #f1f5f9',
                                alignItems: 'center', fontSize: '0.82rem'
                            }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                    <span style={{ color: '#64748b', fontWeight: '500' }}>{sorted.length} lançamentos</span>
                                </div>
                                <div style={{ width: '1px', height: '20px', background: '#e2e8f0' }}></div>
                                {totalDespesas > 0 && (
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.3rem' }}>
                                        <span style={{ color: '#ef4444', fontWeight: '700', fontSize: '0.9rem' }}>-{formatCurrency(totalDespesas)}</span>
                                        <span style={{ color: '#94a3b8', fontSize: '0.75rem' }}>despesas</span>
                                    </div>
                                )}
                                {totalReceitas > 0 && (
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.3rem' }}>
                                        <span style={{ color: '#16a34a', fontWeight: '700', fontSize: '0.9rem' }}>+{formatCurrency(totalReceitas)}</span>
                                        <span style={{ color: '#94a3b8', fontSize: '0.75rem' }}>receitas</span>
                                    </div>
                                )}
                                {totalEstornos > 0 && (
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.3rem' }}>
                                        <span style={{ color: '#16a34a', fontWeight: '600', fontSize: '0.85rem' }}>+{formatCurrency(totalEstornos)}</span>
                                        <span style={{ color: '#94a3b8', fontSize: '0.75rem' }}>estornos</span>
                                    </div>
                                )}
                                {(totalReceitas > 0 || totalEstornos > 0) && totalDespesas > 0 && (() => {
                                    // Calcular saldo real das contas (saldo_base + net de todas as transações)
                                    const contasRelevantes = filtroConta
                                        ? data.contas.filter(c => c.id === filtroConta)
                                        : data.contas.filter(c => c.status !== 'arquivada');
                                    const saldoBaseContas = contasRelevantes.reduce((s, c) => s + (Number(c.saldo) || 0), 0);
                                    const netTodasTransacoes = data.lancamentos
                                        .filter(l => !filtroConta || l.conta_origem === filtroConta)
                                        .reduce((s, l) => {
                                            if (l.tipo === 'receita' || l.tipo === 'estorno') return s + l.valor;
                                            if (l.tipo === 'despesa') return s - l.valor;
                                            return s;
                                        }, 0);
                                    const saldoEmConta = Math.round((saldoBaseContas + netTodasTransacoes) * 100) / 100;
                                    return (
                                    <>
                                        <div style={{ width: '1px', height: '20px', background: '#e2e8f0' }}></div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.3rem' }}>
                                            <span style={{ fontWeight: '700', fontSize: '0.9rem', color: saldo >= 0 ? '#16a34a' : '#ef4444' }}>
                                                {saldo >= 0 ? '+' : ''}{formatCurrency(saldo)}
                                            </span>
                                            <span style={{ color: '#94a3b8', fontSize: '0.75rem' }}>resultado</span>
                                        </div>
                                        <div style={{ width: '1px', height: '20px', background: '#e2e8f0' }}></div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.3rem' }}>
                                            <span style={{ fontWeight: '700', fontSize: '0.9rem', color: saldoEmConta >= 0 ? '#1e40af' : '#ef4444' }}>
                                                {formatCurrency(saldoEmConta)}
                                            </span>
                                            <span style={{ color: '#94a3b8', fontSize: '0.75rem' }}>saldo em conta</span>
                                        </div>
                                    </>
                                    );
                                })()}
                                {temFiltroAtivo && topCats.length > 0 && (
                                    <>
                                        <div style={{ width: '1px', height: '20px', background: '#e2e8f0' }}></div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', flexWrap: 'wrap' }}>
                                            {topCats.map((c, i) => (
                                                <span key={i} style={{ color: '#475569', fontSize: '0.78rem' }}>
                                                    {c.nome} <strong>{formatCurrency(c.val)}</strong>
                                                </span>
                                            ))}
                                        </div>
                                    </>
                                )}
                            </div>
                        );
                    })()}

                    <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
                        {sorted.length === 0 ? (
                            <div style={{ textAlign: 'center', padding: '3rem', color: '#94a3b8' }}>
                                <p style={{ fontSize: '2rem', margin: '0 0 0.5rem 0' }}>{temFiltroAtivo ? '🔍' : '📭'}</p>
                                <p style={{ margin: 0 }}>{temFiltroAtivo ? 'Nenhum lançamento encontrado com os filtros aplicados.' : 'Nenhum lançamento. Clique em "+ Novo Lançamento" acima.'}</p>
                                {temFiltroAtivo && <button className="button button-secondary" onClick={limparFiltros} style={{ marginTop: '0.75rem', fontSize: '0.85rem' }}>Limpar filtros</button>}
                            </div>
                        ) : (
                            <table className="table">
                                <thead className="table-header">
                                    <tr>
                                        <th style={{ width: '40px', textAlign: 'center' }}>
                                            <input type="checkbox"
                                                checked={sorted.length > 0 && sorted.every(t => selecionados.has(t.id))}
                                                onChange={() => selecionarTodos(sorted.map(t => t.id))}
                                                style={{ width: '16px', height: '16px', cursor: 'pointer', accentColor: '#3b82f6' }} />
                                        </th>
                                        <th>Data</th>
                                        <th>Descrição</th>
                                        <th>Categoria</th>
                                        <th>Valor</th>
                                        <th>Conta</th>
                                        <th style={{ width: '90px', textAlign: 'center' }}>Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {sorted.map(t => {
                                        const cat = getCategoryById(data.categorias, t.categoria_id);
                                        const conta = getAccountById(data.contas, t.conta_origem);
                                        const isSelected = selecionados.has(t.id);
                                        return (
                                            <tr key={t.id} className="table-row"
                                                style={{ background: isSelected ? '#eff6ff' : 'transparent', transition: 'background 0.1s' }}>
                                                <td style={{ textAlign: 'center' }}>
                                                    <input type="checkbox"
                                                        checked={isSelected}
                                                        onChange={() => toggleSelecionado(t.id)}
                                                        style={{ width: '16px', height: '16px', cursor: 'pointer', accentColor: '#3b82f6' }} />
                                                </td>
                                                <td>{formatDate(t.data)}</td>
                                                <td>
                                                    {t.descricao}
                                                    {(t.reembolsavel === 'sim' || t.reembolsavel === true) && (
                                                        <span style={{
                                                            marginLeft: '0.4rem', fontSize: '0.68rem', fontWeight: '600',
                                                            background: '#e0e7ff', color: '#4f46e5', padding: '0.1rem 0.4rem',
                                                            borderRadius: '4px', verticalAlign: 'middle'
                                                        }}>reembolsável</span>
                                                    )}
                                                </td>
                                                <td>{cat ? `${cat.emoji} ${cat.nome}` : (t.tipo === 'transferencia_interna' ? '↔ Transferência entre contas' : '—')}</td>
                                                <td style={{ fontWeight: '600', color: t.tipo === 'receita' || t.tipo === 'estorno' ? '#16a34a' : t.tipo === 'transferencia_interna' ? '#6366f1' : '#ef4444' }}>
                                                    {t.tipo === 'receita' || t.tipo === 'estorno' ? '+' : t.tipo === 'transferencia_interna' ? '↔ ' : '-'}{formatCurrency(t.valor)}
                                                </td>
                                                <td>{conta?.nome || t.conta_origem}{t.tipo === 'transferencia_interna' && t.conta_destino ? ` → ${getAccountById(data.contas, t.conta_destino)?.nome || t.conta_destino}` : ''}</td>
                                                <td style={{ textAlign: 'center' }}>
                                                    <button style={{ background: 'none', border: 'none', color: '#3b82f6', cursor: 'pointer', fontSize: '0.8rem', fontWeight: '600', marginRight: '0.5rem' }}
                                                        onClick={() => openEdit(t)}>✏️</button>
                                                    <button style={{ background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer', fontSize: '0.8rem', fontWeight: '600' }}
                                                        onClick={() => handleDelete(t.id)}>🗑️</button>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        )}
                    </div>
                    {/* Barra de ações em lote (floating) */}
                    {selecionados.size > 0 && (
                        <div style={{
                            position: 'fixed', bottom: '24px', left: '50%', transform: 'translateX(-50%)',
                            background: '#0f172a', color: '#fff', borderRadius: '14px',
                            padding: '0.7rem 1.25rem', display: 'flex', alignItems: 'center', gap: '0.75rem',
                            boxShadow: '0 8px 32px rgba(0,0,0,0.25)', zIndex: 1000,
                            animation: 'slideUp 0.2s ease-out', minWidth: '400px', flexWrap: 'wrap'
                        }}>
                            {/* Counter */}
                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginRight: '0.5rem' }}>
                                <span style={{
                                    background: '#3b82f6', borderRadius: '999px', padding: '0.15rem 0.65rem',
                                    fontSize: '0.82rem', fontWeight: '700', minWidth: '24px', textAlign: 'center'
                                }}>{selecionados.size}</span>
                                <span style={{ fontSize: '0.82rem', color: '#94a3b8' }}>selecionado{selecionados.size > 1 ? 's' : ''}</span>
                            </div>

                            {/* Separator */}
                            <div style={{ width: '1px', height: '24px', background: '#334155' }}></div>

                            {/* Alterar Categoria */}
                            <div style={{ position: 'relative' }}>
                                <button onClick={() => setShowBulkCat(!showBulkCat)} disabled={bulkLoading}
                                    style={{
                                        background: '#1e3a5f', border: '1px solid #334155', color: '#fff', borderRadius: '8px',
                                        padding: '0.4rem 0.75rem', cursor: 'pointer', fontSize: '0.8rem', fontWeight: '500',
                                        display: 'flex', alignItems: 'center', gap: '0.35rem', transition: 'all 0.15s'
                                    }}>
                                    🏷️ Alterar categoria
                                </button>
                                {showBulkCat && (
                                    <div style={{
                                        position: 'absolute', bottom: '110%', left: 0,
                                        background: '#fff', borderRadius: '10px', boxShadow: '0 8px 24px rgba(0,0,0,0.18)',
                                        border: '1px solid #e2e8f0', padding: '0.5rem', minWidth: '220px', maxHeight: '300px',
                                        overflowY: 'auto', zIndex: 1001
                                    }}>
                                        <div style={{ padding: '0.3rem 0.5rem', fontSize: '0.72rem', color: '#94a3b8', fontWeight: '600', textTransform: 'uppercase', borderBottom: '1px solid #f1f5f9', marginBottom: '0.25rem' }}>
                                            Escolha a categoria
                                        </div>
                                        {data.categorias.map(c => (
                                            <div key={c.id}
                                                onClick={() => { handleBulkCategoria(c.id); setShowBulkCat(false); }}
                                                style={{
                                                    padding: '0.45rem 0.6rem', cursor: 'pointer', borderRadius: '6px',
                                                    fontSize: '0.85rem', display: 'flex', alignItems: 'center', gap: '0.4rem',
                                                    transition: 'background 0.1s'
                                                }}
                                                onMouseEnter={e => e.currentTarget.style.background = '#f0f9ff'}
                                                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                                                <span>{c.emoji}</span> <span>{c.nome}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* Remover Categoria */}
                            <button onClick={handleBulkRemoverCategoria} disabled={bulkLoading}
                                style={{
                                    background: '#1e3a5f', border: '1px solid #334155', color: '#fbbf24', borderRadius: '8px',
                                    padding: '0.4rem 0.75rem', cursor: 'pointer', fontSize: '0.8rem', fontWeight: '500',
                                    display: 'flex', alignItems: 'center', gap: '0.35rem', transition: 'all 0.15s'
                                }}>
                                🚫 Remover categoria
                            </button>

                            {/* Separator */}
                            <div style={{ width: '1px', height: '24px', background: '#334155' }}></div>

                            {/* Excluir */}
                            <button onClick={handleBulkDelete} disabled={bulkLoading}
                                style={{
                                    background: '#7f1d1d', border: '1px solid #991b1b', color: '#fecaca', borderRadius: '8px',
                                    padding: '0.4rem 0.75rem', cursor: 'pointer', fontSize: '0.8rem', fontWeight: '600',
                                    display: 'flex', alignItems: 'center', gap: '0.35rem', transition: 'all 0.15s'
                                }}>
                                🗑️ Excluir {selecionados.size > 1 ? `(${selecionados.size})` : ''}
                            </button>

                            {/* Cancelar */}
                            <button onClick={limparSelecao}
                                style={{
                                    background: 'none', border: 'none', color: '#94a3b8', cursor: 'pointer',
                                    fontSize: '0.78rem', marginLeft: 'auto', padding: '0.3rem 0.5rem'
                                }}>
                                ✕ Cancelar
                            </button>

                            {/* Loading indicator */}
                            {bulkLoading && (
                                <div style={{ position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(15,23,42,0.85)', borderRadius: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.85rem' }}>
                                    Processando...
                                </div>
                            )}
                        </div>
                    )}

                    {lancModal}
                </div>
            );
        }

        // Categories Component
        function Categorias({ data, actions }) {
            const [showModal, setShowModal] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({ nome: '', emoji: '', teto: 0, grupo: 'despesa', tipo: 'despesa' });
            const [criandoBase, setCriandoBase] = useState(false);

            // [id, nome, emoji, teto, grupo, tipo]
            // grupo: 'essencial', 'variavel', 'fixa', 'transporte', 'receita', 'financeiro'
            // tipo: 'despesa', 'receita', 'transferencia'
            // Lista definitiva - renda referência: R$ 10.000/mês
            const categoriasDefault = [
                // === DESPESAS DO DIA A DIA ===
                ['cat01', 'Supermercado', '🛒', 2000, 'despesa', 'despesa'],
                ['cat02', 'Restaurantes', '🍽️', 800, 'despesa', 'despesa'],
                ['cat03', 'Combustível', '⛽', 600, 'despesa', 'despesa'],
                ['cat04', 'Transporte', '🚕', 300, 'despesa', 'despesa'],
                ['cat05', 'Saúde', '🏥', 500, 'despesa', 'despesa'],
                ['cat06', 'Pet', '🐾', 200, 'despesa', 'despesa'],
                ['cat07', 'Educação', '📚', 1000, 'despesa', 'despesa'],
                ['cat08', 'Lazer', '🎬', 400, 'despesa', 'despesa'],
                ['cat09', 'Compras Pessoais', '🛍️', 300, 'despesa', 'despesa'],
                ['cat10', 'Casa', '🏠', 500, 'despesa', 'despesa'],
                ['cat11', 'Assinaturas', '📱', 250, 'despesa', 'despesa'],
                ['cat12', 'Seguros', '🛡️', 400, 'despesa', 'despesa'],
                ['cat13', 'Impostos', '📋', 500, 'despesa', 'despesa'],
                ['cat14', 'Viagens', '✈️', 500, 'despesa', 'despesa'],
                ['cat15', 'Presentes', '🎁', 200, 'despesa', 'despesa'],
                ['cat30', 'Outras Despesas', '📦', 0, 'despesa', 'despesa'],
                // === MORADIA E CONTAS FIXAS ===
                ['cat22', 'Moradia / Aluguel', '🏡', 2000, 'despesa', 'despesa'],
                ['cat23', 'Água', '💧', 120, 'despesa', 'despesa'],
                ['cat24', 'Telefone / Celular', '📱', 100, 'despesa', 'despesa'],
                ['cat25', 'Energia', '💡', 200, 'despesa', 'despesa'],
                // === RECEITAS (sem teto padrão) ===
                ['cat16', 'Salário e Proventos', '💰', 0, 'receita', 'receita'],
                ['cat17', 'Pró-labore', '🏢', 0, 'receita', 'receita'],
                ['cat18', 'Freelance / Extra', '💼', 0, 'receita', 'receita'],
                ['cat19', 'Rendimentos', '📈', 0, 'receita', 'receita'],
                ['cat20', 'Outras Receitas', '💵', 0, 'receita', 'receita'],
                ['cat21', 'Lucros e Dividendos', '💎', 0, 'receita', 'receita'],
                // === FINANCEIRO / BANCÁRIO (sem teto padrão) ===
                ['cat26', 'Juros / IOF Bancário', '🏦', 0, 'financeiro', 'despesa'],
                ['cat27', 'Tarifa Bancária', '💳', 0, 'financeiro', 'despesa'],
                ['cat28', 'Pagamento Fatura Cartão', '💳', 0, 'financeiro', 'transferencia'],
                ['cat29', 'Financiamento / Dívidas', '💸', 0, 'financeiro', 'despesa'],
            ];

            // Mapeamento de tipo para label e cor da tag (prioridade: campo 'tipo', fallback: campo 'grupo')
            const tipoTag = {
                despesa:          { label: 'Despesa',        bg: '#fee2e2', color: '#dc2626' },
                receita:          { label: 'Receita',        bg: '#dcfce7', color: '#16a34a' },
                transferencia:    { label: 'Transferência',  bg: '#e0e7ff', color: '#4f46e5' },
            };
            // Fallback para categorias que ainda não têm o campo 'tipo' preenchido
            // Fallback: mapeia grupos antigos para os 3 tipos reais
            const grupoTag = {
                despesa:          tipoTag.despesa,
                receita:          tipoTag.receita,
                financeiro:       tipoTag.despesa,    // Juros, Tarifa, Financiamento = despesa real
                bancario:         tipoTag.despesa,
                pagamento_fatura: tipoTag.transferencia,
                essencial:        tipoTag.despesa,
                variavel:         tipoTag.despesa,
                transporte:       tipoTag.despesa,
                fixa:             tipoTag.despesa,
                poupanca:         tipoTag.despesa,
                sistema:          tipoTag.despesa,
            };
            // Resolver tag: usa campo 'tipo' se existir, senão cai no grupo
            const resolverTag = (cat) => {
                if (cat.tipo && tipoTag[cat.tipo]) return tipoTag[cat.tipo];
                return grupoTag[cat.grupo] || tipoTag.despesa;
            };

            const criarCategoriasDefault = async () => {
                setCriandoBase(true);
                try {
                    for (const [id, nome, emoji, teto, grupo, tipo] of categoriasDefault) {
                        if (actions && actions.salvarCategoria) {
                            await actions.salvarCategoria({ id, nome, emoji, teto, grupo, tipo });
                        }
                    }
                    alert('✅ Categorias padrão criadas com sucesso!');
                } catch (e) {
                    alert('❌ Erro ao criar categorias: ' + e.message);
                } finally {
                    setCriandoBase(false);
                }
            };

            const handleEdit = (cat) => {
                setEditingId(cat.id);
                setFormData({ nome: cat.nome, emoji: cat.emoji, teto: cat.teto, grupo: cat.grupo || 'despesa', tipo: cat.tipo || 'despesa' });
                setShowModal(true);
            };

            const handleSave = async () => {
                const cat = { ...formData };
                if (editingId) cat.id = editingId;
                if (actions && actions.salvarCategoria) await actions.salvarCategoria(cat);
                setShowModal(false);
                setEditingId(null);
            };

            const handleDelete = async (catId) => {
                const cat = data.categorias.find(c => c.id === catId);
                const lancsUsando = data.lancamentos.filter(l => l.categoria_id === catId).length;
                const msg = lancsUsando > 0
                    ? `A categoria "${cat?.nome}" tem ${lancsUsando} lançamento${lancsUsando > 1 ? 's' : ''} vinculado${lancsUsando > 1 ? 's' : ''}. Eles ficarão sem categoria. Deseja continuar?`
                    : `Tem certeza que deseja excluir a categoria "${cat?.nome}"?`;
                if (!confirm(msg)) return;
                if (actions && actions.deletarCategoria) await actions.deletarCategoria(catId);
                setShowModal(false);
                setEditingId(null);
            };

            return (
                <div className="page-transition">
                    <div className="page-header">
                        <h1>Categorias</h1>
                        <p>Organize seus gastos por categoria</p>
                    </div>

                    <div style={{ marginBottom: '2rem', display: 'flex', gap: '1rem', flexWrap: 'wrap', alignItems: 'center' }}>
                        <button className="button button-primary" onClick={() => setShowModal(true)}>
                            + Nova Categoria
                        </button>
                        <button className="button button-secondary" onClick={criarCategoriasDefault} disabled={criandoBase}>
                            📋 Importar categorias padrão
                        </button>
                    </div>

                    {data.categorias.length === 0 && (
                        <div className="card" style={{ textAlign: 'center', padding: '2rem', marginBottom: '2rem', background: '#f0f9ff', border: '2px solid #3b82f6' }}>
                            <p style={{ fontSize: '2.5rem', margin: '0 0 1rem 0' }}>📋</p>
                            <h3 style={{ margin: '0 0 0.5rem 0', fontSize: '1.2rem', fontWeight: '600', color: '#0f172a' }}>Nenhuma categoria criada</h3>
                            <p style={{ margin: '0 0 1.5rem 0', color: '#64748b' }}>Comece criando as categorias padrão para organizar melhor seus gastos</p>
                            <button className="button button-primary" onClick={criarCategoriasDefault} disabled={criandoBase} style={{ fontSize: '1rem', padding: '0.75rem 1.5rem' }}>
                                {criandoBase ? '⏳ Criando...' : '📋 Criar Categorias Padrão'}
                            </button>
                        </div>
                    )}

                    <div className="grid-2">
                        {data.categorias.map(cat => {
                            const tag = resolverTag(cat);
                            return (
                                <div key={cat.id} className="card" style={{ cursor: 'pointer' }} onClick={() => handleEdit(cat)}>
                                    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: '1rem' }}>
                                        <span style={{ fontSize: '2.5rem' }}>{cat.emoji}</span>
                                        <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                                            <span style={{
                                                fontSize: '0.75rem',
                                                fontWeight: '600',
                                                background: tag.bg,
                                                color: tag.color,
                                                padding: '0.3rem 0.6rem',
