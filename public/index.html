                                                TOTAL ({linhasValidas.length} lançamento{linhasValidas.length !== 1 ? 's' : ''} novo{linhasValidas.length !== 1 ? 's' : ''})
                                                {qtdDuplicadas > 0 && <span style={{ fontWeight: '400', color: '#94a3b8', fontSize: '0.75rem' }}> + {qtdDuplicadas} duplicado{qtdDuplicadas > 1 ? 's' : ''}</span>}
                                            </td>
                                            <td></td>
                                            <td></td>
                                            <td style={{ textAlign: 'right', fontWeight: '700', color: '#0f172a', fontSize: '1rem' }}>{formatCurrency(Math.abs(totalLiquido))}</td>
                                            <td></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <div style={{ marginTop: '1rem', display: 'flex', gap: '0.75rem', flexWrap: 'wrap' }}>
                                <div style={{ flex: 1, padding: '0.75rem', background: '#fffbeb', borderRadius: '8px', fontSize: '0.8rem', color: '#92400e' }}>
                                    💡 Lançamentos serão salvos como "pendente de confirmação" para você classificar depois.
                                </div>
                                {ehCartao ? (
                                    <div style={{ flex: 1, padding: '0.75rem', background: '#eff6ff', borderRadius: '8px', fontSize: '0.8rem', color: '#1e40af' }}>
                                        📌 Quando pagar a fatura na conta corrente, registre como "Pagamento de Fatura" (não como despesa) para evitar duplicidade.
                                    </div>
                                ) : (
                                    <div style={{ flex: 1, padding: '0.75rem', background: '#eff6ff', borderRadius: '8px', fontSize: '0.8rem', color: '#1e40af' }}>
                                        📌 Pagamentos de fatura de cartão aparecerão como saída no extrato. Classifique como "Pagamento de Fatura" para não contar como despesa duplicada.
                                    </div>
                                )}
                            </div>
                        </div>
                        );
                    })()}

                    {/* Histórico de importações */}
                    <div className="card">
                        <h3 style={{ margin: '0 0 1rem 0', fontSize: '1rem', fontWeight: '600' }}>📋 Histórico de Importações</h3>
                        {lotes.length === 0 ? (
                            <p style={{ color: '#94a3b8', fontSize: '0.9rem', textAlign: 'center', padding: '1.5rem' }}>
                                Nenhuma importação realizada ainda.
                            </p>
                        ) : (
                            <table className="table">
                                <thead className="table-header">
                                    <tr>
                                        <th>Data</th>
                                        <th>Arquivo</th>
                                        <th>Conta</th>
                                        <th style={{ textAlign: 'center' }}>Registros</th>
                                        <th>Lote</th>
                                        <th style={{ textAlign: 'center' }}>Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {lotes.sort((a, b) => String(b.data_importacao || '').localeCompare(String(a.data_importacao || ''))).map(l => (
                                        <tr key={l.id} className="table-row">
                                            <td>{formatDate(l.data_importacao)}</td>
                                            <td style={{ fontSize: '0.8rem' }}>{l.nome_arquivo}</td>
                                            <td>{(l.conta_id && data.contas.find(c => c.id === l.conta_id)?.nome) || l.conta_detectada}</td>
                                            <td style={{ textAlign: 'center', fontWeight: '600' }}>{l.linhas_importadas}</td>
                                            <td><span style={{ fontSize: '0.7rem', fontFamily: 'monospace', color: '#94a3b8' }}>{String(l.id).slice(-8)}</span></td>
                                            <td style={{ textAlign: 'center' }}>
                                                <button
                                                    style={{ background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer', fontSize: '0.8rem', fontWeight: '600' }}
                                                    onClick={() => { if (confirm('Apagar todos os ' + l.linhas_importadas + ' lançamentos deste lote?')) handleDeletarLote(l.id); }}
                                                    disabled={deletandoLote === l.id}>
                                                    {deletandoLote === l.id ? '⏳' : '🗑️ Apagar lote'}
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>

                    {/* Modal de Split de lançamento */}
                    {splitModal && (() => {
                        const valorOriginal = Number(splitModal.original.valor) || 0;
                        const soma = splitModal.partes.reduce((acc, p) => acc + (Number(p.valor) || 0), 0);
                        const diff = Math.round((soma - valorOriginal) * 100) / 100;
                        const somaOk = Math.abs(diff) <= 0.01;
                        const categoriasDisponiveis = data.categorias.filter(c => c.tipo !== 'transferencia');
                        return (
                            <div className="modal-overlay" onClick={() => setSplitModal(null)}>
                                <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: '720px', width: '95%' }}>
                                    <div className="modal-header">
                                        <h3 className="modal-title">⎇ Dividir lançamento</h3>
                                        <button className="modal-close" onClick={() => setSplitModal(null)}>✕</button>
                                    </div>

                                    <div style={{ background: '#f8fafc', border: '1px solid #e2e8f0', borderRadius: '8px', padding: '0.75rem 1rem', marginBottom: '1rem', fontSize: '0.85rem' }}>
                                        <div style={{ color: '#64748b', fontSize: '0.75rem', marginBottom: '0.2rem' }}>Lançamento original</div>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', gap: '1rem', alignItems: 'center' }}>
                                            <div style={{ color: '#0f172a', fontWeight: '600' }}>{splitModal.original.descricao}</div>
                                            <div style={{ color: splitModal.original.tipo === 'receita' ? '#16a34a' : '#ef4444', fontWeight: '700', fontSize: '1rem' }}>
                                                {splitModal.original.tipo === 'receita' ? '+' : '-'}{formatCurrency(valorOriginal)}
                                            </div>
                                        </div>
                                    </div>

                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem', maxHeight: '55vh', overflow: 'auto', paddingRight: '0.25rem' }}>
                                        {splitModal.partes.map((p, idx) => (
                                            <div key={idx} style={{ border: '1px solid #e2e8f0', borderRadius: '8px', padding: '0.75rem', background: '#fff' }}>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                                                    <div style={{ fontSize: '0.82rem', fontWeight: '600', color: '#334155' }}>Parte {idx + 1}</div>
                                                    {splitModal.partes.length > 2 && (
                                                        <button
                                                            onClick={() => removerParteSplit(idx)}
                                                            style={{ background: 'none', border: '1px solid #fecaca', color: '#dc2626', borderRadius: '6px', padding: '0.2rem 0.5rem', cursor: 'pointer', fontSize: '0.75rem' }}
                                                        >Remover</button>
                                                    )}
                                                </div>

                                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.5rem 0.75rem' }}>
                                                    <div style={{ gridColumn: '1 / span 2' }}>
                                                        <label style={{ fontSize: '0.72rem', color: '#64748b', display: 'block', marginBottom: '0.2rem' }}>Descrição</label>
                                                        <input
                                                            type="text"
                                                            value={p.descricao}
                                                            onChange={e => atualizarParte(idx, 'descricao', e.target.value)}
                                                            className="form-input"
                                                            style={{ fontSize: '0.85rem', padding: '0.4rem 0.6rem' }}
                                                        />
                                                    </div>
                                                    <div>
                                                        <label style={{ fontSize: '0.72rem', color: '#64748b', display: 'block', marginBottom: '0.2rem' }}>Valor (R$)</label>
                                                        <InputMoeda
                                                            value={p.valor}
                                                            onChange={v => atualizarParte(idx, 'valor', v === '' ? 0 : v)}
                                                            placeholder="0,00"
                                                            style={{ fontSize: '0.85rem', padding: '0.4rem 0.6rem' }}
                                                        />
                                                    </div>
                                                    <div>
                                                        <label style={{ fontSize: '0.72rem', color: '#64748b', display: 'block', marginBottom: '0.2rem' }}>Categoria</label>
                                                        <select
                                                            value={p.categoria_id}
                                                            onChange={e => atualizarParte(idx, 'categoria_id', e.target.value)}
                                                            className="form-input"
                                                            style={{ fontSize: '0.85rem', padding: '0.4rem 0.6rem' }}
                                                        >
                                                            <option value="">❓ Sem categoria</option>
                                                            {categoriasDisponiveis.map(c => (
                                                                <option key={c.id} value={c.id}>{c.emoji} {c.nome}</option>
                                                            ))}
                                                        </select>
                                                    </div>
                                                    <div style={{ gridColumn: '1 / span 2', display: 'flex', alignItems: 'center', gap: '0.4rem', marginTop: '0.2rem' }}>
                                                        <input
                                                            type="checkbox"
                                                            id={`split-reemb-${idx}`}
                                                            checked={!!p.reembolsavel}
                                                            onChange={e => atualizarParte(idx, 'reembolsavel', e.target.checked)}
                                                            style={{ width: '16px', height: '16px', cursor: 'pointer', accentColor: '#3b82f6' }}
                                                        />
                                                        <label htmlFor={`split-reemb-${idx}`} style={{ fontSize: '0.82rem', color: '#334155', cursor: 'pointer' }}>
                                                            💼 Reembolsável (não entra nos indicadores)
                                                        </label>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div style={{ marginTop: '0.75rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '0.75rem' }}>
                                        <button
                                            onClick={addParteSplit}
                                            disabled={splitModal.partes.length >= 10}
                                            style={{ background: '#f1f5f9', border: '1px dashed #94a3b8', borderRadius: '8px', padding: '0.5rem 0.85rem', cursor: splitModal.partes.length >= 10 ? 'not-allowed' : 'pointer', fontSize: '0.82rem', color: '#475569', fontWeight: '500', opacity: splitModal.partes.length >= 10 ? 0.5 : 1 }}
                                        >+ Adicionar parte</button>
                                        <div style={{
                                            fontSize: '0.85rem',
                                            fontWeight: '600',
                                            padding: '0.4rem 0.75rem',
                                            borderRadius: '6px',
                                            background: somaOk ? '#f0fdf4' : '#fef2f2',
                                            color: somaOk ? '#166534' : '#991b1b',
                                            border: `1px solid ${somaOk ? '#bbf7d0' : '#fecaca'}`,
                                        }}>
                                            Soma: {formatCurrency(soma)} / {formatCurrency(valorOriginal)} {somaOk ? '✓' : (diff > 0 ? `(sobra ${formatCurrency(Math.abs(diff))})` : `(falta ${formatCurrency(Math.abs(diff))})`)}
                                        </div>
                                    </div>

                                    <div style={{ marginTop: '0.75rem', padding: '0.6rem 0.75rem', background: '#f8fafc', border: '1px solid #e2e8f0', borderRadius: '8px', display: 'flex', alignItems: 'flex-start', gap: '0.5rem' }}>
                                        <input
                                            type="checkbox"
                                            id="split-memorizar"
                                            checked={!!splitModal.memorizar}
                                            onChange={e => setSplitModal(prev => prev ? { ...prev, memorizar: e.target.checked } : prev)}
                                            style={{ width: '16px', height: '16px', cursor: 'pointer', accentColor: '#6366f1', marginTop: '0.15rem' }}
                                        />
                                        <label htmlFor="split-memorizar" style={{ fontSize: '0.82rem', color: '#334155', cursor: 'pointer', lineHeight: 1.4 }}>
                                            <strong>Memorizar esta divisão</strong> — desmarque se for um split pontual (ex: conta dividida com amigos uma vez só). Marcado, a mesma proporção será aplicada automaticamente em importações futuras com descrição similar.
                                            {splitModal.regraSplitId && <span style={{ display: 'block', marginTop: '0.2rem', fontSize: '0.75rem', color: '#9a3412' }}>⚠️ Esta divisão já veio de uma regra aprendida. Ao confirmar marcado, a regra é atualizada com os novos valores.</span>}
                                        </label>
                                    </div>

                                    <div style={{ display: 'flex', gap: '0.75rem', justifyContent: 'flex-end', marginTop: '1rem' }}>
                                        <button className="button button-secondary" onClick={() => setSplitModal(null)}>Cancelar</button>
                                        <button
                                            className="button button-primary"
                                            onClick={confirmarSplit}
                                            disabled={!somaOk}
                                            style={{ opacity: somaOk ? 1 : 0.5, cursor: somaOk ? 'pointer' : 'not-allowed' }}
                                        >Confirmar divisão</button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}
                </div>
            );
        }

        // ============================================================
        // RESERVAS - Histórico de saldos de investimento + Transferências
        // ============================================================
        function Reservas({ data, actions }) {
            const [saldos, setSaldos] = useState([]);
            const [carregando, setCarregando] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [showTransfModal, setShowTransfModal] = useState(false);
            const [resultado, setResultado] = useState(null);
            const [salvando, setSalvando] = useState(false);

            // Form para novo registro de saldo (id preenchido = modo edição)
            const [form, setForm] = useState({
                id: '',
                conta_id: '',
                tipo_movimento: 'Saldo de fechamento',
                valor_movimento: '',
                saldo_apos: '',
                observacao: '',
                data: new Date().toISOString().slice(0, 10)
            });

            // Form para transferência
            const [transfForm, setTransfForm] = useState({
                conta_origem_id: '',
                conta_destino_id: '',
                valor: '',
                observacao: '',
                data: new Date().toISOString().slice(0, 10)
            });

            // Contas de investimento e demais
            const contasInvestimento = data.contas.filter(c => c.status !== 'arquivada' && c.tipo === 'investimento');
            const contasAtivas = data.contas.filter(c => c.status !== 'arquivada' && c.tipo !== 'cartao_credito');

            // Carregar histórico de saldos
            useEffect(() => {
                async function carregar() {
                    const resp = await api.get('saldos_historico');
                    if (resp && Array.isArray(resp)) setSaldos(resp);
                    setCarregando(false);
                }
                carregar();
            }, []);

            // Último saldo por conta
            const ultimoSaldoPorConta = {};
            saldos
                .sort((a, b) => String(a.data || '').localeCompare(String(b.data || '')))
                .forEach(s => {
                    if (s.conta_id) ultimoSaldoPorConta[s.conta_id] = s;
                });

            // Totais
            const totalInvestido = contasInvestimento.reduce((sum, c) => sum + (c.saldo || 0), 0);

            // Salvar registro de saldo
            const handleEditarSaldo = (s) => {
                setForm({
                    id: s.id,
                    conta_id: s.conta_id,
                    tipo_movimento: s.tipo_movimento,
                    valor_movimento: s.valor_movimento || '',
                    saldo_apos: s.saldo_apos || '',
                    observacao: s.observacao || '',
                    data: s.data || new Date().toISOString().slice(0, 10),
                });
                setShowModal(true);
            };

            const handleExcluirSaldo = async (s) => {
                if (!confirm(`Excluir este registro de ${s.tipo_movimento} de ${formatCurrency(s.valor_movimento)} em ${s.conta_nome}?`)) return;
                try {
                    await api.post('deletar_saldo_historico', { id: s.id });
                    setSaldos(prev => prev.filter(x => x.id !== s.id));
                    setResultado({ tipo: 'ok', msg: '✅ Registro excluído.' });
                } catch (e) {
                    setResultado({ tipo: 'erro', msg: '❌ Erro ao excluir: ' + e.message });
                }
            };

            const handleSalvarSaldo = async () => {
                const conta = data.contas.find(c => c.id === form.conta_id);
                if (!conta) { setResultado({ tipo: 'erro', msg: 'Selecione uma conta' }); return; }

                setSalvando(true);
                const editandoId = form.id || null;
                const registro = {
                    id: editandoId || ('SH_' + Date.now()),
                    data: form.data,
                    conta_id: form.conta_id,
                    conta_nome: conta.nome,
                    instituicao: conta.instituicao || '',
                    produto: conta.nome,
                    tipo_movimento: form.tipo_movimento,
                    valor_movimento: form.tipo_movimento === 'Saldo de fechamento' ? '' : Number(form.valor_movimento || 0),
                    saldo_apos: Number(form.saldo_apos || 0),
                    observacao: form.observacao
                };

                try {
                    const resp = await api.post('salvar_saldo_historico', registro);
                    if (resp && !resp.erro) {
                        if (editandoId) {
                            setSaldos(prev => prev.map(s => s.id === editandoId ? registro : s));
                        } else {
                            setSaldos(prev => [...prev, registro]);
                        }
                        // Atualizar saldo da conta
                        if (form.saldo_apos && actions.salvarConta) {
                            await actions.salvarConta({ ...conta, saldo: Number(form.saldo_apos), saldo_atual: Number(form.saldo_apos) });
                        }
                        setResultado({ tipo: 'ok', msg: editandoId ? '✅ Registro atualizado!' : '✅ Registro salvo com sucesso!' });
                        setShowModal(false);
                        setForm({ id: '', conta_id: '', tipo_movimento: 'Saldo de fechamento', valor_movimento: '', saldo_apos: '', observacao: '', data: new Date().toISOString().slice(0, 10) });
                    } else {
                        setResultado({ tipo: 'erro', msg: '❌ ' + (resp?.erro || 'Erro ao salvar') });
                    }
                } catch (e) {
                    setResultado({ tipo: 'erro', msg: '❌ Erro ao salvar registro' });
                }
                setSalvando(false);
            };

            // Registrar transferência
            const handleTransferencia = async () => {
                if (!transfForm.conta_origem_id || !transfForm.conta_destino_id || !transfForm.valor) {
                    setResultado({ tipo: 'erro', msg: 'Preencha todos os campos obrigatórios' });
                    return;
                }
                if (transfForm.conta_origem_id === transfForm.conta_destino_id) {
                    setResultado({ tipo: 'erro', msg: 'Conta origem e destino devem ser diferentes' });
                    return;
                }

                setSalvando(true);
                try {
                    const resp = await api.post('registrar_transferencia', {
                        conta_origem_id: transfForm.conta_origem_id,
                        conta_destino_id: transfForm.conta_destino_id,
                        valor: Number(transfForm.valor),
                        data: transfForm.data,
                        observacao: transfForm.observacao
                    });
                    if (resp && resp.ok) {
                        // Atualizar saldos locais
                        const origem = data.contas.find(c => c.id === transfForm.conta_origem_id);
                        const destino = data.contas.find(c => c.id === transfForm.conta_destino_id);
                        if (origem && actions.salvarConta) {
                            const novoSaldoO = resp.saldo_origem ?? (origem.saldo - Number(transfForm.valor));
                            await actions.salvarConta({ ...origem, saldo: novoSaldoO, saldo_atual: novoSaldoO });
                        }
                        if (destino && actions.salvarConta) {
                            const novoSaldoD = resp.saldo_destino ?? (destino.saldo + Number(transfForm.valor));
                            await actions.salvarConta({ ...destino, saldo: novoSaldoD, saldo_atual: novoSaldoD });
                        }
                        // Recarregar saldos
                        const saldosAtualizados = await api.get('saldos_historico');
                        if (saldosAtualizados && Array.isArray(saldosAtualizados)) setSaldos(saldosAtualizados);
                        setResultado({ tipo: 'ok', msg: '✅ ' + resp.msg });
                        setShowTransfModal(false);
                        setTransfForm({ conta_origem_id: '', conta_destino_id: '', valor: '', observacao: '', data: new Date().toISOString().slice(0, 10) });
                    } else {
                        setResultado({ tipo: 'erro', msg: '❌ ' + (resp?.erro || 'Erro na transferência') });
                    }
                } catch (e) {
                    setResultado({ tipo: 'erro', msg: '❌ Erro ao registrar transferência' });
                }
                setSalvando(false);
            };

            const formatCurrency = (v) => {
                const n = Number(v || 0);
                return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            };

            const formatDate = (d) => {
                if (!d) return '';
                const s = String(d);
                if (s.match(/^\d{4}-\d{2}-\d{2}/)) {
                    const [y, m, dd] = s.slice(0, 10).split('-');
                    return `${dd}/${m}/${y}`;
                }
                return s;
            };

            // Agrupar saldos por conta para o histórico
            const saldosPorConta = {};
            saldos.forEach(s => {
                const key = s.conta_id || s.conta_nome;
                if (!saldosPorConta[key]) saldosPorConta[key] = { conta_nome: s.conta_nome, instituicao: s.instituicao, registros: [] };
                saldosPorConta[key].registros.push(s);
            });

            // Filtro de conta
            const [filtroContaId, setFiltroContaId] = useState('todas');

            return (
                <div className="page-transition">
                    <div className="page-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                        <div>
                            <h1>Reservas e Investimentos</h1>
                            <p>Controle de saldos, aportes, resgates e transferências entre contas</p>
                        </div>
                        <div style={{ display: 'flex', gap: '0.5rem' }}>
                            <button className="button button-secondary" onClick={() => setShowTransfModal(true)}>
                                🔄 Transferir entre contas
                            </button>
                            <button className="button button-primary" onClick={() => {
                                setForm({ id: '', conta_id: '', tipo_movimento: 'Saldo de fechamento', valor_movimento: '', saldo_apos: '', observacao: '', data: new Date().toISOString().slice(0, 10) });
                                setShowModal(true);
                            }}>
                                + Registrar movimento
                            </button>
                        </div>
                    </div>

                    {/* Feedback */}
                    {resultado && (
                        <div style={{ padding: '0.75rem 1rem', borderRadius: '8px', marginBottom: '1rem',
                            background: resultado.tipo === 'ok' ? '#f0fdf4' : resultado.tipo === 'aviso' ? '#fffbeb' : '#fef2f2',
                            border: `1px solid ${resultado.tipo === 'ok' ? '#bbf7d0' : resultado.tipo === 'aviso' ? '#fde68a' : '#fecaca'}`,
                            color: resultado.tipo === 'ok' ? '#166534' : resultado.tipo === 'aviso' ? '#92400e' : '#991b1b',
                            display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <span>{resultado.msg}</span>
                            <button onClick={() => setResultado(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '1.1rem' }}>✕</button>
                        </div>
                    )}

                    {/* Cards resumo */}
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: '1rem', marginBottom: '1.5rem' }}>
                        <div className="card" style={{ textAlign: 'center', padding: '1.25rem' }}>
                            <p style={{ margin: 0, fontSize: '0.8rem', color: '#64748b' }}>Total em Investimentos</p>
                            <p style={{ margin: '0.5rem 0 0 0', fontSize: '1.5rem', fontWeight: '700', color: '#059669' }}>{formatCurrency(totalInvestido)}</p>
                        </div>
                        {contasInvestimento.map(c => (
                            <div key={c.id} className="card" style={{ textAlign: 'center', padding: '1.25rem' }}>
                                <p style={{ margin: 0, fontSize: '0.75rem', color: '#94a3b8' }}>{c.instituicao || ''}</p>
                                <p style={{ margin: '0.25rem 0', fontSize: '0.85rem', fontWeight: '600' }}>{c.nome}</p>
                                <p style={{ margin: 0, fontSize: '1.2rem', fontWeight: '700', color: c.saldo >= 0 ? '#059669' : '#dc2626' }}>{formatCurrency(c.saldo)}</p>
                            </div>
                        ))}
                    </div>

                    {contasInvestimento.length === 0 && (
                        <div className="card" style={{ textAlign: 'center', padding: '2rem', marginBottom: '1.5rem' }}>
                            <p style={{ fontSize: '2rem', margin: '0 0 0.5rem 0' }}>📈</p>
                            <p style={{ color: '#64748b', margin: 0 }}>Nenhuma conta de investimento cadastrada. Vá em <strong>Contas</strong> e crie uma conta com tipo "Investimento".</p>
                        </div>
                    )}

                    {/* Evolução do Patrimônio */}
                    {contasInvestimento.length > 0 && saldos.length > 0 && (() => {
                        // Construir timeline: para cada data no histórico, pegar o último saldo de cada conta
                        const saldosSorted = [...saldos].sort((a, b) => String(a.data || '').localeCompare(String(b.data || '')));
                        const contaIds = contasInvestimento.map(c => c.id);

                        // Coletar todas as datas únicas
                        const datasSet = new Set();
                        saldosSorted.forEach(s => { if (s.data && contaIds.includes(s.conta_id)) datasSet.add(String(s.data).slice(0, 10)); });
                        const datasOrdenadas = [...datasSet].sort();

                        if (datasOrdenadas.length < 1) return null;

                        // Para cada data, calcular saldo acumulado por conta (carry forward)
                        const saldoPorContaAtual = {};
                        contaIds.forEach(id => { saldoPorContaAtual[id] = 0; });

                        const pontos = [];
                        let idxSaldo = 0;

                        datasOrdenadas.forEach(dataStr => {
                            // Atualizar saldos com registros desta data
                            while (idxSaldo < saldosSorted.length && String(saldosSorted[idxSaldo].data || '').slice(0, 10) <= dataStr) {
                                const s = saldosSorted[idxSaldo];
                                if (contaIds.includes(s.conta_id) && s.saldo_apos) {
                                    saldoPorContaAtual[s.conta_id] = Number(s.saldo_apos) || 0;
                                }
                                idxSaldo++;
                            }
                            const total = contaIds.reduce((sum, id) => sum + saldoPorContaAtual[id], 0);
                            const porConta = { ...saldoPorContaAtual };
                            pontos.push({ data: dataStr, total, porConta });
                        });

                        // Adicionar ponto "hoje" com saldos atuais se a última data não é hoje
                        const hoje = new Date().toISOString().slice(0, 10);
                        if (pontos.length > 0 && pontos[pontos.length - 1].data !== hoje) {
                            const porContaHoje = {};
                            contasInvestimento.forEach(c => { porContaHoje[c.id] = c.saldo || 0; });
                            pontos.push({ data: hoje, total: totalInvestido, porConta: porContaHoje });
                        }

                        if (pontos.length < 2) return null;

                        // Chart dimensions
                        const chartW = 800, chartH = 220, padL = 70, padR = 20, padT = 15, padB = 35;
                        const plotW = chartW - padL - padR, plotH = chartH - padT - padB;
                        const minVal = Math.min(...pontos.map(p => p.total)) * 0.95;
                        const maxVal = Math.max(...pontos.map(p => p.total)) * 1.05;
                        const range = Math.max(maxVal - minVal, 1);

                        const px = (i) => padL + (i / (pontos.length - 1)) * plotW;
                        const py = (v) => padT + (1 - (v - minVal) / range) * plotH;

                        // Cores por conta
                        const cores = ['#3b82f6', '#f59e0b', '#10b981', '#8b5cf6', '#ef4444'];

                        // Formatar data curta
                        const fmtDataCurta = (d) => {
                            const [y, m, dd] = d.split('-');
                            return `${dd}/${m}`;
                        };

                        // Formatar eixo Y
                        const fmtEixo = (v) => {
                            if (v >= 1000000) return `${(v / 1000000).toFixed(1)}M`;
                            if (v >= 1000) return `${(v / 1000).toFixed(1)}k`;
                            return String(Math.round(v));
                        };

                        // Grid Y lines
                        const niceStep = (max, min) => {
                            const rough = (max - min) / 4;
                            if (rough <= 0) return 100;
                            const mag = Math.pow(10, Math.floor(Math.log10(rough)));
                            const residual = rough / mag;
                            const nice = residual <= 1.5 ? 1 : residual <= 3 ? 2 : residual <= 7 ? 5 : 10;
                            return nice * mag;
                        };
                        const step = niceStep(maxVal, minVal);
                        const yStart = Math.floor(minVal / step) * step;
                        const gridLines = [];
                        for (let v = yStart; v <= maxVal + step * 0.1; v += step) gridLines.push(v);

                        // Path da linha total
                        const pathTotal = pontos.map((p, i) => `${i === 0 ? 'M' : 'L'} ${px(i)} ${py(p.total)}`).join(' ');

                        // Paths por conta
                        const pathsPorConta = contaIds.map((cid, ci) => {
                            const d = pontos.map((p, i) => `${i === 0 ? 'M' : 'L'} ${px(i)} ${py(p.porConta[cid] || 0)}`).join(' ');
                            return { cid, cor: cores[ci % cores.length], d, nome: contasInvestimento.find(c => c.id === cid)?.nome || cid };
                        });

                        // Mostrar labels de data espaçados
                        const maxLabels = 8;
                        const labelStep = Math.max(1, Math.ceil(pontos.length / maxLabels));

                        return (
                            <div className="card" style={{ padding: '1.25rem', marginBottom: '1.5rem' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                                    <h3 style={{ margin: 0, fontSize: '1rem', fontWeight: '600', color: '#0f172a' }}>📈 Evolução do Patrimônio</h3>
                                    <div style={{ display: 'flex', gap: '1rem', fontSize: '0.75rem', color: '#64748b', alignItems: 'center', flexWrap: 'wrap' }}>
                                        <span style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                                            <span style={{ width: '16px', height: '3px', background: '#059669', borderRadius: '2px', display: 'inline-block' }}></span>
                                            <span style={{ fontWeight: '600' }}>Total</span>
                                        </span>
                                        {pathsPorConta.map(pc => (
                                            <span key={pc.cid} style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                                                <span style={{ width: '16px', height: '3px', background: pc.cor, borderRadius: '2px', display: 'inline-block', opacity: 0.6 }}></span>
                                                {pc.nome}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                                <svg width="100%" height={chartH} viewBox={`0 0 ${chartW} ${chartH}`} preserveAspectRatio="xMidYMid meet" style={{ display: 'block' }}>
                                    {/* Background */}
                                    <rect x={padL} y={padT} width={plotW} height={plotH} fill="#fafbfc" rx="4" />

                                    {/* Grid lines */}
                                    {gridLines.map((v, i) => (
                                        <g key={i}>
                                            <line x1={padL} x2={chartW - padR} y1={py(v)} y2={py(v)} stroke="#e8ecf0" strokeWidth="1" />
                                            <text x={padL - 8} y={py(v) + 4} textAnchor="end" style={{ fontSize: '11px', fill: '#94a3b8', fontFamily: 'inherit' }}>
                                                {fmtEixo(v)}
                                            </text>
                                        </g>
                                    ))}

                                    {/* Per-account lines (dashed, lighter) */}
                                    {pathsPorConta.map(pc => (
                                        <path key={pc.cid} d={pc.d} fill="none" stroke={pc.cor} strokeWidth="1.5" strokeDasharray="4 3" opacity="0.5" />
                                    ))}

                                    {/* Total line (solid, prominent) */}
                                    <path d={pathTotal} fill="none" stroke="#059669" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />

                                    {/* Dots on total line */}
                                    {pontos.map((p, i) => (
                                        <circle key={i} cx={px(i)} cy={py(p.total)} r="4" fill="#fff" stroke="#059669" strokeWidth="2" />
                                    ))}

                                    {/* Value labels on first and last points */}
                                    {[0, pontos.length - 1].map(i => (
                                        <text key={i} x={px(i)} y={py(pontos[i].total) - 10} textAnchor={i === 0 ? 'start' : 'end'}
                                            style={{ fontSize: '11px', fontWeight: '700', fill: '#059669', fontFamily: 'inherit' }}>
                                            {formatCurrency(pontos[i].total)}
                                        </text>
                                    ))}

                                    {/* X axis labels */}
                                    {pontos.map((p, i) => (
                                        i % labelStep === 0 || i === pontos.length - 1 ? (
                                            <text key={i} x={px(i)} y={chartH - 8} textAnchor="middle"
                                                style={{ fontSize: '10px', fill: '#64748b', fontFamily: 'inherit' }}>
                                                {fmtDataCurta(p.data)}
                                            </text>
                                        ) : null
                                    ))}
                                </svg>

                                {/* Variação no período */}
                                {pontos.length >= 2 && (() => {
                                    const primeiro = pontos[0].total;
                                    const ultimo = pontos[pontos.length - 1].total;
                                    const variacao = ultimo - primeiro;
                                    const pct = primeiro > 0 ? ((variacao / primeiro) * 100).toFixed(1) : '—';
                                    return (
                                        <div style={{ display: 'flex', gap: '1.5rem', marginTop: '0.75rem', padding: '0.5rem 0.75rem', background: '#f8fafc', borderRadius: '8px', fontSize: '0.8rem', color: '#64748b', flexWrap: 'wrap' }}>
                                            <span>Início: <strong style={{ color: '#334155' }}>{formatCurrency(primeiro)}</strong></span>
                                            <span>Atual: <strong style={{ color: '#334155' }}>{formatCurrency(ultimo)}</strong></span>
                                            <span>Variação: <strong style={{ color: variacao >= 0 ? '#059669' : '#dc2626' }}>
                                                {variacao >= 0 ? '+' : ''}{formatCurrency(variacao)} ({variacao >= 0 ? '+' : ''}{pct}%)
                                            </strong></span>
                                        </div>
                                    );
                                })()}
                            </div>
                        );
                    })()}

                    {/* Histórico de movimentos */}
                    <div className="card">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                            <h3 style={{ margin: 0, fontSize: '1rem', fontWeight: '600' }}>📋 Histórico de Movimentos</h3>
                            <select value={filtroContaId} onChange={e => setFiltroContaId(e.target.value)}
                                style={{ padding: '0.4rem 0.75rem', borderRadius: '6px', border: '1px solid #e2e8f0', fontSize: '0.85rem' }}>
                                <option value="todas">Todas as contas</option>
                                {contasInvestimento.map(c => (
                                    <option key={c.id} value={c.id}>{c.nome}</option>
                                ))}
                            </select>
                        </div>

                        {carregando ? (
                            <p style={{ textAlign: 'center', color: '#94a3b8', padding: '2rem' }}>⏳ Carregando histórico...</p>
                        ) : saldos.length === 0 ? (
                            <p style={{ textAlign: 'center', color: '#94a3b8', padding: '1.5rem', fontSize: '0.9rem' }}>
                                Nenhum registro ainda. Clique em "Registrar movimento" para começar.
                            </p>
                        ) : (
                            <table className="table">
                                <thead className="table-header">
                                    <tr>
                                        <th>Data</th>
                                        <th>Conta / Produto</th>
                                        <th>Instituição</th>
                                        <th>Tipo</th>
                                        <th style={{ textAlign: 'right' }}>Valor (R$)</th>
                                        <th style={{ textAlign: 'right' }}>Saldo após (R$)</th>
                                        <th>Observação</th>
                                        <th style={{ width: '60px' }}></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {saldos
                                        .filter(s => filtroContaId === 'todas' || s.conta_id === filtroContaId)
                                        .sort((a, b) => String(b.data || '').localeCompare(String(a.data || '')) || String(b.id || '').localeCompare(String(a.id || '')))
                                        .map(s => {
                                            const tipoColor = s.tipo_movimento === 'Aporte' ? '#059669' :
                                                              s.tipo_movimento === 'Resgate' ? '#dc2626' :
                                                              s.tipo_movimento === 'Saldo inicial' ? '#2563eb' : '#8b5cf6';
                                            return (
                                                <tr key={s.id} className="table-row">
                                                    <td>{formatDate(s.data)}</td>
                                                    <td style={{ fontWeight: '500' }}>{s.conta_nome || s.produto}</td>
                                                    <td style={{ color: '#64748b', fontSize: '0.85rem' }}>{s.instituicao}</td>
                                                    <td><span style={{ color: tipoColor, fontWeight: '600', fontSize: '0.8rem' }}>{s.tipo_movimento}</span></td>
                                                    <td style={{ textAlign: 'right', fontWeight: '500' }}>
                                                        {s.valor_movimento ? formatCurrency(s.valor_movimento) : '—'}
                                                    </td>
                                                    <td style={{ textAlign: 'right', fontWeight: '600' }}>
                                                        {s.saldo_apos ? formatCurrency(s.saldo_apos) : '—'}
                                                    </td>
                                                    <td style={{ color: '#64748b', fontSize: '0.8rem', maxWidth: '200px' }}>{s.observacao}</td>
                                                    <td style={{ textAlign: 'center', whiteSpace: 'nowrap' }}>
                                                        <button onClick={() => handleEditarSaldo(s)} title="Editar"
                                                            style={{ background: '#f1f5f9', border: '1px solid #e2e8f0', cursor: 'pointer', fontSize: '0.75rem', padding: '0.25rem 0.4rem', borderRadius: '4px', marginRight: '0.2rem' }}
                                                            onMouseOver={e => e.currentTarget.style.background = '#dbeafe'} onMouseOut={e => e.currentTarget.style.background = '#f1f5f9'}>✏️</button>
                                                        <button onClick={() => handleExcluirSaldo(s)} title="Excluir"
                                                            style={{ background: '#f1f5f9', border: '1px solid #e2e8f0', cursor: 'pointer', fontSize: '0.75rem', padding: '0.25rem 0.4rem', borderRadius: '4px' }}
                                                            onMouseOver={e => e.currentTarget.style.background = '#fee2e2'} onMouseOut={e => e.currentTarget.style.background = '#f1f5f9'}>🗑️</button>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                </tbody>
                            </table>
                        )}
                    </div>

                    {/* Modal: Registrar Movimento */}
                    {showModal && (
                        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.4)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100 }}>
                            <div style={{ background: 'white', borderRadius: '12px', padding: '2rem', maxWidth: '500px', width: '90%', maxHeight: '90vh', overflowY: 'auto' }}>
                                <h3 style={{ margin: '0 0 1.5rem 0' }}>{form.id ? '✏️ Editar Movimento' : '📝 Registrar Movimento'}</h3>

                                <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                    <label style={{ fontSize: '0.85rem', fontWeight: '500' }}>Conta
                                        <select value={form.conta_id} onChange={e => setForm(prev => ({ ...prev, conta_id: e.target.value }))}
                                            className="form-input" style={{ width: '100%', marginTop: '0.25rem' }}>
                                            <option value="">Selecione...</option>
                                            {contasInvestimento.map(c => (
                                                <option key={c.id} value={c.id}>{c.instituicao} — {c.nome}</option>
                                            ))}
                                        </select>
                                    </label>

                                    <label style={{ fontSize: '0.85rem', fontWeight: '500' }}>Data
                                        <input type="date" value={form.data} onChange={e => setForm(prev => ({ ...prev, data: e.target.value }))}
                                            className="form-input" style={{ width: '100%', marginTop: '0.25rem' }} />
                                    </label>

                                    <label style={{ fontSize: '0.85rem', fontWeight: '500' }}>Tipo de movimento
                                        <select value={form.tipo_movimento} onChange={e => setForm(prev => ({ ...prev, tipo_movimento: e.target.value }))}
                                            className="form-input" style={{ width: '100%', marginTop: '0.25rem' }}>
                                            <option value="Saldo inicial">Saldo inicial</option>
                                            <option value="Aporte">Aporte</option>
                                            <option value="Resgate">Resgate</option>
                                            <option value="Rendimento">Rendimento</option>
                                            <option value="Saldo de fechamento">Saldo de fechamento</option>
                                        </select>
                                    </label>

                                    {form.tipo_movimento !== 'Saldo de fechamento' && form.tipo_movimento !== 'Saldo inicial' && (
                                        <label style={{ fontSize: '0.85rem', fontWeight: '500' }}>Valor do movimento (R$)
                                            <InputMoeda value={form.valor_movimento}
                                                onChange={v => setForm(prev => ({ ...prev, valor_movimento: v }))}
                                                style={{ width: '100%', marginTop: '0.25rem' }}
                                                placeholder="Ex: 1.368,00" />
                                        </label>
                                    )}

                                    <label style={{ fontSize: '0.85rem', fontWeight: '500' }}>Saldo após movimento (R$)
                                        <InputMoeda value={form.saldo_apos}
                                            onChange={v => setForm(prev => ({ ...prev, saldo_apos: v }))}
                                            style={{ width: '100%', marginTop: '0.25rem' }}
                                            placeholder="Ex: 5.768,58" />
                                    </label>

                                    <label style={{ fontSize: '0.85rem', fontWeight: '500' }}>Observação
                                        <input type="text" value={form.observacao}
                                            onChange={e => setForm(prev => ({ ...prev, observacao: e.target.value }))}
                                            className="form-input" style={{ width: '100%', marginTop: '0.25rem' }}
                                            placeholder="Ex: Saldo apurado hoje, Sobra da conta operacional..." />
                                    </label>
                                </div>

                                <div style={{ display: 'flex', gap: '0.75rem', marginTop: '1.5rem', justifyContent: 'flex-end' }}>
                                    <button className="button button-secondary" onClick={() => setShowModal(false)}>Cancelar</button>
                                    <button className="button button-primary" onClick={handleSalvarSaldo} disabled={salvando}>
                                        {salvando ? '⏳ Salvando...' : (form.id ? '💾 Atualizar' : '💾 Salvar')}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal: Transferir entre contas */}
                    {showTransfModal && (
                        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.4)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100 }}>
                            <div style={{ background: 'white', borderRadius: '12px', padding: '2rem', maxWidth: '500px', width: '90%', maxHeight: '90vh', overflowY: 'auto' }}>
                                <h3 style={{ margin: '0 0 0.5rem 0' }}>🔄 Transferir entre Contas</h3>
                                <p style={{ margin: '0 0 1.5rem 0', fontSize: '0.85rem', color: '#64748b' }}>
                                    Move dinheiro entre contas sem gerar despesa ou receita nos seus lançamentos.
                                </p>

                                <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                    <label style={{ fontSize: '0.85rem', fontWeight: '500' }}>De (conta origem)
                                        <select value={transfForm.conta_origem_id}
                                            onChange={e => setTransfForm(prev => ({ ...prev, conta_origem_id: e.target.value }))}
                                            className="form-input" style={{ width: '100%', marginTop: '0.25rem' }}>
                                            <option value="">Selecione...</option>
                                            {contasAtivas.map(c => (
                                                <option key={c.id} value={c.id}>
                                                    {c.instituicao} — {c.nome} ({formatCurrency(c.saldo)})
                                                </option>
                                            ))}
                                        </select>
                                    </label>

                                    <label style={{ fontSize: '0.85rem', fontWeight: '500' }}>Para (conta destino)
                                        <select value={transfForm.conta_destino_id}
                                            onChange={e => setTransfForm(prev => ({ ...prev, conta_destino_id: e.target.value }))}
                                            className="form-input" style={{ width: '100%', marginTop: '0.25rem' }}>
                                            <option value="">Selecione...</option>
                                            {contasAtivas.filter(c => c.id !== transfForm.conta_origem_id).map(c => (
                                                <option key={c.id} value={c.id}>
                                                    {c.instituicao} — {c.nome} ({formatCurrency(c.saldo)})
                                                </option>
                                            ))}
                                        </select>
                                    </label>

                                    <label style={{ fontSize: '0.85rem', fontWeight: '500' }}>Valor (R$)
                                        <InputMoeda value={transfForm.valor}
                                            onChange={v => setTransfForm(prev => ({ ...prev, valor: v }))}
                                            style={{ width: '100%', marginTop: '0.25rem' }}
                                            placeholder="Ex: 1.358,79" />
                                    </label>

                                    <label style={{ fontSize: '0.85rem', fontWeight: '500' }}>Data
                                        <input type="date" value={transfForm.data}
                                            onChange={e => setTransfForm(prev => ({ ...prev, data: e.target.value }))}
                                            className="form-input" style={{ width: '100%', marginTop: '0.25rem' }} />
                                    </label>

                                    <label style={{ fontSize: '0.85rem', fontWeight: '500' }}>Observação
                                        <input type="text" value={transfForm.observacao}
                                            onChange={e => setTransfForm(prev => ({ ...prev, observacao: e.target.value }))}
                                            className="form-input" style={{ width: '100%', marginTop: '0.25rem' }}
                                            placeholder="Ex: Resgate para cobrir despesas" />
                                    </label>
                                </div>

                                <div style={{ display: 'flex', gap: '0.75rem', marginTop: '1.5rem', justifyContent: 'flex-end' }}>
                                    <button className="button button-secondary" onClick={() => setShowTransfModal(false)}>Cancelar</button>
                                    <button className="button button-primary" onClick={handleTransferencia} disabled={salvando}>
                                        {salvando ? '⏳ Processando...' : '🔄 Transferir'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Settings Component
        function Configurar() {
            const [testResult, setTestResult] = useState(null);
            const [testing, setTesting] = useState(false);
            const urlAtual = APPS_SCRIPT_URL;

            const testarConexao = async () => {
                if (!urlAtual) { setTestResult({ ok: false, msg: 'Nenhuma URL configurada. Edite o arquivo config.js' }); return; }
                setTesting(true);
                setTestResult(null);
                try {
                    const res = await fetch(urlAtual + '?action=ping');
                    const data = await res.json();
                    setTestResult({ ok: true, msg: 'Conectado com sucesso! A planilha está respondendo.' });
                } catch (e) {
                    setTestResult({ ok: false, msg: 'Falha na conexão: ' + e.message });
                }
                setTesting(false);
            };

            return (
                <div className="page-transition">
                    <div className="page-header">
                        <h1>Configuração</h1>
                        <p>Conecte ao Google Sheets para salvar seus dados</p>
                    </div>

                    {/* Status da conexão */}
                    <div className="card" style={{ maxWidth: '700px', margin: '0 auto 1.5rem auto', background: urlAtual ? '#f0fdf4' : '#fffbeb', borderLeft: urlAtual ? '4px solid #22c55e' : '4px solid #f59e0b' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                            <span style={{ fontSize: '1.5rem' }}>{urlAtual ? '✅' : '⚠️'}</span>
                            <div>
                                <p style={{ margin: 0, fontWeight: '600', color: '#0f172a' }}>
                                    {urlAtual ? 'Google Sheets configurado' : 'Google Sheets não configurado'}
                                </p>
                                {urlAtual && (

                                        URL: {urlAtual.substring(0, 60)}...

                        </p>

                            <div style={{ color: '#64748b' }}>// config.js</div>
