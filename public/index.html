        // Planning Component
        function Planejamento({ data, actions }) {
            const [period, setPeriod] = useState('mes');
            const [editingMeta, setEditingMeta] = useState(null);
            const [metaForm, setMetaForm] = useState({});
            const [editingTeto, setEditingTeto] = useState(null);
            const [tetoVal, setTetoVal] = useState(0);
            const [showNewMeta, setShowNewMeta] = useState(false);
            const [curvaCategorias, setCurvaCategorias] = useState([]); // array de IDs selecionados
            const [hoveredPoint, setHoveredPoint] = useState(null);
            const [filtroContas, setFiltroContas] = useState([]); // array de IDs selecionados
            const [excluirReembolsaveis, setExcluirReembolsaveis] = useState(true);
            const [dateOffset, setDateOffset] = useState(0); // offset em unidades do período selecionado

            const toggleConta = (id) => {
                setFiltroContas(prev =>
                    prev.includes(id) ? prev.filter(c => c !== id) : [...prev, id]
                );
            };

            const toggleCurvaCat = (id) => {
                setCurvaCategorias(prev =>
                    prev.includes(id) ? prev.filter(c => c !== id) : [...prev, id]
                );
            };

            // Filtro central: exclui transferências e (opcionalmente) reembolsáveis dos indicadores
            const idsTransferencia = new Set(
                (data.categorias || []).filter(c => c.tipo === 'transferencia').map(c => c.id)
            );
            const isReembolsavel = (l) => l.reembolsavel === 'sim' || l.reembolsavel === true;
            const isDespesaReal = (l) => l.tipo === 'despesa' && !idsTransferencia.has(l.categoria_id) && (excluirReembolsaveis ? !isReembolsavel(l) : true);
            const isReceitaReal = (l) => l.tipo === 'receita' && !isReembolsavel(l);

            // Parse YYYY-MM-DD como data LOCAL (evita deslocamento de timezone
            // — "2026-04-01" puro é parseado como UTC e vira 31/03 21h no Brasil).
            const parseDataLocal = (s) => {
                if (!s) return null;
                const str = String(s);
                if (str.includes('T') || str.includes(' ')) return new Date(str);
                const [y, m, d] = str.split('-').map(Number);
                return new Date(y, (m || 1) - 1, d || 1);
            };

            const hoje = new Date();

            // Data de referência baseada no offset de navegação
            const refDate = new Date(hoje);
            if (period === 'semana') {
                refDate.setDate(refDate.getDate() + dateOffset * 7);
            } else if (period === 'mes') {
                refDate.setMonth(refDate.getMonth() + dateOffset);
            } else if (period === 'trimestre') {
                refDate.setMonth(refDate.getMonth() + dateOffset * 3);
            } else if (period === 'semestre') {
                refDate.setMonth(refDate.getMonth() + dateOffset * 6);
            } else if (period === 'ano') {
                refDate.setFullYear(refDate.getFullYear() + dateOffset);
            }

            // Calcula início e fim da semana de referência (segunda a domingo)
            const diaSemana = refDate.getDay(); // 0=dom, 1=seg, ..., 6=sab
            const diffParaSegunda = diaSemana === 0 ? -6 : 1 - diaSemana;
            const inicioSemana = new Date(refDate);
            inicioSemana.setDate(refDate.getDate() + diffParaSegunda);
            inicioSemana.setHours(0, 0, 0, 0);
            const fimSemana = new Date(inicioSemana);
            fimSemana.setDate(inicioSemana.getDate() + 6);
            fimSemana.setHours(23, 59, 59, 999);

            // Número de semanas no mês de referência (para dividir teto mensal)
            const diasNoMes = new Date(refDate.getFullYear(), refDate.getMonth() + 1, 0).getDate();
            const semanasNoMes = diasNoMes / 7;

            const filtrarPorPeriodo = (lancamentos) => {
                return lancamentos.filter(l => {
                    if (!l.data) return false;
                    const dataLanc = parseDataLocal(l.data);
                    if (period === 'semana') {
                        return dataLanc >= inicioSemana && dataLanc <= fimSemana;
                    }
                    const diffMeses = (refDate.getFullYear() - dataLanc.getFullYear()) * 12 + (refDate.getMonth() - dataLanc.getMonth());
                    if (period === 'mes') return diffMeses === 0;
                    if (period === 'trimestre') return diffMeses >= 0 && diffMeses < 3;
                    if (period === 'semestre') return diffMeses >= 0 && diffMeses < 6;
                    if (period === 'ano') return diffMeses >= 0 && diffMeses < 12;
                    return true;
                });
            };

            const lancamentosPeriodo = filtrarPorPeriodo(data.lancamentos || []);
            const lancamentosFiltrados = filtroContas.length > 0
                ? lancamentosPeriodo.filter(l => filtroContas.includes(l.conta_origem))
                : lancamentosPeriodo;

            const monthExpenses = lancamentosFiltrados
                .filter(l => isDespesaReal(l))
                .reduce((sum, l) => sum + l.valor, 0);

            const monthIncome = lancamentosFiltrados
                .filter(l => isReceitaReal(l))
                .reduce((sum, l) => sum + l.valor, 0);

            const monthSavings = monthIncome - monthExpenses;
            const requiredSavings = (data.metas || [])
                .filter(m => m.ativa)
                .reduce((sum, m) => {
                    const restante = (m.valor_meta || 0) - (m.valor_atual || 0);
                    const mesesRestantes = m.data_limite
                        ? Math.max(1, Math.ceil((new Date(m.data_limite) - new Date()) / (30 * 86400000)))
                        : 6;
                    return sum + (restante / mesesRestantes);
                }, 0);

            const handleSaveMeta = async () => {
                const meta = { ...metaForm };
                if (!meta.nome) return;
                if (!meta.id) meta.id = 'M' + Date.now();
                if (meta.ativa === undefined) meta.ativa = true;
                if (actions && actions.salvarMeta) await actions.salvarMeta(meta);
                setEditingMeta(null);
                setShowNewMeta(false);
                setMetaForm({});
            };

            const handleSaveTeto = async (cat) => {
                const updated = { ...cat, teto: tetoVal };
                if (actions && actions.salvarCategoria) await actions.salvarCategoria(updated);
                setEditingTeto(null);
            };

            const openEditMeta = (meta) => {
                setMetaForm({ ...meta });
                setEditingMeta(meta.id);
                setShowNewMeta(false);
            };

            const openNewMeta = () => {
                setMetaForm({ nome: '', valor_meta: 0, valor_atual: 0, data_limite: '2026-12-31', ativa: true });
                setEditingMeta(null);
                setShowNewMeta(true);
            };

            const metaModal = (editingMeta || showNewMeta) ? (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(15,23,42,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 50 }}
                    onClick={(e) => { if (e.target === e.currentTarget) { setEditingMeta(null); setShowNewMeta(false); } }}>
                    <div className="card" style={{ width: '100%', maxWidth: '450px', boxShadow: '0 25px 50px rgba(0,0,0,0.25)' }}>
                        <h3 style={{ margin: '0 0 1.5rem 0', fontSize: '1.1rem', fontWeight: '700' }}>
                            {showNewMeta ? '➕ Nova Meta' : '✏️ Editar Meta'}
                        </h3>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                            <div>
                                <label className="form-label">Nome da meta</label>
                                <input className="form-input" value={metaForm.nome || ''} onChange={e => setMetaForm({ ...metaForm, nome: e.target.value })}
                                    placeholder="Ex: Viagem, Reserva de emergência..." />
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                                <div>
                                    <label className="form-label">Valor da meta (R$)</label>
                                    <InputMoeda value={metaForm.valor_meta || 0} onChange={v => setMetaForm({ ...metaForm, valor_meta: v || 0 })} placeholder="Ex: 5.000,00" />
                                </div>
                                <div>
                                    <label className="form-label">Valor já economizado (R$)</label>
                                    <InputMoeda value={metaForm.valor_atual || 0} onChange={v => setMetaForm({ ...metaForm, valor_atual: v || 0 })} />
                                    <p style={{ margin: '0.25rem 0 0 0', fontSize: '0.7rem', color: '#94a3b8' }}>Quanto você já tem guardado para esta meta</p>
                                </div>
                            </div>
                            <div>
                                <label className="form-label">Prazo</label>
                                <input className="form-input" type="date" value={metaForm.data_limite || ''} onChange={e => setMetaForm({ ...metaForm, data_limite: e.target.value })} />
                            </div>
                            <div style={{ display: 'flex', gap: '0.75rem', paddingTop: '0.5rem' }}>
                                <button className="button button-secondary" style={{ flex: 1 }}
                                    onClick={() => { setEditingMeta(null); setShowNewMeta(false); }}>Cancelar</button>
                                <button className="button button-primary" style={{ flex: 1 }} onClick={handleSaveMeta}>
                                    💾 Salvar Meta
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            ) : null;

            return (
                <div className="page-transition">
                    <div className="page-header">
                        <h1>Planejamento</h1>
                        <p>Defina metas, configure orçamentos e acompanhe o progresso</p>
                    </div>

                    {/* Period Selector */}
                    <div className="filter-tabs">
                        {(() => {
                            const labelInicioSemana = `${String(inicioSemana.getDate()).padStart(2, '0')}/${String(inicioSemana.getMonth() + 1).padStart(2, '0')}`;
                            const labelFimSemana = `${String(fimSemana.getDate()).padStart(2, '0')}/${String(fimSemana.getMonth() + 1).padStart(2, '0')}`;
                            const labels = {
                                semana: `Semana (${labelInicioSemana} a ${labelFimSemana})`,
                                mes: `Mês (${String(refDate.getMonth() + 1).padStart(2, '0')}/${refDate.getFullYear()})`,
                                trimestre: `Trimestre (${String(Math.floor(refDate.getMonth() / 3) * 3 + 1).padStart(2, '0')}-${String(Math.floor(refDate.getMonth() / 3) * 3 + 3).padStart(2, '0')}/${refDate.getFullYear()})`,
                                semestre: `Semestre (${String((refDate.getMonth() >= 6 ? 7 : 1)).padStart(2, '0')}-${String((refDate.getMonth() >= 6 ? 12 : 6)).padStart(2, '0')}/${refDate.getFullYear()})`,
                                ano: `Ano (01-12/${refDate.getFullYear()})`
                            };
                            return ['semana', 'mes', 'trimestre', 'semestre', 'ano'].map(p => (
                                <button key={p} className={`tab-button ${period === p ? 'active' : ''}`} onClick={() => { setPeriod(p); setDateOffset(0); }}>
                                    {labels[p]}
                                </button>
                            ));
                        })()}
                    </div>

                    {/* Navegação entre períodos */}
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '1rem', marginBottom: '1rem' }}>
                        <button
                            onClick={() => setDateOffset(prev => prev - 1)}
                            style={{ background: 'none', border: '1px solid #e2e8f0', borderRadius: '8px', padding: '0.4rem 0.8rem', cursor: 'pointer', fontSize: '1rem', color: '#475569', display: 'flex', alignItems: 'center', gap: '0.3rem' }}
                            title="Período anterior"
                        >
                            ← Anterior
                        </button>
                        {dateOffset !== 0 && (
                            <button
                                onClick={() => setDateOffset(0)}
                                style={{ background: '#3b82f6', border: 'none', borderRadius: '8px', padding: '0.4rem 0.8rem', cursor: 'pointer', fontSize: '0.85rem', color: '#fff', fontWeight: '500' }}
                            >
                                Hoje
                            </button>
                        )}
                        <button
                            onClick={() => setDateOffset(prev => prev + 1)}
                            style={{ background: 'none', border: '1px solid #e2e8f0', borderRadius: '8px', padding: '0.4rem 0.8rem', cursor: 'pointer', fontSize: '1rem', color: '#475569', display: 'flex', alignItems: 'center', gap: '0.3rem' }}
                            title="Próximo período"
                        >
                            Próximo →
                        </button>
                    </div>

                    {/* Filtro por Conta (multiselect) */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1.5rem', flexWrap: 'wrap' }}>
                        <span style={{ fontSize: '0.8rem', color: '#64748b', fontWeight: '500' }}>Conta:</span>
                        <div style={{ display: 'flex', gap: '0.3rem', flexWrap: 'wrap' }}>
                            <button
                                className={`cat-filter-pill ${filtroContas.length === 0 ? 'active' : ''}`}
                                onClick={() => setFiltroContas([])}
                            >Todas</button>
                            {(data.contas || []).filter(c => c.status !== 'arquivada').map(c => (
                                <button key={c.id}
                                    className={`cat-filter-pill ${filtroContas.includes(c.id) ? 'active' : ''}`}
                                    onClick={() => toggleConta(c.id)}
                                >{c.nome}</button>
                            ))}
                        </div>
                        {filtroContas.length > 0 && (
                            <span style={{ fontSize: '0.75rem', color: '#f59e0b', fontStyle: 'italic' }}>
                                Filtrado por {filtroContas.length} conta{filtroContas.length > 1 ? 's' : ''}
                            </span>
                        )}
                    </div>

                    {/* Filtro de Reembolsáveis */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '1.5rem', flexWrap: 'wrap' }}>
                        <span style={{ fontSize: '0.8rem', color: '#64748b', fontWeight: '500' }}>Reembolsáveis:</span>
                        <div style={{ display: 'flex', gap: '0.3rem', flexWrap: 'wrap' }}>
                            <button
                                className={`cat-filter-pill ${excluirReembolsaveis ? 'active' : ''}`}
                                onClick={() => setExcluirReembolsaveis(true)}
                            >Excluir reembolsáveis</button>
                            <button
                                className={`cat-filter-pill ${!excluirReembolsaveis ? 'active' : ''}`}
                                onClick={() => setExcluirReembolsaveis(false)}
                            >Incluir reembolsáveis</button>
                        </div>
                        {!excluirReembolsaveis && (
                            <span style={{ fontSize: '0.75rem', color: '#f59e0b', fontStyle: 'italic' }}>
                                Gastos reembolsáveis estão incluídos nos cálculos
                            </span>
                        )}
                    </div>

                    {/* Metas */}
                    <div style={{ marginBottom: '2rem' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                            <h3 className="section-title" style={{ margin: 0 }}>🎯 Metas</h3>
                            <button className="button button-primary" style={{ fontSize: '0.85rem', padding: '0.4rem 1rem' }} onClick={openNewMeta}>
                                + Nova Meta
                            </button>
                        </div>
                        {(data.metas || []).filter(m => m.ativa).length === 0 ? (
                            <div className="card" style={{ textAlign: 'center', padding: '2rem', color: '#94a3b8' }}>
                                <p style={{ fontSize: '2rem', margin: '0 0 0.5rem 0' }}>🎯</p>
                                <p style={{ margin: 0 }}>Nenhuma meta ativa. Crie sua primeira meta acima!</p>
                            </div>
                        ) : (
                            <div className="grid-2">
                                {(data.metas || []).filter(m => m.ativa).map(meta => {
                                    const progress = meta.valor_meta > 0 ? (meta.valor_atual / meta.valor_meta) * 100 : 0;
                                    const restante = (meta.valor_meta || 0) - (meta.valor_atual || 0);
                                    const mesesRestantes = meta.data_limite
                                        ? Math.max(1, Math.ceil((new Date(meta.data_limite) - new Date()) / (30 * 86400000)))
                                        : null;
                                    return (
                                        <div key={meta.id} className="card" style={{ cursor: 'pointer', position: 'relative' }}
                                            onClick={() => openEditMeta(meta)}>
                                            <div style={{ position: 'absolute', top: '1rem', right: '1rem', fontSize: '0.75rem', color: '#94a3b8' }}>
                                                ✏️ editar
                                            </div>
                                            <h4 style={{ margin: '0 0 0.75rem 0', fontSize: '1rem', fontWeight: '600', color: '#0f172a' }}>
                                                {meta.nome}
                                            </h4>
                                            <div className="progress-bar" style={{ marginBottom: '0.75rem' }}>
                                                <div className="progress-fill green" style={{ width: `${Math.min(progress, 100)}%` }}></div>
                                            </div>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.9rem' }}>
                                                <span style={{ color: '#64748b' }}>{formatCurrency(meta.valor_atual)} de {formatCurrency(meta.valor_meta)}</span>
                                                <span style={{ fontWeight: '600', color: progress >= 100 ? '#16a34a' : '#3b82f6' }}>{Math.round(progress)}%</span>
                                            </div>
                                            {mesesRestantes && (
                                                <p style={{ margin: '0.5rem 0 0 0', fontSize: '0.8rem', color: '#94a3b8' }}>
                                                    Faltam {mesesRestantes} meses • Precisa {formatCurrency(restante / mesesRestantes)}/mês
                                                </p>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>

                    {/* Orçamento vs Realizado */}
                    <div className="card" style={{ marginBottom: '2rem' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                            <h3 className="section-title" style={{ margin: 0 }}>📊 Orçamento vs Realizado</h3>
                            <p style={{ margin: 0, fontSize: '0.75rem', color: '#94a3b8' }}>
                                {period === 'semana' ? 'Teto semanal = teto mensal ÷ semanas do mês' : 'Clique no valor orçado para editar o teto'}
                            </p>
                        </div>
                        <table className="table">
                            <thead className="table-header">
                                <tr>
                                    <th>Categoria</th>
                                    <th>Orçado ({period === 'semana' ? 'teto semanal' : period === 'trimestre' ? 'teto trimestral' : period === 'semestre' ? 'teto semestral' : period === 'ano' ? 'teto anual' : 'teto'})</th>
                                    <th>Realizado</th>
                                    <th>Diferença</th>
                                    <th>%</th>
                                </tr>
                            </thead>
                            <tbody>
                                {(data.categorias || []).filter(c => c.tipo !== 'transferencia' && (c.teto > 0 || lancamentosFiltrados.some(l => l.categoria_id === c.id))).map(cat => {
                                    const spent = lancamentosFiltrados
                                        .filter(l => l.categoria_id === cat.id && isDespesaReal(l))
                                        .reduce((sum, l) => sum + l.valor, 0);
                                    // Ajusta teto conforme período selecionado
                                    const tetoAjustado = cat.teto > 0
                                        ? (period === 'semana' ? cat.teto / semanasNoMes
                                            : period === 'trimestre' ? cat.teto * 3
                                            : period === 'semestre' ? cat.teto * 6
                                            : period === 'ano' ? cat.teto * 12
                                            : cat.teto)
                                        : 0;
                                    const diff = tetoAjustado > 0 ? spent - tetoAjustado : 0;
                                    const pct = tetoAjustado > 0 ? (spent / tetoAjustado) * 100 : 0;

                                    return (
                                        <tr key={cat.id} className="table-row">
                                            <td>{cat.emoji} {cat.nome}</td>
                                            <td style={{ cursor: 'pointer' }}
                                                onClick={() => { setEditingTeto(cat.id); setTetoVal(cat.teto || 0); }}>
                                                {editingTeto === cat.id ? (
                                                    <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                                                        <InputMoeda
                                                            value={tetoVal} onChange={v => setTetoVal(v || 0)}
                                                            style={{ width: '120px', padding: '0.3rem 0.5rem', fontSize: '0.85rem' }}
                                                            autoFocus={true}
                                                            onKeyDown={e => { if (e.key === 'Enter') handleSaveTeto(cat); if (e.key === 'Escape') setEditingTeto(null); }}
                                                        />
                                                        <button className="button button-primary" style={{ padding: '0.3rem 0.6rem', fontSize: '0.75rem' }}
                                                            onClick={(e) => { e.stopPropagation(); handleSaveTeto(cat); }}>OK</button>
                                                    </div>
                                                ) : (
                                                    <span style={{ borderBottom: '1px dashed #94a3b8', color: '#3b82f6', fontWeight: '500' }}>
                                                        {cat.teto > 0 ? formatCurrency(tetoAjustado) : '—  definir'}
                                                    </span>
                                                )}
                                            </td>
                                            <td>{formatCurrency(spent)}</td>
                                            <td style={{ color: diff > 0 ? '#ef4444' : '#16a34a', fontWeight: '600' }}>
                                                {tetoAjustado > 0 ? ((diff > 0 ? '+' : '') + formatCurrency(diff)) : '—'}
                                            </td>
                                            <td style={{ color: pct > 100 ? '#ef4444' : pct > 90 ? '#eab308' : '#16a34a', fontWeight: '600' }}>
                                                {tetoAjustado > 0 ? Math.round(pct) + '%' : '—'}
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>

                    {/* Curva de Gastos Acumulados */}
                    {(() => {
                        // Filtra lançamentos relevantes (despesas reais + filtro de conta)
                        const lancBaseAll = (data.lancamentos || []).filter(l => isDespesaReal(l));
                        const lancBase = filtroContas.length > 0 ? lancBaseAll.filter(l => filtroContas.includes(l.conta_origem)) : lancBaseAll;
                        const lancParaCurva = curvaCategorias.length > 0
                            ? lancBase.filter(l => curvaCategorias.includes(l.categoria_id))
                            : lancBase;

                        // Teto total (soma das categorias selecionadas ou de todas)
                        const tetoMensalTotal = curvaCategorias.length > 0
                            ? (data.categorias || []).filter(c => curvaCategorias.includes(c.id))
                                .reduce((s, c) => s + (c.teto || 0), 0)
                            : (data.categorias || []).filter(c => c.tipo !== 'transferencia' && c.teto > 0)
                                .reduce((s, c) => s + c.teto, 0);

                        // Gera pontos conforme o período
                        let pontos = []; // { label, acumulado, ideal }
                        const hojeRef = new Date();

                        if (period === 'semana') {
                            // 7 dias: seg a dom
                            const diasNomes = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'];
                            const tetoSemanal = tetoMensalTotal / semanasNoMes;
                            let acum = 0;
                            for (let i = 0; i < 7; i++) {
                                const dia = new Date(inicioSemana);
                                dia.setDate(inicioSemana.getDate() + i);
                                const diaStr = dia.toISOString().slice(0, 10);
                                const gastosDia = lancParaCurva
                                    .filter(l => l.data && l.data.slice(0, 10) === diaStr)
                                    .reduce((s, l) => s + l.valor, 0);
                                acum += gastosDia;
                                const ideal = tetoSemanal * ((i + 1) / 7);
                                const isFuturo = dia > hojeRef;
                                pontos.push({ label: diasNomes[i], acumulado: isFuturo ? null : acum, ideal, diaLabel: `${String(dia.getDate()).padStart(2,'0')}/${String(dia.getMonth()+1).padStart(2,'0')}` });
                            }
                        } else if (period === 'mes') {
                            // Semanas do mês
                            const anoAtual = hojeRef.getFullYear();
                            const mesAtual = hojeRef.getMonth();
                            const primeiroDia = new Date(anoAtual, mesAtual, 1);
                            const diasMes = new Date(anoAtual, mesAtual + 1, 0).getDate();
                            // Divide mês em semanas (seg-dom)
                            let semanas = [];
                            let inicioSem = new Date(primeiroDia);
                            while (inicioSem.getMonth() === mesAtual) {
                                const fimSem = new Date(inicioSem);
                                fimSem.setDate(inicioSem.getDate() + 6);
                                if (fimSem.getMonth() !== mesAtual || fimSem.getDate() > diasMes) {
                                    fimSem.setFullYear(anoAtual, mesAtual, diasMes);
                                }
                                semanas.push({ inicio: new Date(inicioSem), fim: new Date(fimSem) });
                                inicioSem = new Date(fimSem);
                                inicioSem.setDate(fimSem.getDate() + 1);
                            }
                            let acum = 0;
                            semanas.forEach((sem, idx) => {
                                const gastosSem = lancParaCurva.filter(l => {
                                    if (!l.data) return false;
                                    const d = parseDataLocal(l.data);
                                    return d >= sem.inicio && d <= new Date(sem.fim.getFullYear(), sem.fim.getMonth(), sem.fim.getDate(), 23, 59, 59);
                                }).reduce((s, l) => s + l.valor, 0);
                                acum += gastosSem;
                                const ideal = tetoMensalTotal * ((idx + 1) / semanas.length);
                                const isFuturo = sem.inicio > hojeRef;
                                pontos.push({
                                    label: `Sem ${idx + 1}`,
                                    acumulado: isFuturo ? null : acum,
                                    ideal,
                                    diaLabel: `${String(sem.inicio.getDate()).padStart(2,'0')}/${String(sem.inicio.getMonth()+1).padStart(2,'0')} - ${String(sem.fim.getDate()).padStart(2,'0')}/${String(sem.fim.getMonth()+1).padStart(2,'0')}`
                                });
                            });
                        } else {
                            // Trimestre, semestre, ano: por mês
                            const mesesMap = { trimestre: 3, semestre: 6, ano: 12 };
                            const numMeses = mesesMap[period] || 1;
                            const tetoPeriodo = tetoMensalTotal * numMeses;
                            const mesNomes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
                            const mesInicio = period === 'trimestre' ? Math.floor(hojeRef.getMonth() / 3) * 3
                                : period === 'semestre' ? (hojeRef.getMonth() >= 6 ? 6 : 0)
                                : 0;
                            let acum = 0;
                            for (let i = 0; i < numMeses; i++) {
                                const mesIdx = mesInicio + i;
                                const inicioM = new Date(hojeRef.getFullYear(), mesIdx, 1);
                                const fimM = new Date(hojeRef.getFullYear(), mesIdx + 1, 0, 23, 59, 59);
                                const gastosM = lancParaCurva.filter(l => {
                                    if (!l.data) return false;
                                    const d = parseDataLocal(l.data);
                                    return d >= inicioM && d <= fimM;
                                }).reduce((s, l) => s + l.valor, 0);
                                acum += gastosM;
                                const ideal = tetoPeriodo * ((i + 1) / numMeses);
                                const isFuturo = inicioM > hojeRef;
                                pontos.push({
                                    label: mesNomes[mesIdx] || `M${mesIdx+1}`,
                                    acumulado: isFuturo ? null : acum,
                                    ideal,
                                    diaLabel: mesNomes[mesIdx] + '/' + hojeRef.getFullYear()
                                });
                            }
                        }

                        // Último ponto real
                        const ultimoPontoIdx = pontos.reduce((acc, p, i) => p.acumulado !== null ? i : acc, -1);

                        // Teto total do período
                        const tetoPeriodoTotal = period === 'semana' ? tetoMensalTotal / semanasNoMes
                            : period === 'trimestre' ? tetoMensalTotal * 3
                            : period === 'semestre' ? tetoMensalTotal * 6
                            : period === 'ano' ? tetoMensalTotal * 12
                            : tetoMensalTotal;

                        // Ritmo sugerido: do último ponto real até o teto no final
                        const gastoAtual = ultimoPontoIdx >= 0 ? pontos[ultimoPontoIdx].acumulado : 0;
                        const ciclosRestantes = pontos.length - 1 - ultimoPontoIdx;
                        const faltaGastar = tetoPeriodoTotal - gastoAtual;
                        const tetoEstourado = gastoAtual > tetoPeriodoTotal;
                        const sugeridoPorCiclo = ciclosRestantes > 0 && !tetoEstourado ? faltaGastar / ciclosRestantes : 0;
                        const excessoValor = tetoEstourado ? gastoAtual - tetoPeriodoTotal : 0;

                        // Gera pontos projetados (sugeridos) para ciclos futuros
                        let pontosProjetados = [];
                        if (ultimoPontoIdx >= 0 && ultimoPontoIdx < pontos.length - 1 && tetoPeriodoTotal > 0) {
                            let acumProj = gastoAtual;
                            for (let i = ultimoPontoIdx + 1; i < pontos.length; i++) {
                                if (tetoEstourado) {
                                    acumProj = gastoAtual;
                                } else {
                                    acumProj += sugeridoPorCiclo;
                                }
                                pontosProjetados.push({
                                    idx: i,
                                    acumuladoSugerido: Math.min(acumProj, tetoEstourado ? gastoAtual : tetoPeriodoTotal),
                                    label: pontos[i].label,
                                    diaLabel: pontos[i].diaLabel
                                });
                            }
                        }

                        // SVG dimensions
                        const W = 700, H = 280, pad = { top: 20, right: 30, bottom: 40, left: 65 };
                        const chartW = W - pad.left - pad.right;
                        const chartH = H - pad.top - pad.bottom;

                        const maxVal = Math.max(
                            ...pontos.map(p => p.ideal),
                            ...pontos.filter(p => p.acumulado !== null).map(p => p.acumulado),
                            ...pontosProjetados.map(p => p.acumuladoSugerido),
                            tetoPeriodoTotal,
                            1
                        ) * 1.1;

                        const xStep = pontos.length > 1 ? chartW / (pontos.length - 1) : chartW;
                        const toX = (i) => pad.left + i * xStep;
                        const toY = (v) => pad.top + chartH - (v / maxVal) * chartH;

                        // Ideal line path
                        const idealPath = pontos.map((p, i) => `${i === 0 ? 'M' : 'L'}${toX(i)},${toY(p.ideal)}`).join(' ');

                        // Actual line path (only non-null points)
                        const actualPontos = pontos.filter(p => p.acumulado !== null);
                        const actualPath = actualPontos.map((p, i) => {
                            const origIdx = pontos.indexOf(p);
                            return `${i === 0 ? 'M' : 'L'}${toX(origIdx)},${toY(p.acumulado)}`;
                        }).join(' ');

                        // Fill area between actual and ideal
                        let fillAreas = [];
                        if (actualPontos.length >= 2) {
                            for (let i = 0; i < actualPontos.length - 1; i++) {
                                const idx1 = pontos.indexOf(actualPontos[i]);
                                const idx2 = pontos.indexOf(actualPontos[i + 1]);
                                const a1 = actualPontos[i].acumulado, a2 = actualPontos[i + 1].acumulado;
                                const id1 = pontos[idx1].ideal, id2 = pontos[idx2].ideal;
                                const above = (a1 + a2) / 2 > (id1 + id2) / 2;
                                fillAreas.push(
                                    <polygon key={i}
                                        points={`${toX(idx1)},${toY(a1)} ${toX(idx2)},${toY(a2)} ${toX(idx2)},${toY(id2)} ${toX(idx1)},${toY(id1)}`}
                                        fill={above ? 'rgba(239,68,68,0.10)' : 'rgba(34,197,94,0.10)'}
                                    />
                                );
                            }
                        }

                        // Y-axis ticks
                        const yTicks = 5;
                        const yTickVals = Array.from({ length: yTicks + 1 }).map((_, i) => (maxVal / yTicks) * i);

                        // Categorias com teto para o filtro
                        const catsComTeto = (data.categorias || []).filter(c => c.tipo !== 'transferencia' && c.teto > 0);

                        return (
                            <div className="card" style={{ marginBottom: '2rem' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.75rem', flexWrap: 'wrap', gap: '0.5rem' }}>
                                    <div>
                                        <h3 className="section-title" style={{ margin: 0 }}>📈 Curva de Gastos Acumulados</h3>
                                        <p style={{ margin: '0.25rem 0 0 0', fontSize: '0.75rem', color: '#94a3b8' }}>
                                            Acompanhe se os gastos estão dentro do ritmo planejado
                                        </p>
                                    </div>
                                </div>

                                {/* Category filter pills */}
                                <div style={{ display: 'flex', gap: '0.3rem', flexWrap: 'wrap', marginBottom: '1rem' }}>
                                    <button
                                        className={`cat-filter-pill ${curvaCategorias.length === 0 ? 'active' : ''}`}
                                        onClick={() => setCurvaCategorias([])}
                                    >Todas</button>
                                    {catsComTeto.map(c => (
                                        <button key={c.id}
                                            className={`cat-filter-pill ${curvaCategorias.includes(c.id) ? 'active' : ''}`}
                                            onClick={() => toggleCurvaCat(c.id)}
                                        >{c.emoji} {c.nome}</button>
                                    ))}
                                    {curvaCategorias.length > 0 && (
                                        <span style={{ fontSize: '0.75rem', color: '#64748b', fontStyle: 'italic' }}>
                                            {curvaCategorias.length} categoria{curvaCategorias.length > 1 ? 's' : ''} · Teto mensal somado: {formatCurrency(tetoMensalTotal)} · Teto do período: {formatCurrency(tetoPeriodoTotal)}
                                        </span>
                                    )}
                                </div>

                                {tetoMensalTotal === 0 ? (
                                    <div style={{ textAlign: 'center', padding: '2rem', color: '#94a3b8' }}>
                                        <p>Defina tetos para suas categorias na tabela acima para ver o gráfico.</p>
                                    </div>
                                ) : (
                                    <div style={{ position: 'relative' }}>
                                        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', overflow: 'visible' }}>
                                            {/* Grid lines */}
                                            {yTickVals.map((v, i) => (
                                                <g key={i}>
                                                    <line x1={pad.left} y1={toY(v)} x2={W - pad.right} y2={toY(v)}
                                                        stroke="#e2e8f0" strokeWidth="1" strokeDasharray={i === 0 ? '' : '4,4'} />
                                                    <text x={pad.left - 8} y={toY(v) + 4} textAnchor="end"
                                                        fontSize="10" fill="#94a3b8">
                                                        {v >= 1000 ? (v/1000).toFixed(1) + 'k' : Math.round(v)}
                                                    </text>
                                                </g>
                                            ))}

                                            {/* X-axis labels */}
                                            {pontos.map((p, i) => (
                                                <text key={i} x={toX(i)} y={H - 8} textAnchor="middle"
                                                    fontSize="11" fill="#64748b" fontWeight="500">
                                                    {p.label}
                                                </text>
                                            ))}

                                            {/* Fill areas */}
                                            {fillAreas}

                                            {/* Ideal line (dashed) */}
                                            <path d={idealPath} fill="none" stroke="#94a3b8" strokeWidth="2" strokeDasharray="6,4" />

                                            {/* Actual line */}
                                            {actualPontos.length > 0 && (
                                                <path d={actualPath} fill="none" stroke="#3b82f6" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                                            )}

                                            {/* Ideal endpoint dot */}
                                            {pontos.length > 0 && (
                                                <circle cx={toX(pontos.length - 1)} cy={toY(pontos[pontos.length - 1].ideal)}
                                                    r="4" fill="#94a3b8" opacity="0.5" />
                                            )}

                                            {/* Actual dots */}
                                            {pontos.map((p, i) => p.acumulado !== null && (
                                                <circle key={i} cx={toX(i)} cy={toY(p.acumulado)}
                                                    r={hoveredPoint === i ? 6 : 4}
                                                    fill={p.acumulado > p.ideal ? '#ef4444' : '#22c55e'}
                                                    stroke="#fff" strokeWidth="2"
                                                    style={{ cursor: 'pointer', transition: 'r 0.15s' }}
                                                    onMouseEnter={() => setHoveredPoint(i)}
                                                    onMouseLeave={() => setHoveredPoint(null)}
                                                />
                                            ))}

                                            {/* Suggested pace line (green dashed) */}
                                            {pontosProjetados.length > 0 && ultimoPontoIdx >= 0 && (() => {
                                                const projPath = [
                                                    `M${toX(ultimoPontoIdx)},${toY(gastoAtual)}`,
                                                    ...pontosProjetados.map(p => `L${toX(p.idx)},${toY(p.acumuladoSugerido)}`)
                                                ].join(' ');
                                                return (
                                                    <g>
                                                        <path d={projPath} fill="none"
                                                            stroke={tetoEstourado ? '#ef4444' : '#22c55e'}
                                                            strokeWidth="2" strokeDasharray="5,4"
                                                            opacity="0.8" />
                                                        {pontosProjetados.map(p => (
                                                            <circle key={`proj-${p.idx}`}
                                                                cx={toX(p.idx)} cy={toY(p.acumuladoSugerido)}
                                                                r={hoveredPoint === p.idx ? 6 : 4}
                                                                fill={tetoEstourado ? '#ef4444' : '#22c55e'}
                                                                stroke="#fff" strokeWidth="2"
                                                                opacity="0.6"
                                                                style={{ cursor: 'pointer', transition: 'r 0.15s' }}
                                                                onMouseEnter={() => setHoveredPoint(p.idx)}
                                                                onMouseLeave={() => setHoveredPoint(null)}
                                                            />
                                                        ))}
                                                    </g>
                                                );
                                            })()}

                                            {/* Tooltip (real or projected) */}
                                            {hoveredPoint !== null && (() => {
                                                const projPonto = pontosProjetados.find(p => p.idx === hoveredPoint);
                                                const realPonto = pontos[hoveredPoint];
                                                if (!realPonto) return null;
                                                const isProj = projPonto && realPonto.acumulado === null;
                                                if (!isProj && realPonto.acumulado === null) return null;
                                                const val = isProj ? projPonto.acumuladoSugerido : realPonto.acumulado;
                                                const labelDia = isProj ? projPonto.diaLabel : (realPonto.diaLabel || realPonto.label);
                                                const x = toX(hoveredPoint);
                                                const y = toY(val);
                                                const diff = val - realPonto.ideal;
                                                const tooltipH2 = isProj ? 68 : 68;
                                                const tooltipW2 = isProj ? 200 : 175;
                                                let tx2 = x - tooltipW2 / 2;
                                                let ty2 = y - tooltipH2 - 12;
                                                if (tx2 < pad.left) tx2 = pad.left;
                                                if (tx2 + tooltipW2 > W - pad.right) tx2 = W - pad.right - tooltipW2;
                                                if (ty2 < 0) ty2 = y + 16;
                                                return (
                                                    <g>
                                                        <line x1={x} y1={pad.top} x2={x} y2={pad.top + chartH} stroke="#cbd5e1" strokeWidth="1" strokeDasharray="3,3" />
                                                        <rect x={tx2} y={ty2} width={tooltipW2} height={tooltipH2} rx="6"
                                                            fill="#0f172a" opacity="0.92" />
                                                        <text x={tx2 + 10} y={ty2 + 16} fontSize="10" fill="#94a3b8" fontWeight="600">
                                                            {labelDia}{isProj ? ' (sugerido)' : ''}
                                                        </text>
                                                        <text x={tx2 + 10} y={ty2 + 32} fontSize="11"
                                                            fill={isProj ? '#4ade80' : '#60a5fa'} fontWeight="600">
                                                            {isProj ? 'Acumulado sugerido' : 'Gasto'}: R$ {val.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                                                        </text>
                                                        <text x={tx2 + 10} y={ty2 + 47} fontSize="11" fill="#94a3b8">
                                                            Ideal: R$ {realPonto.ideal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                                                        </text>
                                                        <text x={tx2 + 10} y={ty2 + 62} fontSize="11"
                                                            fill={isProj ? '#4ade80' : (diff > 0 ? '#f87171' : '#4ade80')} fontWeight="600">
                                                            {isProj
                                                                ? (tetoEstourado ? `Teto estourado — pare de gastar` : `Gastar no max. ${formatCurrency(sugeridoPorCiclo)}/${period === 'semana' ? 'dia' : period === 'mes' ? 'semana' : 'mes'}`)
                                                                : `${diff > 0 ? '+' : ''}${formatCurrency(diff)} (${diff > 0 ? 'acima' : 'abaixo'})`
                                                            }
                                                        </text>
                                                    </g>
                                                );
                                            })()}
                                        </svg>

                                        {/* Legend */}
                                        <div style={{ display: 'flex', gap: '1.5rem', justifyContent: 'center', marginTop: '0.5rem', fontSize: '0.8rem', flexWrap: 'wrap' }}>
                                            <span style={{ display: 'flex', alignItems: 'center', gap: '0.4rem' }}>
                                                <span style={{ width: '20px', height: '2.5px', background: '#3b82f6', display: 'inline-block', borderRadius: '2px' }}></span>
                                                <span style={{ color: '#64748b' }}>Gasto acumulado</span>
                                            </span>
                                            <span style={{ display: 'flex', alignItems: 'center', gap: '0.4rem' }}>
                                                <span style={{ width: '20px', height: '0', borderTop: '2px dashed #94a3b8', display: 'inline-block' }}></span>
                                                <span style={{ color: '#64748b' }}>Ritmo ideal (teto)</span>
                                            </span>
                                            <span style={{ display: 'flex', alignItems: 'center', gap: '0.4rem' }}>
                                                <span style={{ width: '20px', height: '0', borderTop: '2px dashed #22c55e', display: 'inline-block' }}></span>
                                                <span style={{ color: '#64748b' }}>Ritmo sugerido</span>
                                            </span>
                                            <span style={{ display: 'flex', alignItems: 'center', gap: '0.4rem' }}>
                                                <span style={{ width: '10px', height: '10px', background: 'rgba(34,197,94,0.2)', border: '1px solid rgba(34,197,94,0.4)', display: 'inline-block', borderRadius: '2px' }}></span>
                                                <span style={{ color: '#64748b' }}>Dentro do ritmo</span>
                                            </span>
                                            <span style={{ display: 'flex', alignItems: 'center', gap: '0.4rem' }}>
                                                <span style={{ width: '10px', height: '10px', background: 'rgba(239,68,68,0.15)', border: '1px solid rgba(239,68,68,0.3)', display: 'inline-block', borderRadius: '2px' }}></span>
                                                <span style={{ color: '#64748b' }}>Acima do ritmo</span>
                                            </span>
                                        </div>

                                        {/* Indicador de ritmo sugerido */}
                                        {tetoPeriodoTotal > 0 && ultimoPontoIdx >= 0 && (
                                            <div style={{
                                                marginTop: '1rem',
                                                padding: '1rem 1.25rem',
                                                borderRadius: '10px',
                                                background: tetoEstourado ? '#fef2f2' : (ciclosRestantes > 0 ? '#f0fdf4' : '#f8fafc'),
                                                border: `1px solid ${tetoEstourado ? '#fecaca' : (ciclosRestantes > 0 ? '#bbf7d0' : '#e2e8f0')}`
                                            }}>
                                                {(() => {
                                                    // Nomes descritivos para o período e subdivisão
                                                    const mesNomes = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
                                                    const nomePeriodo = period === 'semana' ? 'a semana'
                                                        : period === 'mes' ? mesNomes[hojeRef.getMonth()]
                                                        : period === 'trimestre' ? 'o trimestre'
                                                        : period === 'semestre' ? 'o semestre'
                                                        : 'o ano';
                                                    const unidadeSub = period === 'semana' ? 'dia' : period === 'mes' ? 'semana' : 'mês';
                                                    const unidadeSubPlural = period === 'semana' ? 'dias' : period === 'mes' ? 'semanas' : 'meses';

                                                    if (tetoEstourado) return (
                                                        <div>
                                                            <p style={{ margin: 0, fontSize: '0.9rem', fontWeight: '600', color: '#ef4444' }}>
                                                                🚫 Teto de {nomePeriodo} ultrapassado em {formatCurrency(excessoValor)}
                                                            </p>
                                                            <p style={{ margin: '0.35rem 0 0 0', fontSize: '0.8rem', color: '#64748b' }}>
                                                                Tente não gastar mais nesta categoria até o fim {period === 'semana' ? 'da semana' : period === 'mes' ? 'do mês' : 'do período'}.
                                                            </p>
                                                        </div>
                                                    );
                                                    if (ciclosRestantes > 0) return (
                                                        <div>
                                                            <p style={{ margin: 0, fontSize: '0.9rem', fontWeight: '600', color: '#16a34a' }}>
                                                                💡 Para fechar {nomePeriodo} no teto: você ainda pode gastar {formatCurrency(faltaGastar)}
                                                            </p>
                                                            <p style={{ margin: '0.35rem 0 0 0', fontSize: '0.8rem', color: '#64748b' }}>
                                                                {ciclosRestantes === 1
                                                                    ? `Falta 1 ${unidadeSub}, então esse é o limite para ${period === 'semana' ? 'amanhã' : 'a próxima ' + unidadeSub}.`
                                                                    : `Como faltam ${ciclosRestantes} ${unidadeSubPlural}, isso dá ${formatCurrency(sugeridoPorCiclo)}/${unidadeSub}.`
                                                                }
                                                                {gastoAtual > pontos[ultimoPontoIdx].ideal
                                                                    ? ` Você está ${formatCurrency(gastoAtual - pontos[ultimoPontoIdx].ideal)} acima do ritmo ideal — desacelere um pouco.`
                                                                    : ` Você está dentro do ritmo ideal — continue assim!`
                                                                }
                                                            </p>
                                                        </div>
                                                    );
                                                    return (
                                                        <p style={{ margin: 0, fontSize: '0.85rem', color: '#64748b' }}>
                                                            Período encerrado. Gasto total: {formatCurrency(gastoAtual)} de {formatCurrency(tetoPeriodoTotal)} ({Math.round(gastoAtual / tetoPeriodoTotal * 100)}%).
                                                        </p>
                                                    );
                                                })()}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        );
                    })()}

                    {/* Ritmo de Economia */}
                    <div className="card" style={{ marginBottom: '2rem' }}>
                        <h3 className="section-title" style={{ margin: '0 0 1.5rem 0' }}>💰 Ritmo de Economia</h3>
                        <div className="grid-2">
                            <div style={{ padding: '1.25rem', background: '#f8fafc', borderRadius: '10px', border: '1px solid #e2e8f0' }}>
                                <p style={{ margin: 0, fontSize: '0.8rem', color: '#64748b', textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                                    Precisa economizar/{period === 'semana' ? 'semana' : 'mês'}
                                </p>
                                <p style={{ margin: '0.5rem 0 0 0', fontSize: '1.5rem', fontWeight: '700', color: '#0f172a' }}>
                                    {formatCurrency(period === 'semana' ? requiredSavings / semanasNoMes : requiredSavings)}
                                </p>
                                <p style={{ margin: '0.25rem 0 0 0', fontSize: '0.75rem', color: '#94a3b8' }}>
                                    Para atingir todas as metas ativas no prazo
                                </p>
                            </div>
                            <div style={{ padding: '1.25rem', background: monthSavings >= requiredSavings ? '#f0fdf4' : '#fffbeb', borderRadius: '10px', border: `1px solid ${monthSavings >= requiredSavings ? '#bbf7d0' : '#fcd34d'}` }}>
                                <p style={{ margin: 0, fontSize: '0.8rem', color: monthSavings >= requiredSavings ? '#166534' : '#92400e', textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                                    {period === 'semana' ? 'Balanço da semana' : 'Economizando agora/mês'}
                                </p>
                                <p style={{ margin: '0.5rem 0 0 0', fontSize: '1.5rem', fontWeight: '700', color: monthSavings >= 0 ? '#16a34a' : '#ef4444' }}>
                                    {formatCurrency(monthSavings)}
                                </p>
                                <p style={{ margin: '0.25rem 0 0 0', fontSize: '0.75rem', color: '#94a3b8' }}>
                                    Receitas ({formatCurrency(monthIncome)}) - Despesas ({formatCurrency(monthExpenses)})
                                </p>
                            </div>
                        </div>

                        <div style={{ marginTop: '1.25rem', padding: '1rem', borderRadius: '8px', background: monthSavings >= requiredSavings ? '#f0fdf4' : '#fef2f2' }}>
                            <p style={{ margin: 0, fontSize: '0.9rem', fontWeight: '600', color: monthSavings >= requiredSavings ? '#16a34a' : '#ef4444' }}>
                                {monthSavings >= requiredSavings
                                    ? '✅ No ritmo certo! Você está economizando o suficiente para atingir suas metas.'
                                    : `⚠️ Atenção: faltam ${formatCurrency(requiredSavings - monthSavings)}/${period === 'semana' ? 'semana' : 'mês'} para atingir suas metas no prazo.`}
                            </p>
                        </div>
                    </div>

                    {/* Projeções */}
                    {(() => {
                        const hoje = new Date();
                        const diaHoje = hoje.getDate();
                        const diasMes = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0).getDate();
                        const diasRestantes = diasMes - diaHoje;
                        const ritmoDiario = diaHoje > 0 ? monthExpenses / diaHoje : 0;
                        const despesaProjetadaBase = monthExpenses + (ritmoDiario * diasRestantes);
                        // Cenários: otimista gasta 15% menos que o ritmo, conservador 15% mais
                        const fatorOtimista = 0.85;
                        const fatorConservador = 1.15;
                        const despOtimista = monthExpenses + (ritmoDiario * fatorOtimista * diasRestantes);
                        const despConservador = monthExpenses + (ritmoDiario * fatorConservador * diasRestantes);
                        const sobraOtimista = monthIncome - despOtimista;
                        const sobraBase = monthIncome - despesaProjetadaBase;
                        const sobraConservador = monthIncome - despConservador;

                        const cenarios = [
                            { nome: 'Otimista', desc: 'Ritmo desacelera 15%', despProj: despOtimista, sobra: sobraOtimista, bg: '#f0fdf4', border: '#bbf7d0', color: '#16a34a', labelColor: '#166534' },
                            { nome: 'Realista', desc: 'Mantém ritmo atual', despProj: despesaProjetadaBase, sobra: sobraBase, bg: '#fffbeb', border: '#fcd34d', color: '#f59e0b', labelColor: '#b45309' },
                            { nome: 'Conservador', desc: 'Ritmo acelera 15%', despProj: despConservador, sobra: sobraConservador, bg: '#fee2e2', border: '#fecaca', color: '#ef4444', labelColor: '#991b1b' },
                        ];

                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '1.25rem' }}>
                                    <h3 className="section-title" style={{ margin: 0 }}>🔮 Projeção de Fechamento do Mês</h3>
                                </div>

                                {/* Como funciona */}
                                <div style={{ padding: '0.85rem 1rem', background: '#f8fafc', borderRadius: '8px', marginBottom: '1.25rem', fontSize: '0.8rem', color: '#64748b', lineHeight: '1.6' }}>
                                    <strong style={{ color: '#475569' }}>Como calculamos:</strong> Você gastou {formatCurrency(monthExpenses)} em {diaHoje} dias
                                    (ritmo de {formatCurrency(ritmoDiario)}/dia).
                                    Faltam {diasRestantes} dias no mês.
                                    Projetamos 3 cenários variando esse ritmo.
                                </div>

                                <div className="grid-3">
                                    {cenarios.map(c => (
                                        <div key={c.nome} style={{ padding: '1.25rem', background: c.bg, borderRadius: '10px', border: `1px solid ${c.border}` }}>
                                            <p style={{ margin: 0, fontSize: '0.75rem', color: c.labelColor, fontWeight: '700', textTransform: 'uppercase', letterSpacing: '0.05em' }}>{c.nome}</p>
                                            <p style={{ margin: '0.2rem 0 0 0', fontSize: '0.7rem', color: '#94a3b8' }}>{c.desc}</p>

                                    {[

                    })()}

                    {/* Modal de Meta */}
                    {metaModal}

        }

        // Classificador inteligente de lançamentos
        // Helper: busca categoria por nome (fuzzy, case-insensitive, ignora acentos)
        function encontrarCategoriaPorNome(nome, categorias) {
            if (!nome || !categorias || categorias.length === 0) return null;
            const normalizar = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase().trim();
            const nomeNorm = normalizar(nome);
            // 1. Busca exata
            let cat = categorias.find(c => normalizar(c.nome) === nomeNorm);
            if (cat) return cat.id;
            // 2. Busca parcial (nome contém ou é contido)
            cat = categorias.find(c => normalizar(c.nome).includes(nomeNorm) || nomeNorm.includes(normalizar(c.nome)));
            if (cat) return cat.id;
            // 3. Busca por palavras-chave significativas (>3 chars)
            const palavras = nomeNorm.split(/[\s\/\-]+/).filter(p => p.length > 3);
            if (palavras.length > 0) {
                cat = categorias.find(c => {
                    const cn = normalizar(c.nome);
                    return palavras.some(p => cn.includes(p));
                });
                if (cat) return cat.id;
            }
            return null;
        }

        function classificarLancamento(descricao, regrasAprendidas, categorias) {
            const desc = (descricao || '').toUpperCase();

            // 1. Primeiro: checar regras aprendidas (banco de dados)
            if (regrasAprendidas && regrasAprendidas.length > 0) {
                for (const regra of regrasAprendidas) {
                    const padrao = (regra.padrao_texto || '').toUpperCase();
                    if (padrao && desc.includes(padrao)) {
                        // Verificar se a categoria da regra é um ID válido ou um nome
                        const catId = regra.categoria;
                        const catExiste = categorias.find(c => c.id === catId);
                        if (catExiste) {
                            return { categoria_id: catId, confianca: 'alta', metodo: 'regra_aprendida' };
                        }
                        // Se não é ID, tentar buscar por nome
                        const catPorNome = encontrarCategoriaPorNome(catId, categorias);
                        if (catPorNome) {
                            return { categoria_id: catPorNome, confianca: 'alta', metodo: 'regra_aprendida' };
                        }
                    }
                }
            }

            // 2. Segundo: padrões genéricos brasileiros
            const padroes = [
                // Supermercado
                { patterns: ['SUPERMERCADO', 'GIASSI', 'BISTEK', 'ANGELONI', 'CARREFOUR', 'ATACADAO', 'ATACADÃO', 'PAO DE ACUCAR', 'PÃO DE AÇÚCAR', 'EXTRA HIPER', 'WALMART', 'BIG ', 'ASSAI', 'ESKIMO', 'MATEUS COM'], cat: 'Supermercado' },
                // Restaurantes / Alimentação fora
                { patterns: ['RESTAURANTE', 'IFOOD', 'IFD ', 'UBER EATS', 'RAPPI', 'LANCHONETE', 'LANCHES', 'PIZZARIA', 'PIZZA', 'SUSHI', 'BURGER', 'MC DONALDS', 'BK ', 'SUBWAY', 'KFC', 'BOB S', 'CANTINHO', 'PASTEIS', 'PASTEL', 'ROTISSERIE', 'ACAI', 'AÇAÍ', 'CAFE ', 'CAFÉ', 'PADARIA', 'PANDA ORIGEM', 'CREPALDI', 'KALZONE', 'BRAZZA', 'MARMITA', 'DUNIS', 'GOURMET', 'CANTINA', 'BEER', 'BAR ', 'ESPETO', 'CHURRASCO'], cat: 'Restaurantes' },
                // Combustível
                { patterns: ['POSTO', 'SHELL', 'IPIRANGA', 'PETROSIMON', 'PETROBRAS', 'BR DISTRIBUIDORA', 'COMBUSTIVEL', 'GASOLINA', 'BRAMBILA', 'FRATELLI', 'ZANZI'], cat: 'Combustível' },
                // Transporte
                { patterns: ['UBER ', 'UBER*', '99 ', '99*', 'CABIFY', 'PEDAGIO', 'PEDÁGIO', 'ESTACIONAMENTO', 'VIACOSTEIRA', 'CCR ', 'ECORODOVIAS'], cat: 'Transporte' },
                // Saúde / Farmácia
                { patterns: ['FARMACIA', 'FARMÁCIA', 'DROGARIA', 'DROGA RAIA', 'DROGASIL', 'HOSPITAL', 'CLINICA', 'CLÍNICA', 'MEDIC', 'LABORAT', 'CONSULTA', 'SAO JOAO FARMA', 'PRECO POPULAR', 'MANIPUL'], cat: 'Saúde' },
                // Pet
                { patterns: ['PET ', 'COBASI', 'PETZ', 'VETERIN', 'AGROPECUARIA', 'AGROMANO', 'SUPER PET', 'RAÇÃO', 'RACAO'], cat: 'Pet' },
                // Educação
                { patterns: ['ESCOLA', 'FACULDADE', 'CURSO', 'LIVRO', 'UDEMY', 'ALURA', 'UNILIVROS'], cat: 'Educação' },
                // Lazer
                { patterns: ['CINEMA', 'CINEMARK', 'INGRESSO', 'TEATRO', 'PARQUE', 'DIVERSAO', 'GAME', 'LAN HOUSE', 'ATOM X'], cat: 'Lazer' },
                // Assinaturas
                { patterns: ['NETFLIX', 'SPOTIFY', 'DISNEY', 'AMAZON PRIME', 'HBO', 'APPLE', 'GOOGLE PLAY', 'YOUTUBE', 'XTECH'], cat: 'Assinaturas' },
                // Compras pessoais / Vestuário
                { patterns: ['RENNER', 'RIACHUELO', 'C&A', 'ZARA', 'HAVAN', 'LOJAS FATIMA', 'MODAS', 'PUKET', 'COSMETICOS', 'COSMÉTICO', 'ACESSORIOS', 'ACESSÓRIO', 'VILLA CENTRO', 'MILIUM', 'ME LINDA', 'FIOPPO'], cat: 'Compras Pessoais' },
                // Casa
                { patterns: ['CASA MARIA', 'COLOMBO', 'LEROY', 'TELHANORTE', 'MADEIRA', 'JARDIM E SELVA', 'FRIGELAR'], cat: 'Casa' },
                // Seguros / Porto
                { patterns: ['PORTO SEGURO AUTO', 'SEGURO', 'SULAMERICA', 'BRADESCO SEGURO'], cat: 'Seguros' },
                // Contas Fixas
                { patterns: ['ENEL', 'CPFL', 'SABESP', 'COMGAS', 'VIVO', 'CLARO', 'TIM ', 'OI ', 'INTERNET', 'CEMIG', 'COPASA', 'CELESC'], cat: 'Contas Fixas' },
                // Presentes / Doações
                { patterns: ['PRESENTE', 'ICASEI', 'IGREJA', 'DOACAO', 'DOAÇÃO'], cat: 'Presentes' },
                // === RECEITAS ===
                { patterns: ['SALÁRIO', 'SALARIO', 'SALÁRIO ORD'], cat: 'Salário' },
                { patterns: ['PRO-LABORE', 'PRÓ-LABORE', 'PROLABORE', 'PRO LABORE'], cat: 'Pró-labore' },
                { patterns: ['LUCROS E DIVIDENDOS', 'DIVIDENDO', 'DISTRIBUIÇÃO DE LUCRO'], cat: 'Pró-labore' },
                { patterns: ['FREELANCE', 'CONSULTORIA', 'SERVICO PRESTADO', 'SERVIÇO PRESTADO'], cat: 'Freelance / Extra' },
                { patterns: ['RENDIMENTO', 'JUROS POUPANCA', 'JUROS POUPANÇA', 'RESGATE CDB', 'RESGATE LCI'], cat: 'Rendimentos' },
                { patterns: ['REEMBOLSO', 'ESTORNO', 'DEVOLUÇÃO', 'DEVOLUCAO'], cat: 'Reembolso' },
                // === EXTRATO BANCÁRIO (padrões BB e geral) ===
                { patterns: ['COBRANÇA DE JUROS', 'JUROS SALDO DEVEDOR', 'IOF SALDO DEVEDOR', 'COBRANÇA DE I.O.F'], cat: 'Juros / IOF Bancário' },
                { patterns: ['TARIFA MSG', 'TARIFA PACOTE', 'TARIFA MENSAL', 'TARIFA BANCÁRIA'], cat: 'Tarifa Bancária' },
                { patterns: ['TELEFONE PRE-PAGO', 'RECARGA CELULAR'], cat: 'Telefone / Celular' },
                { patterns: ['CASAN', 'COPASA', 'SANEPAR', 'SABESP', 'FATURA DE ÁGUA', 'CONTA ÁGUA'], cat: 'Água' },
                { patterns: ['GOES EMPREENDIMENTOS', 'ALUGUEL', 'CONDOMÍNIO', 'CONDOMINIO'], cat: 'Moradia / Aluguel' },
                { patterns: ['COOPERA'], cat: 'Pagamento Cooperativa' },
                { patterns: ['FUNDACAO EDUCACIONAL', 'MENSALIDADE ESCOL', 'FACULDADE'], cat: 'Educação' },
                { patterns: ['LOCALIZA RENT', 'MOVIDA', 'UNIDAS'], cat: 'Transporte' },
                // Pagamentos de fatura de cartão (não são despesas, são movimentação)
                { patterns: ['NU PAGAMENTOS', 'NUBANK'], cat: 'Pagamento Fatura Cartão' },
                { patterns: ['FINANCEIRA ITAÚ', 'FINANCEIRA ITAU', 'ITAU CBD'], cat: 'Pagamento Fatura Cartão' },
                { patterns: ['BANCO C6', 'C6 BANK'], cat: 'Pagamento Fatura Cartão' },
                { patterns: ['CEA PAY', 'C&A PAY'], cat: 'Pagamento Fatura Cartão' },
                { patterns: ['PORTOSEG', 'PORTO SEGURO CARTAO', 'PORTO BANK'], cat: 'Pagamento Fatura Cartão' },
                // Pix e Boleto genéricos - não classificar automaticamente
                { patterns: ['PAGAMENTO DE BOLETO'], cat: '' },
                { patterns: ['PIX - ENVIADO', 'PIX AGENDADO', 'PIX PERIODICO'], cat: '' },
                // Receitas do BB
                { patterns: ['PORTABILIS'], cat: 'Pró-labore' },
                { patterns: ['PROVENTOS'], cat: 'Rendimentos' },
            ];

            for (const { patterns, cat } of padroes) {
                if (!cat) continue; // Pular padrões sem categoria (genéricos demais)
                for (const p of patterns) {
                    if (desc.includes(p)) {
                        const catId = encontrarCategoriaPorNome(cat, categorias);
                        if (catId) {
                            return { categoria_id: catId, confianca: 'media', metodo: 'padrao_generico' };
                        }
                        // Categoria não encontrada no cadastro — retornar como baixa confiança para revisão manual
                        return { categoria_id: '', confianca: 'baixa', metodo: 'padrao_sem_categoria', sugestao: cat };
                    }
                }
            }

            // 3. Não conseguiu classificar
            return { categoria_id: '', confianca: 'baixa', metodo: 'nao_classificado' };
        }

        // Import Component
        function Importar({ data, actions }) {
            const [cartaoSelecionado, setCartaoSelecionado] = useState('');
            const [preview, setPreview] = useState(null); // { linhas: [], nomeArquivo: '' }
            const [importando, setImportando] = useState(false);
            const [resultado, setResultado] = useState(null);
            const [lotes, setLotes] = useState([]); // histórico de importações
            const [deletandoLote, setDeletandoLote] = useState(null);
            const [regrasAprendidas, setRegrasAprendidas] = useState([]);
            const [classificacoes, setClassificacoes] = useState({});
            const [reembolsaveis, setReembolsaveis] = useState({}); // { indice: true/false }
            const [vinculosInvestimento, setVinculosInvestimento] = useState({}); // { indice: conta_id }
            const [saldosReservas, setSaldosReservas] = useState([]); // cache de saldos_historico para detectar duplicatas
            const [splitModal, setSplitModal] = useState(null); // { linhaIdx, original:{valor,descricao,categoria_id,tipo}, partes:[{valor,categoria_id,reembolsavel,descricao,tocadaManualmente}] }
            const [regrasSplit, setRegrasSplit] = useState([]); // regras de split aprendidas pelo usuário
            const fileRef = React.createRef();

            // Cartões disponíveis
            // Todas as contas ativas (não só cartões)
            const contasAtivas = data.contas.filter(c => c.status !== 'arquivada');
            const contaSelecionada = contasAtivas.find(c => c.id === cartaoSelecionado);
            const ehCartao = contaSelecionada?.tipo === 'cartao_credito';

            // Carregar histórico de importações (só recarrega em importações, não em exclusões)
            const [recarregarLotes, setRecarregarLotes] = useState(0);
            useEffect(() => {
                async function carregarLotes() {
                    const logs = await api.get('importacoes');
                    if (logs && Array.isArray(logs)) setLotes(logs);
                }
                carregarLotes();
            }, [recarregarLotes]);

            // Carregar regras aprendidas
            useEffect(() => {
                async function carregarRegras() {
                    const regras = await api.get('regras');
                    if (regras && Array.isArray(regras)) setRegrasAprendidas(regras);
                }
                carregarRegras();
            }, []);

            // Carregar regras de split (aprendizado automático de divisões recorrentes)
            useEffect(() => {
                async function carregarRegrasSplit() {
                    const rs = await api.get('regras_split');
                    if (rs && Array.isArray(rs)) setRegrasSplit(rs);
                }
                carregarRegrasSplit();
            }, []);

            // Aplica regras de split salvas sobre as linhas da preview recém-carregada.
            // Retorna null se nada mudou; caso contrário { linhas, classificacoes, reembolsaveis, totalAutoSplits }.
            const expandirComRegrasSplit = (linhasRaw, regras) => {
                if (!linhasRaw || !Array.isArray(regras) || regras.length === 0) return null;
                const encontrarRegra = (descricao) => {
                    if (!descricao) return null;
                    const descUp = String(descricao).toUpperCase();
                    return regras.find(r => {
                        const p = String(r.padrao_texto || '').toUpperCase();
                        return p.length >= 4 && descUp.startsWith(p);
                    });
                };
                const linhasOut = [];
                const classifOut = {};
                const reembOut = {};
                let totalAutoSplits = 0;
                linhasRaw.forEach((linha) => {
                    if (linha.origemSplit || (linha.tipo !== 'despesa' && linha.tipo !== 'receita')) {
                        linhasOut.push(linha);
                        return;
                    }
                    const regra = encontrarRegra(linha.descricao);
                    if (!regra) { linhasOut.push(linha); return; }
                    let partes;
                    try { partes = JSON.parse(regra.partes_json); } catch { partes = null; }
