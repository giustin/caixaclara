                            }
                        }

                        // Tipo: negativo = crédito/estorno, positivo = compra
                        const ehCredito = valNum < 0 || descLower.includes('estorno') || descLower.startsWith('desc');
                        linhas.push({
                            data: dataISO,
                            descricao: desc,
                            valor: valor,
                            tipo: ehCredito ? 'estorno' : 'despesa',
                            data_vencimento_fatura: dataVencimentoFatura,
                            categoria_itau: categoriaItau,
                            parcelaNum,
                            parcelaTotal,
                        });
                    }

                    if (linhas.length === 0) {
                        const preview30 = textoCompleto.split('\n').slice(0, 30).join('\n');
                        setResultado({ tipo: 'erro', msg: 'Não encontrei lançamentos. Primeiras linhas do PDF:\n\n' + preview30 });
                        return;
                    }

                    setPreview({ linhas, nomeArquivo, dataVencimentoFatura });
                    setResultado(null);
                } catch (e) {
                    setResultado({ tipo: 'erro', msg: 'Erro ao ler PDF: ' + e.message });
                }
            };

            const handleFile = (file) => {
                if (!file) return;
                const ext = file.name.toLowerCase().split('.').pop();

                if (ext === 'pdf') {
                    const reader = new FileReader();
                    reader.onload = (e) => parsearPDF(e.target.result, file.name);
                    reader.readAsArrayBuffer(file);
                } else if (ext === 'xlsx' || ext === 'xls') {
                    const reader = new FileReader();
                    reader.onload = (e) => parsearXLSX(e.target.result, file.name);
                    reader.readAsArrayBuffer(file);
                } else {
                    // CSV/TXT
                    const reader = new FileReader();
                    reader.onload = (e) => parsearCSV(e.target.result, file.name);
                    reader.readAsText(file);
                }
            };

            // Confirmar importação
            const confirmarImportacao = async () => {
                if (!preview || preview.linhas.length === 0) return;
                if (!cartaoSelecionado) { setResultado({ tipo: 'erro', msg: 'Selecione um cartão de crédito' }); return; }

                setImportando(true);
                const loteId = 'IMP_' + Date.now();
                const contaId = cartaoSelecionado;
                const agora = new Date().toISOString().slice(0, 10);
                const todasLinhas = preview.linhas; // salvar referência antes de limpar preview
                const nomeArqPreview = preview.nomeArquivo;

                // Filtrar duplicados antes de importar (mantém índice original para classificações)
                const indicesValidos = todasLinhas.map((l, i) => i).filter(i => !duplicadas[i]);
                const linhasPreview = indicesValidos.map(i => todasLinhas[i]);
                const qtdDupIgnoradas = todasLinhas.length - linhasPreview.length;

                if (linhasPreview.length === 0) {
                    setResultado({ tipo: 'aviso', msg: `⚠️ Todos os ${todasLinhas.length} lançamentos já existem na base. Nada a importar.` });
                    setImportando(false);
                    return;
                }

                try {
                // Preparar lançamentos com lote (apenas não-duplicados)
                const vencFatura = preview.dataVencimentoFatura || '';
                const lancamentos = linhasPreview.map((l, idx) => {
                    const origIdx = indicesValidos[idx]; // índice original para buscar classificação
                    const ehInvestimento = l.tipo === 'transferencia_interna' && l.investimentoInfo;
                    const ehTransfComum = l.tipo === 'transferencia_interna' && !l.investimentoInfo;
                    const contaInvestVinculada = ehInvestimento ? vinculosInvestimento[origIdx] : '';
                    return {
                        id: loteId + '_' + idx,
                        data_transacao: l.data,
                        data_competencia: vencFatura,
                        descricao_original: l.descricao,
                        valor: l.valor,
                        tipo: (ehInvestimento || ehTransfComum) ? 'transferencia_interna' : l.tipo,
                        conta_origem: contaId,
                        conta_destino: contaInvestVinculada || (ehTransfComum && l.contaTransfDetectada ? l.contaTransfDetectada.id : '') || '',
                        cartao: contaId,
                        categoria: (ehInvestimento || ehTransfComum) ? '' : (classificacoes[origIdx]?.categoria_id || ''),
                        subcategoria: ehInvestimento ? l.investimentoInfo.subtipo : (ehTransfComum ? 'transferencia' : ''),
                        status_classificacao: (ehInvestimento || ehTransfComum) ? 'classificado' : (classificacoes[origIdx]?.confianca === 'baixa' ? 'pendente_confirmacao' : 'classificado'),
                        origem_dado: (preview.formato === 'Nubank Conta Corrente' || preview.formato === 'Mercado Pago Extrato') ? 'importacao_extrato' : 'importacao_fatura',
                        arquivo_origem: nomeArqPreview,
                        lote_importacao: loteId,
                        identificador: l.identificador || '',
                        confianca: (ehInvestimento || ehTransfComum) ? 'alta' : (classificacoes[origIdx]?.confianca || 'baixa'),
                        reembolsavel: reembolsaveis[origIdx] ? 'sim' : '',
                        is_projecao: '',
                        parcela_num: l.parcelaNum ? String(l.parcelaNum) : '',
                        parcela_total: l.parcelaTotal ? String(l.parcelaTotal) : '',
                        projecao_origem_lote: '',
                    };
                });

                // Salvar lançamentos em mini-lotes
                const BATCH_SIZE = 5;
                let salvos = 0;
                for (let b = 0; b < lancamentos.length; b += BATCH_SIZE) {
                    const batch = lancamentos.slice(b, b + BATCH_SIZE);
                    await api.post('salvar_lancamentos', batch);
                    salvos += batch.length;
                    setResultado({ tipo: 'ok', msg: `⏳ Salvando... ${salvos}/${lancamentos.length} lançamentos` });
                }
                console.log(`Importação concluída: ${salvos} lançamentos salvos em ${Math.ceil(lancamentos.length / BATCH_SIZE)} lotes`);

                // Salvar regras aprendidas (classificações manuais) — em background, não bloqueia
                try {
                    for (const [idx, classif] of Object.entries(classificacoes)) {
                        if (classif.metodo === 'manual' && classif.categoria_id) {
                            const desc = todasLinhas[parseInt(idx)]?.descricao || '';
                            const padrao = desc.split(' ').slice(0, 3).join(' ').toUpperCase();
                            if (padrao.length > 3) {
                                await api.post('salvar_regra', {
                                    id: 'R_' + Date.now() + '_' + idx,
                                    padrao_texto: padrao,
                                    categoria: classif.categoria_id,
                                    tipo_transacao: 'despesa',
                                    confianca: 'alta',
                                    vezes_usada: 1,
                                });
                            }
                        }
                    }
                } catch (e) { console.warn('Erro ao salvar regras (não crítico):', e); }

                // === CAMADA 3: Auto-sync com Reservas para movimentos de investimento ===
                try {
                    // Buscar saldos_historico existentes para detectar duplicatas
                    let saldosExistentes = [];
                    try { saldosExistentes = await api.get('saldos_historico') || []; } catch (e) {}

                    const contasParaAtualizar = {}; // { conta_id: novoSaldo }
                    let qtdAtualizados = 0;
                    for (let idx = 0; idx < linhasPreview.length; idx++) {
                        const linha = linhasPreview[idx];
                        const origIdx = indicesValidos[idx];
                        const contaInvestId = vinculosInvestimento[origIdx];
                        if (!linha.investimentoInfo || !contaInvestId) continue;

                        const contaInvest = data.contas.find(c => c.id === contaInvestId);
                        if (!contaInvest) continue;

                        const saldoAtual = contasParaAtualizar[contaInvestId] !== undefined
                            ? contasParaAtualizar[contaInvestId]
                            : Number(contaInvest.saldo || contaInvest.saldo_atual || 0);

                        let novoSaldo = saldoAtual;
                        if (linha.investimentoInfo.tipoMovimento === 'Resgate') {
                            novoSaldo = saldoAtual - linha.valor;
                        } else if (linha.investimentoInfo.tipoMovimento === 'Aporte') {
                            novoSaldo = saldoAtual + linha.valor;
                        } else if (linha.investimentoInfo.tipoMovimento === 'Rendimento') {
                            novoSaldo = saldoAtual + linha.valor;
                        }
                        contasParaAtualizar[contaInvestId] = novoSaldo;

                        // Detectar duplicata: mesmo conta_id, mesma data, mesmo tipo, valor similar (±5%)
                        const duplicata = saldosExistentes.find(s =>
                            s.conta_id === contaInvestId &&
                            s.data === linha.data &&
                            s.tipo_movimento === linha.investimentoInfo.tipoMovimento &&
                            Math.abs(Number(s.valor_movimento) - Math.abs(linha.valor)) / Math.max(Math.abs(linha.valor), 0.01) < 0.05
                        );

                        const registroSaldo = {
                            id: duplicata ? duplicata.id : ('SH_' + Date.now() + '_imp_' + idx),
                            data: linha.data,
                            conta_id: contaInvestId,
                            conta_nome: contaInvest.nome,
                            instituicao: contaInvest.instituicao || '',
                            produto: contaInvest.nome,
                            tipo_movimento: linha.investimentoInfo.tipoMovimento,
                            valor_movimento: Math.abs(linha.valor),
                            saldo_apos: novoSaldo,
                            observacao: duplicata
                                ? 'Atualizado via importação (antes: R$' + Number(duplicata.valor_movimento).toFixed(2) + ')'
                                : 'Auto: ' + linha.descricao + ' (importação extrato)',
                            lote_importacao: loteId
                        };
                        if (duplicata) qtdAtualizados++;
                        await api.post('salvar_saldo_historico', registroSaldo);
                    }

                    // Atualizar saldos das contas vinculadas
                    for (const [ctId, novoSaldo] of Object.entries(contasParaAtualizar)) {
                        const contaInvest = data.contas.find(c => c.id === ctId);
                        if (contaInvest && actions.salvarConta) {
                            await actions.salvarConta({ ...contaInvest, saldo: novoSaldo, saldo_atual: novoSaldo });
                        }
                    }

                    const qtdVinculos = Object.keys(vinculosInvestimento).filter(k => vinculosInvestimento[k]).length;
                    if (qtdVinculos > 0) {
                        console.log(`Auto-sync Reservas: ${qtdVinculos} movimento(s) sincronizado(s) (${qtdAtualizados} atualizado(s), ${qtdVinculos - qtdAtualizados} novo(s))`);
                    }
                } catch (e) { console.warn('Erro ao sincronizar com Reservas (não crítico):', e); }

                // Registrar log da importação
                try {
                    const logData = {
                        id: loteId,
                        data_importacao: agora,
                        tipo_arquivo: 'fatura_cartao',
                        nome_arquivo: nomeArqPreview,
                        conta_id: contaId,
                        conta_detectada: contaSelecionada?.nome || contaId,
                        linhas_importadas: lancamentos.length,
                        duplicidades_ignoradas: qtdDupIgnoradas,
                        itens_pendentes: lancamentos.length,
                        status: 'importado',
                    };
                    await api.post('log_importacao', logData);
                } catch (e) { console.warn('Erro ao salvar log (não crítico):', e); }

                // === PROJEÇÃO AUTOMÁTICA DE PARCELAS FUTURAS ===
                let projecoesCriadas = 0;
                let projecoesRemovidas = 0;
                try {
                    const compFatura = vencFatura ? vencFatura.slice(0, 7) : '';

                    if (ehCartao) {
                        // 1) Remover TODAS as projeções antigas deste cartão que serão substituídas
                        // Isso inclui: projeções para a competência atual (dados reais chegando)
                        // E projeções futuras de importações anteriores (serão recriadas com dados mais atuais)
                        const lancProjecoesAntigas = data.lancamentos.filter(l =>
                            (l.is_projecao === 'sim' || l.is_projecao === true) &&
                            l.conta_origem === contaId
                        );

                        if (lancProjecoesAntigas.length > 0) {
                            // Agrupar por competência para deletar no servidor
                            const compsComProjecao = [...new Set(lancProjecoesAntigas.map(l => l.competencia).filter(Boolean))];
                            for (const comp of compsComProjecao) {
                                try {
                                    await api.post('deletar_projecoes', { conta_id: contaId, competencia: comp });
                                } catch (e) { console.warn(`Erro ao deletar projeções comp ${comp}:`, e); }
                            }
                            // Remover do estado local
                            if (actions && actions.removerLancamentosPorIds) {
                                actions.removerLancamentosPorIds(lancProjecoesAntigas.map(l => l.id));
                            }
                            projecoesRemovidas = lancProjecoesAntigas.length;
                            console.log(`Projeções antigas removidas: ${projecoesRemovidas} de ${compsComProjecao.length} competências`);
                        }

                        // 2) Gerar novas projeções futuras para parcelas detectadas
                        const parcelasParaProjetar = [];
                        linhasPreview.forEach((linha, idx) => {
                            const pNum = linha.parcelaNum;
                            const pTot = linha.parcelaTotal;
                            if (!pNum || !pTot || pNum >= pTot) return; // sem parcelas restantes

                            const origIdx = indicesValidos[idx];
                            const classif = classificacoes[origIdx];

                            // Gerar parcelas futuras (pNum+1 até pTot)
                            for (let p = pNum + 1; p <= pTot; p++) {
                                const mesesAFrente = p - pNum;
                                // Calcular competência futura
                                let compFuturo = '';
                                if (vencFatura) {
                                    const [vy, vm, vd] = vencFatura.split('-').map(Number);
                                    let nm = vm + mesesAFrente;
                                    let ny = vy;
                                    while (nm > 12) { nm -= 12; ny++; }
                                    compFuturo = `${ny}-${String(nm).padStart(2,'0')}-${String(vd).padStart(2,'0')}`;
                                }
                                const compFuturoYM = compFuturo ? compFuturo.slice(0, 7) : '';

                                // Verificar se já existe lançamento REAL (não-projeção) para esta
                                // mesma parcela nesta competência (data_transacao + valor + parcela)
                                const jaExisteReal = data.lancamentos.some(l =>
                                    !l.is_projecao && l.is_projecao !== 'sim' &&
                                    l.conta_origem === contaId &&
                                    l.competencia === compFuturoYM &&
                                    l.data === linha.data &&
                                    Math.abs(Number(l.valor) - linha.valor) < 0.01
                                );
                                if (jaExisteReal) return; // já importou a fatura real deste mês, não projetar

                                // Substituir XX/YY na descrição
                                const descProj = linha.descricao.replace(
                                    /(\d{2})\/(\d{2})\s*$/,
                                    `${String(p).padStart(2,'0')}/${String(pTot).padStart(2,'0')}`
                                );

                                parcelasParaProjetar.push({
                                    id: loteId + '_PROJ_' + idx + '_' + p,
                                    data_transacao: linha.data, // data original da compra
                                    data_competencia: compFuturo,
                                    descricao_original: descProj,
                                    valor: linha.valor,
                                    tipo: linha.tipo,
                                    conta_origem: contaId,
                                    conta_destino: '',
                                    cartao: contaId,
                                    categoria: classif?.categoria_id || '',
                                    subcategoria: '',
                                    status_classificacao: classif?.categoria_id ? 'classificado' : 'pendente_confirmacao',
                                    origem_dado: 'projecao_parcela',
                                    arquivo_origem: nomeArqPreview,
                                    lote_importacao: loteId + '_PROJ',
                                    confianca: 'media',
                                    reembolsavel: '',
                                    is_projecao: 'sim',
                                    parcela_num: String(p),
                                    parcela_total: String(pTot),
                                    projecao_origem_lote: loteId,
                                });
                            }
                        });

                        // Salvar projeções em lotes
                        if (parcelasParaProjetar.length > 0) {
                            for (let b = 0; b < parcelasParaProjetar.length; b += BATCH_SIZE) {
                                const batch = parcelasParaProjetar.slice(b, b + BATCH_SIZE);
                                await api.post('salvar_lancamentos', batch);
                            }
                            projecoesCriadas = parcelasParaProjetar.length;
                            console.log(`Projeções criadas: ${projecoesCriadas} parcelas futuras projetadas`);
                        }
                    }
                } catch (e) { console.warn('Erro ao criar projeções (não crítico):', e); }

                // Atualizar estado local para mostrar na tela imediatamente
                const novosLancs = lancamentos.map((l, i) => ({
                    ...l,
                    data: l.data_transacao,
                    data_competencia: l.data_competencia || '',
                    competencia: l.data_competencia ? l.data_competencia.slice(0, 7) : (l.data_transacao || '').slice(0, 7),
                    descricao: l.descricao_original,
                    valor: Number(l.valor),
                    categoria_id: l.categoria || classificacoes[i]?.categoria_id || '',
                    is_cartao: ehCartao,
                    lote_importacao: loteId,
                    is_projecao: '',
                }));
                if (actions && actions.adicionarLancamentosLote) {
                    actions.adicionarLancamentosLote(novosLancs);
                }

                const msgDup = qtdDupIgnoradas > 0 ? ` (${qtdDupIgnoradas} duplicado${qtdDupIgnoradas > 1 ? 's' : ''} ignorado${qtdDupIgnoradas > 1 ? 's' : ''})` : '';
                const msgProj = projecoesCriadas > 0 ? ` + ${projecoesCriadas} parcelas futuras projetadas` : '';
                setResultado({ tipo: 'ok', msg: `✅ ${lancamentos.length} lançamentos importados com sucesso!${msgDup}${msgProj} Verifique na aba Lançamentos.` });
                setRecarregarLotes(prev => prev + 1);

                } catch (e) {
                    console.error('Erro na importação:', e);
                    setResultado({ tipo: 'erro', msg: `Erro ao importar: ${e.message}. Os lançamentos já salvos foram registrados.` });
                } finally {
                    // SEMPRE limpar o estado, mesmo com erro
                    setPreview(null);
                    setReembolsaveis({});
                    setVinculosInvestimento({});
                    setImportando(false);
                }
            };

            // Deletar lote
            const handleDeletarLote = async (loteId) => {
                setDeletandoLote(loteId);
                try {
                    const resp = await api.post('deletar_lote', { lote_id: loteId });
                    if (!resp || resp.erro) {
                        setResultado({ tipo: 'erro', msg: '❌ Erro ao apagar lote: ' + (resp?.erro || 'Sem resposta do servidor') });
                        setDeletandoLote(null);
                        return;
                    }
                    setLotes(prev => prev.filter(l => l.id !== loteId));
                    // Atualiza lista em memória de lançamentos para que a dedup da próxima importação
                    // não veja como duplicatas os registros que acabaram de ser apagados.
                    if (actions && actions.removerLancamentosPorIds) {
                        const idsDoLote = (data.lancamentos || [])
                            .filter(l => l.lote_importacao === loteId)
                            .map(l => l.id);
                        if (idsDoLote.length > 0) actions.removerLancamentosPorIds(idsDoLote);
                    }
                    const msgSaldos = resp.deletados_saldos ? ` + ${resp.deletados_saldos} movimentos de investimento` : '';
                    setResultado({ tipo: 'ok', msg: `✅ Lote removido com sucesso! ${resp.deletados || ''} lançamentos apagados${msgSaldos}.` });
                } catch (e) {
                    console.error('Erro ao deletar lote:', e);
                    setResultado({ tipo: 'erro', msg: '❌ Erro ao apagar lote. Tente novamente.' });
                } finally {
                    setDeletandoLote(null);
                }
            };

            // ===== Split de lançamentos na preview =====
            // Normaliza descrição em padrão para matching de regras (primeiras 3 palavras alfanuméricas)
            const gerarPadraoSplit = (descricao) => {
                if (!descricao) return '';
                const palavras = String(descricao).toUpperCase()
                    .replace(/\([^)]*\)/g, '')
                    .replace(/[^A-Z0-9\s]/g, ' ')
                    .split(/\s+/)
                    .filter(p => p.length >= 3 && !/^\d+$/.test(p));
                return palavras.slice(0, 3).join(' ').trim();
            };

            // Remove sufixos "(parte N)" eventualmente adicionados pelo auto-split
            const limparSufixoParte = (descricao) =>
                String(descricao || '').replace(/\s*\(parte\s+\d+\)(\s*💼)?\s*$/i, '').trim();

            const abrirSplit = (linhaIdx) => {
                const linha = preview.linhas[linhaIdx];
                // Se a linha já é fruto de um split (manual ou auto), reabrir o grupo completo
                if (linha.origemSplit && linha.origemSplitTotal) {
                    const startIdx = linhaIdx - ((linha.origemSplitIndex || 1) - 1);
                    const total = linha.origemSplitTotal;
                    const descricaoBase = limparSufixoParte(linha.descricao);
                    let valorTotal = 0;
                    const partesAtuais = [];
                    for (let k = 0; k < total; k++) {
                        const lk = preview.linhas[startIdx + k];
                        if (!lk || !lk.origemSplit) break;
                        valorTotal += Number(lk.valor) || 0;
                        partesAtuais.push({
                            valor: Number(lk.valor) || 0,
                            categoria_id: classificacoes[startIdx + k]?.categoria_id || '',
                            reembolsavel: !!reembolsaveis[startIdx + k],
                            descricao: lk.descricao,
                            tocadaManualmente: true,
                        });
                    }
                    setSplitModal({
                        linhaIdx: startIdx,
                        grupoTotal: partesAtuais.length,
                        regraSplitId: linha.regraSplitId || null,
                        memorizar: !!linha.regraSplitId, // se já tem regra, segue memorizando; senão (split manual one-off) fica desligado
                        original: { valor: valorTotal, descricao: descricaoBase, categoria_id: partesAtuais[0]?.categoria_id || '', tipo: linha.tipo },
                        partes: partesAtuais,
                    });
                    return;
                }

                const categoriaAtual = classificacoes[linhaIdx]?.categoria_id || '';
                setSplitModal({
                    linhaIdx,
                    grupoTotal: 1,
                    regraSplitId: null,
                    memorizar: true, // default: memoriza (caso mais comum é recorrente, ex: boleto escola). Desmarcar em casos pontuais (ex: churrasco dividido uma vez).
                    original: { valor: linha.valor, descricao: linha.descricao, categoria_id: categoriaAtual, tipo: linha.tipo },
                    partes: [
                        { valor: linha.valor, categoria_id: categoriaAtual, reembolsavel: false, descricao: linha.descricao + ' (parte 1)', tocadaManualmente: false },
                        { valor: 0, categoria_id: categoriaAtual, reembolsavel: true, descricao: linha.descricao + ' (parte 2)', tocadaManualmente: false },
                    ],
                });
            };

            // Desfaz um split auto-aplicado: funde as N partes consecutivas em 1 linha com o valor total e,
            // opcionalmente, apaga a regra para que não reaplique em importações futuras.
            const desfazerAutoSplit = async (linhaIdx) => {
                const linha = preview.linhas[linhaIdx];
                if (!linha || !linha.origemSplit || !linha.origemSplitTotal) return;
                const startIdx = linhaIdx - ((linha.origemSplitIndex || 1) - 1);
                const total = linha.origemSplitTotal;
                const descricaoBase = limparSufixoParte(linha.descricao);
                let valorTotal = 0;
                for (let k = 0; k < total; k++) {
                    const lk = preview.linhas[startIdx + k];
                    if (!lk || !lk.origemSplit) return; // guarda: se não bate, aborta
                    valorTotal += Number(lk.valor) || 0;
                }
                valorTotal = Math.round(valorTotal * 100) / 100;
                const linhaRestaurada = {
                    ...preview.linhas[startIdx],
                    descricao: descricaoBase,
                    valor: valorTotal,
                    origemSplit: undefined,
                    origemSplitAuto: undefined,
                    origemSplitIndex: undefined,
                    origemSplitTotal: undefined,
                    regraSplitId: undefined,
                };
                const novoArray = [
                    ...preview.linhas.slice(0, startIdx),
                    linhaRestaurada,
                    ...preview.linhas.slice(startIdx + total),
                ];
                const offset = 1 - total; // mudamos de N para 1
                const reindex = (obj) => {
                    const novo = {};
                    Object.entries(obj).forEach(([k, v]) => {
                        const i = parseInt(k, 10);
                        if (i < startIdx) novo[i] = v;
                        else if (i >= startIdx + total) novo[i + offset] = v;
                    });
                    return novo;
                };
                const novasClass = reindex(classificacoes);
                const novosReemb = reindex(reembolsaveis);
                const novosVinc = reindex(vinculosInvestimento);
                // Limpa entrada no startIdx (será reclassificada pelo efeito padrão)
                delete novasClass[startIdx];
                delete novosReemb[startIdx];

                setPreview({ ...preview, linhas: novoArray });
                setClassificacoes(novasClass);
                setReembolsaveis(novosReemb);
                setVinculosInvestimento(novosVinc);

                // Se havia regra associada, pergunta se quer apagar pra não reaplicar
                const regraId = linha.regraSplitId;
                if (regraId) {
                    const apagar = confirm('Desfazer este split automático. Deseja também apagar a regra aprendida para que não reaplique em importações futuras?');
                    if (apagar) {
                        try {
                            await api.post('deletar_regra_split', { id: regraId });
                            setRegrasSplit(prev => prev.filter(r => r.id !== regraId));
                        } catch (e) {
                            console.warn('Erro ao apagar regra de split:', e);
                        }
                    }
                }
            };

            // Salva ou atualiza a regra de split a partir do split confirmado (aprende/reaprende a proporção)
            const salvarOuAtualizarRegraSplit = async (descricaoOriginal, partes, valorTotal, regraExistenteId) => {
                if (!descricaoOriginal || !partes || partes.length < 2 || !(valorTotal > 0)) return;
                const padrao = gerarPadraoSplit(descricaoOriginal);
                if (!padrao || padrao.length < 4) return; // evitar padrões inúteis (ex: "PIX")
                const partesComPct = partes.map(p => ({
                    pct: Math.round(((Number(p.valor) || 0) / valorTotal) * 10000) / 10000,
                    categoria_id: p.categoria_id || '',
                    reembolsavel: !!p.reembolsavel,
                }));
                const regraExistente = regraExistenteId
                    ? regrasSplit.find(r => r.id === regraExistenteId)
                    : regrasSplit.find(r => String(r.padrao_texto || '').toUpperCase() === padrao);
                const agora = new Date().toISOString();
                const regra = {
                    id: regraExistente?.id || ('RS_' + Date.now() + '_' + Math.floor(Math.random() * 1000)),
                    padrao_texto: padrao,
                    partes_json: JSON.stringify(partesComPct),
                    vezes_usada: (Number(regraExistente?.vezes_usada) || 0) + 1,
                    criada_em: regraExistente?.criada_em || agora,
                    atualizada_em: agora,
                };
                try {
                    await api.post('salvar_regra_split', regra);
                    setRegrasSplit(prev => {
                        const outros = prev.filter(r => r.id !== regra.id);
                        return [...outros, regra];
                    });
                } catch (e) {
                    console.warn('Erro ao salvar regra de split (não crítico):', e);
                }
            };

            const atualizarParte = (idx, campo, valor) => {
                setSplitModal(prev => {
                    if (!prev) return prev;
                    const partes = prev.partes.map((p, i) => i === idx ? { ...p, [campo]: valor } : p);
                    // Caso 2 partes: ao editar o valor de qualquer uma, a outra complementa automaticamente
                    // (mirror). Para 3+ partes o usuário ajusta manualmente.
                    if (campo === 'valor' && partes.length === 2) {
                        const valorTotal = Number(prev.original.valor) || 0;
                        const valorNum = Number(valor) || 0;
                        const outroIdx = idx === 0 ? 1 : 0;
                        const complemento = Math.max(0, Math.round((valorTotal - valorNum) * 100) / 100);
                        partes[outroIdx] = { ...partes[outroIdx], valor: complemento };
                    }
                    return { ...prev, partes };
                });
            };

            const addParteSplit = () => {
                setSplitModal(prev => {
                    if (!prev || prev.partes.length >= 10) return prev;
                    return {
                        ...prev,
                        partes: [...prev.partes, {
                            valor: 0,
                            categoria_id: prev.original.categoria_id,
                            reembolsavel: false,
                            descricao: prev.original.descricao + ' (parte ' + (prev.partes.length + 1) + ')',
                            tocadaManualmente: true,
                        }],
                    };
                });
            };

            const removerParteSplit = (idx) => {
                setSplitModal(prev => {
                    if (!prev || prev.partes.length <= 2) return prev;
                    return { ...prev, partes: prev.partes.filter((_, i) => i !== idx) };
                });
            };

            const confirmarSplit = () => {
                if (!splitModal) return;
                const { linhaIdx, partes, original, grupoTotal = 1, regraSplitId = null, memorizar = true } = splitModal;
                const linhaOrig = preview.linhas[linhaIdx];
                const descricaoBase = original.descricao || linhaOrig.descricao;

                // Todas as partes mantêm o MESMO identificador do original — assim o re-import
                // do mesmo extrato no mês seguinte é detectado pela dedup por UUID.
                const novasLinhas = partes.map((p, n) => ({
                    ...linhaOrig,
                    descricao: (p.descricao && p.descricao.trim()) ? p.descricao : `${descricaoBase} (parte ${n + 1})`,
                    valor: Number(p.valor) || 0,
                    identificador: linhaOrig.identificador || null,
                    origemSplit: true,
                    origemSplitAuto: false, // edição manual — deixa de ser puro auto
                    origemSplitIndex: n + 1,
                    origemSplitTotal: partes.length,
                    regraSplitId: regraSplitId || undefined,
                }));

                const novoArray = [
                    ...preview.linhas.slice(0, linhaIdx),
                    ...novasLinhas,
                    ...preview.linhas.slice(linhaIdx + grupoTotal),
                ];

                const offset = partes.length - grupoTotal; // delta no tamanho do array
                const reindex = (obj) => {
                    const novo = {};
                    Object.entries(obj).forEach(([k, v]) => {
                        const i = parseInt(k, 10);
                        if (i < linhaIdx) novo[i] = v;
                        else if (i >= linhaIdx + grupoTotal) novo[i + offset] = v;
                    });
                    return novo;
                };

                const novasClass = reindex(classificacoes);
                const novosReemb = reindex(reembolsaveis);
                const novosVinc = reindex(vinculosInvestimento);

                partes.forEach((p, n) => {
                    const novoIdx = linhaIdx + n;
                    novasClass[novoIdx] = {
                        categoria_id: p.categoria_id || '',
                        confianca: p.categoria_id ? 'manual' : 'baixa',
                        metodo: p.categoria_id ? 'manual' : 'nao_classificado',
                    };
                    novosReemb[novoIdx] = !!p.reembolsavel;
                });

                setPreview({ ...preview, linhas: novoArray });
                setClassificacoes(novasClass);
                setReembolsaveis(novosReemb);
                setVinculosInvestimento(novosVinc);
                setSplitModal(null);

                // Aprende ou re-aprende a regra (pct por parte) em background — só se usuário optou por memorizar
                if (memorizar) {
                    salvarOuAtualizarRegraSplit(descricaoBase, partes, Number(original.valor) || 0, regraSplitId);
                }
            };

            return (
                <div className="page-transition">
                    <div className="page-header">
                        <h1>Importar Extrato</h1>
                        <p>Importe extratos e faturas das suas contas e cartões</p>
                    </div>

                    {/* Resultado/Feedback */}
                    {resultado && (
                        <div style={{ padding: '1rem', borderRadius: '8px', marginBottom: '1.5rem',
                            background: resultado.tipo === 'ok' ? '#f0fdf4' : resultado.tipo === 'aviso' ? '#fffbeb' : '#fef2f2',
                            border: `1px solid ${resultado.tipo === 'ok' ? '#bbf7d0' : resultado.tipo === 'aviso' ? '#fde68a' : '#fecaca'}`,
                            color: resultado.tipo === 'ok' ? '#166534' : resultado.tipo === 'aviso' ? '#92400e' : '#991b1b' }}>
                            <p style={{ margin: 0, fontWeight: '600' }}>{resultado.msg}</p>
                        </div>
                    )}

                    {/* Step 1: Selecionar conta */}
                    <div className="card" style={{ marginBottom: '1.5rem' }}>
                        <h3 style={{ margin: '0 0 1rem 0', fontSize: '1rem', fontWeight: '600' }}>
                            1. Selecione a conta ou cartão
                        </h3>
                        {contasAtivas.length === 0 ? (
                            <p style={{ color: '#ef4444', fontSize: '0.9rem' }}>
                                ⚠️ Nenhuma conta cadastrada. Vá em Contas e cadastre primeiro.
                            </p>
                        ) : (
                            <div style={{ display: 'flex', gap: '0.6rem', flexWrap: 'wrap' }}>
                                {contasAtivas.map(c => {
                                    const icone = c.tipo === 'cartao_credito' ? '💳' : c.tipo === 'investimento' ? '📈' : '🏦';
                                    const tipoLabel = c.tipo === 'cartao_credito' ? 'Cartão' : c.tipo === 'conta_corrente' ? 'CC' : c.tipo === 'poupanca' ? 'Poupança' : '';
                                    return (
                                        <button key={c.id}
                                            className={`button ${cartaoSelecionado === c.id ? 'button-primary' : 'button-secondary'}`}
                                            onClick={() => setCartaoSelecionado(c.id)}
                                            style={{ fontSize: '0.85rem' }}>
                                            {icone} {c.nome || c.instituicao || 'Conta'}
                                            {tipoLabel && <span style={{ marginLeft: '0.3rem', fontSize: '0.7rem', opacity: 0.7 }}>({tipoLabel})</span>}
                                        </button>
                                    );
                                })}
                            </div>
                        )}
                        {contaSelecionada && (
                            <div style={{ marginTop: '0.75rem', padding: '0.6rem 1rem', background: '#f8fafc', borderRadius: '8px', fontSize: '0.8rem', color: '#64748b' }}>
                                {ehCartao ? (
                                    <span>💳 Fatura de cartão • Fecha dia {contaSelecionada.dia_fechamento || '?'} • Vence dia {contaSelecionada.dia_vencimento || '?'}
                                    {contaSelecionada.limite ? ` • Limite ${formatCurrency(contaSelecionada.limite)}` : ''}</span>
                                ) : (
                                    <span>🏦 Extrato de conta corrente • Saldo atual: {formatCurrency(contaSelecionada.saldo || 0)}</span>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Step 2: Upload arquivo */}
                    {cartaoSelecionado && !preview && (
                        <div className="card" style={{ marginBottom: '1.5rem' }}>
                            <h3 style={{ margin: '0 0 1rem 0', fontSize: '1rem', fontWeight: '600' }}>
                                2. Envie o {ehCartao ? 'arquivo da fatura' : 'extrato bancário'}
                            </h3>
                            <div
                                style={{ border: '2px dashed #93c5fd', borderRadius: '12px', padding: '2.5rem', textAlign: 'center', cursor: 'pointer', transition: 'all 0.2s', background: '#f8fafc' }}
                                onDrop={e => { e.preventDefault(); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); }}
                                onDragOver={e => e.preventDefault()}
                                onClick={() => fileRef.current?.click()}>
                                <input type="file" ref={fileRef} style={{ display: 'none' }} accept=".csv,.txt,.pdf,.xlsx,.xls" onChange={e => { if (e.target.files[0]) handleFile(e.target.files[0]); }} />
                                <p style={{ fontSize: '2.5rem', margin: '0 0 0.5rem 0' }}>📄</p>
                                <p style={{ margin: 0, fontWeight: '600', color: '#1e40af' }}>Arraste o arquivo aqui ou clique para selecionar</p>
                                <p style={{ margin: '0.5rem 0 0 0', fontSize: '0.8rem', color: '#94a3b8' }}>PDF (Itaú, Porto Bank) • CSV (Nubank Cartão e Conta Corrente) • XLSX (Porto Seguro, Banco do Brasil, Mercado Pago)</p>
                            </div>
                            <div style={{ marginTop: '1rem', padding: '0.75rem', background: '#f8fafc', borderRadius: '8px', fontSize: '0.8rem', color: '#64748b' }}>
                                <strong>O que acontece:</strong> O arquivo é lido no seu navegador, os dados são extraídos e salvos na planilha Google. O arquivo original não é armazenado.
                            </div>
                        </div>
                    )}

                    {/* Step 3: Preview antes de confirmar */}
                    {preview && (() => {
                        const qtdDuplicadas = Object.keys(duplicadas).length;
                        const linhasValidas = preview.linhas.filter((l, i) => !duplicadas[i]);
                        const totalDespesas = linhasValidas.filter(l => l.tipo === 'despesa').reduce((s, l) => s + l.valor, 0);
                        const totalEstornos = linhasValidas.filter(l => l.tipo === 'estorno').reduce((s, l) => s + l.valor, 0);
                        const totalReceitas = linhasValidas.filter(l => l.tipo === 'receita').reduce((s, l) => s + l.valor, 0);
                        // Movimentos de investimento (resgate, aporte, rendimento) — com vínculo possível
                        const linhasInvestimento = linhasValidas.filter(l => l.tipo === 'transferencia_interna' && l.investimentoInfo && l.investimentoInfo.subtipo !== 'fatura_cartao');
                        const totalInvestimento = linhasInvestimento.reduce((s, l) => s + l.valor, 0);
                        const qtdInvestimento = linhasInvestimento.length;
                        // Transferências comuns (PIX, TED, DOC) + pagamento de fatura — sem vínculo de investimento
                        const linhasTransferencia = linhasValidas.filter(l => l.tipo === 'transferencia_interna' && !l.investimentoInfo);
                        const linhasPgtoFatura = linhasValidas.filter(l => l.tipo === 'transferencia_interna' && l.investimentoInfo?.subtipo === 'fatura_cartao');
                        const qtdTransferencia = linhasTransferencia.length + linhasPgtoFatura.length;
                        const totalTransferencia = linhasTransferencia.reduce((s, l) => s + l.valor, 0) + linhasPgtoFatura.reduce((s, l) => s + l.valor, 0);
