        // Dados vazios (estado inicial quando conectado à planilha)
        const DADOS_VAZIOS = { contas: [], lancamentos: [], categorias: [], metas: [] };

        // Componente de input monetário com máscara brasileira (R$ 1.234,56)
        function InputMoeda({ value, onChange, placeholder, className, style, autoFocus, onKeyDown }) {
            const [displayValue, setDisplayValue] = useState('');
            const isFocusedRef = React.useRef(false);

            // Formatar número para exibição BR
            const formatarBR = (num) => {
                if (num === '' || num === null || num === undefined || isNaN(Number(num))) return '';
                return Number(num).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            };

            // Sincronizar valor externo → display (somente quando NÃO está com foco)
            React.useEffect(() => {
                if (isFocusedRef.current) return; // Não sobrescrever enquanto usuário digita
                if (value !== '' && value !== null && value !== undefined && !isNaN(Number(value))) {
                    setDisplayValue(formatarBR(value));
                } else {
                    setDisplayValue('');
                }
            }, [value]);

            const handleChange = (e) => {
                let raw = e.target.value;
                // Permitir apenas dígitos, vírgula e ponto
                raw = raw.replace(/[^\d.,\-]/g, '');
                setDisplayValue(raw);
                // Converter para número: trocar vírgula por ponto, remover pontos de milhar
                const limpo = raw.replace(/\./g, '').replace(',', '.');
                const num = parseFloat(limpo);
                if (!isNaN(num)) {
                    onChange(num);
                } else if (raw === '' || raw === '-') {
                    onChange('');
                }
            };

            const handleBlur = () => {
                isFocusedRef.current = false;
                // Ao sair do campo, formatar bonito
                if (value !== '' && value !== null && value !== undefined && !isNaN(Number(value))) {
                    setDisplayValue(formatarBR(value));
                }
            };

            const handleFocus = (e) => {
                isFocusedRef.current = true;
                // Ao entrar no campo, mostrar valor limpo para edição
                if (value !== '' && value !== null && value !== undefined && !isNaN(Number(value))) {
                    setDisplayValue(Number(value).toFixed(2).replace('.', ','));
                }
                // Selecionar tudo ao focar
                setTimeout(() => e.target.select(), 0);
            };

            return React.createElement('input', {
                type: 'text',
                inputMode: 'decimal',
                value: displayValue,
                onChange: handleChange,
                onBlur: handleBlur,
                onFocus: handleFocus,
                placeholder: placeholder || 'Ex: 1.368,00',
                className: className || 'form-input',
                style: style,
                autoFocus: autoFocus,
                onKeyDown: onKeyDown,
            });
        }

        // ============================================================
        // AUTH - Gerenciamento de autenticação
        // ============================================================
        const AUTH_TOKEN_KEY = 'caixaclara_token';
        const AUTH_USER_KEY = 'caixaclara_user';

        const authManager = {
            getToken: () => {
                try { return sessionStorage.getItem(AUTH_TOKEN_KEY); } catch { return null; }
            },
            getUser: () => {
                try {
                    const u = sessionStorage.getItem(AUTH_USER_KEY);
                    return u ? JSON.parse(u) : null;
                } catch { return null; }
            },
            setSession: (token, usuario) => {
                try {
                    sessionStorage.setItem(AUTH_TOKEN_KEY, token);
                    sessionStorage.setItem(AUTH_USER_KEY, JSON.stringify(usuario));
                } catch {}
            },
            clearSession: () => {
                try {
                    sessionStorage.removeItem(AUTH_TOKEN_KEY);
                    sessionStorage.removeItem(AUTH_USER_KEY);
                } catch {}
            },
            // Injeta o token JWT nos headers das chamadas à API
            authHeaders: () => {
                const token = authManager.getToken();
                return token ? { 'Authorization': `Bearer ${token}` } : {};
            }
        };

        // Login Screen Component
        function LoginScreen({ onLogin, authConfig }) {
            const [erro, setErro] = useState(null);
            const [carregando, setCarregando] = useState(false);
            const loginBtnRef = React.useRef(null);

            useEffect(() => {
                if (!authConfig?.google_client_id) return;

                // Aguardar a lib do Google carregar
                const initGoogle = () => {
                    if (typeof google === 'undefined' || !google.accounts) {
                        setTimeout(initGoogle, 200);
                        return;
                    }

                    google.accounts.id.initialize({
                        client_id: authConfig.google_client_id,
                        callback: async (response) => {
                            setCarregando(true);
                            setErro(null);
                            try {
                                const res = await fetch('/api/auth/login', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ google_token: response.credential })
                                });
                                const data = await res.json();

                                if (!res.ok) {
                                    setErro(data.mensagem || data.erro || 'Erro ao fazer login');
                                    setCarregando(false);
                                    return;
                                }

                                authManager.setSession(data.token, data.usuario);
                                onLogin(data.usuario);
                            } catch (e) {
                                setErro('Erro de conexão com o servidor');
                                setCarregando(false);
                            }
                        },
                        auto_select: true,
                    });

                    if (loginBtnRef.current) {
                        google.accounts.id.renderButton(loginBtnRef.current, {
                            theme: 'outline',
                            size: 'large',
                            text: 'signin_with',
                            shape: 'rectangular',
                            width: 300,
                            locale: 'pt-BR',
                        });
                    }

                    // Tentar One Tap (login automático se já logou antes)
                    google.accounts.id.prompt();
                };

                initGoogle();
            }, [authConfig]);

            return (
                <div style={{
                    minHeight: '100vh',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    background: 'linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%)',
                }}>
                    <div style={{
                        background: 'white',
                        borderRadius: '1rem',
                        padding: '3rem',
                        width: '100%',
                        maxWidth: '420px',
                        textAlign: 'center',
                        boxShadow: '0 25px 50px rgba(0,0,0,0.25)',
                    }}>
                        <div style={{ fontSize: '3rem', marginBottom: '0.5rem' }}>💰</div>
                        <h1 style={{ fontSize: '1.75rem', fontWeight: '700', color: '#0f172a', margin: '0 0 0.5rem 0' }}>
                            CaixaClara
                        </h1>
                        <p style={{ color: '#64748b', margin: '0 0 2rem 0', fontSize: '0.95rem' }}>
                            Gestão financeira familiar
                        </p>

                        {carregando ? (
                            <div style={{ padding: '1rem', color: '#64748b' }}>
                                <p>Entrando...</p>
                            </div>
                        ) : (
                            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '1rem' }}>
                                <div ref={loginBtnRef}></div>

                                {!authConfig?.google_client_id && (
                                    <p style={{ color: '#f59e0b', fontSize: '0.85rem', margin: 0 }}>
                                        Google Client ID não configurado no servidor
                                    </p>
                                )}
                            </div>
                        )}

                        {erro && (
                            <div style={{
                                marginTop: '1rem',
                                padding: '0.75rem 1rem',
                                background: '#fef2f2',
                                border: '1px solid #fecaca',
                                borderRadius: '0.5rem',
                                color: '#dc2626',
                                fontSize: '0.9rem'
                            }}>
                                {erro}
                            </div>
                        )}

                        <p style={{ color: '#94a3b8', fontSize: '0.75rem', marginTop: '2rem', marginBottom: 0 }}>
                            Apenas membros autorizados da família podem acessar
                        </p>
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            const [currentPage, setCurrentPage] = useState('visao-geral');
            // Se tem URL configurada, começa VAZIO (espera dados da planilha)
            // Se não tem URL, usa dados DEMO para demonstração
            const [data, setData] = useState(APPS_SCRIPT_URL ? DADOS_VAZIOS : DEMO_DATA);
            const [conectado, setConectado] = useState(false);
            const [carregando, setCarregando] = useState(!!APPS_SCRIPT_URL);
            const [salvando, setSalvando] = useState(false);
            const [erroConexao, setErroConexao] = useState(null);

            // Auth state
            const [authConfig, setAuthConfig] = useState(null);
            const [usuario, setUsuario] = useState(authManager.getUser());
            const [authCarregando, setAuthCarregando] = useState(true);

            // Verificar configuração de auth ao iniciar
            useEffect(() => {
                async function checkAuth() {
                    try {
                        const res = await fetch('/api/auth/config');
                        const config = await res.json();
                        setAuthConfig(config);

                        // Se o backend tem a URL do Apps Script, usar ela (produção)
                        if (config.apps_script_url) {
                            APPS_SCRIPT_URL = config.apps_script_url;
                        }

                        if (!config.auth_enabled) {
                            // Auth desabilitado (dev mode) - acesso livre
                            setUsuario({ email: 'dev@local', nome: 'Dev Mode', foto: null });
                        } else if (authManager.getToken()) {
                            // Tem token salvo - validar
                            const meRes = await fetch('/api/auth/me', {
                                headers: authManager.authHeaders()
                            });
                            if (meRes.ok) {
                                const meData = await meRes.json();
                                setUsuario(meData.usuario);
                            } else {
                                // Token inválido/expirado
                                authManager.clearSession();
                                setUsuario(null);
                            }
                        }
                    } catch (e) {
                        // Servidor offline - se tiver dados em cache, permitir uso
                        console.warn('Não foi possível verificar auth:', e);
                        if (!authManager.getToken()) setUsuario(null);
                    }
                    setAuthCarregando(false);
                }
                checkAuth();
            }, []);

            const handleLogout = () => {
                authManager.clearSession();
                setUsuario(null);
                if (typeof google !== 'undefined' && google.accounts) {
                    google.accounts.id.disableAutoSelect();
                }
            };

            // Carregar dados reais da planilha ao iniciar (espera auth terminar)
            useEffect(() => {
                if (authCarregando) return; // Espera auth resolver primeiro
                async function carregarDados() {
                    if (!APPS_SCRIPT_URL) return;
                    try {
                        const [contas, lancamentos, categorias, tetos, metas] = await Promise.all([
                            api.get('contas'),
                            api.get('lancamentos'),
                            api.get('categorias'),
                            api.get('tetos'),
                            api.get('metas'),
                        ]);

                        // Adaptar formato da planilha para o formato do app
                        const contasAdaptadas = (contas || []).map(c => ({
                            ...c,
                            saldo: Number(c.saldo_atual || c.saldo || 0),
                            visao_caixa: c.visao_caixa === 'sim' || c.visao_caixa === true,
                            patrimonio_total: c.patrimonio_total === 'sim' || c.patrimonio_total === true,
                            dia_fechamento: Number(c.dia_fechamento || 0),
                            dia_vencimento: Number(c.dia_vencimento || 0),
                            limite: Number(c.limite || 0),
                        }));
                        // Helper: normalizar data para YYYY-MM-DD (local timezone)
                        const normDate = (v) => {
                            if (!v) return '';
                            const s = String(v).trim();
                            // ISO com T — usar timezone local, não UTC
                            if (s.includes('T')) {
                                const d = new Date(s);
                                if (!isNaN(d.getTime())) {
                                    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                                }
                            }
                            // YYYY-MM-DD (possivelmente com hora depois)
                            if (s.match(/^\d{4}-\d{1,2}-\d{1,2}/)) {
                                const parts = s.slice(0, 10).split('-');
                                return `${parts[0]}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`;
                            }
                            // DD/MM/YYYY
                            if (s.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
                                const [dd, mm, yy] = s.split('/');
                                return `${yy}-${mm}-${dd}`;
                            }
                            // Serial number (Excel/Sheets date)
                            const num = Number(s);
                            if (!isNaN(num) && num > 40000 && num < 60000) {
                                const d = new Date((num - 25569) * 86400000);
                                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                            }
                            return s;
                        };

                        const lancAdaptados = (lancamentos || []).map(l => {
                            const dataTransacao = normDate(l.data_transacao || l.data || '');
                            const dataComp = l.data_competencia ? normDate(l.data_competencia) : '';
                            // competencia = YYYY-MM do mês da fatura (para cartão) ou do mês da transação
                            const competencia = dataComp ? dataComp.slice(0, 7) : dataTransacao.slice(0, 7);
                            return {
                                ...l,
                                data: dataTransacao,
                                data_competencia: dataComp,
                                competencia,
                                descricao: l.descricao_original || l.descricao || '',
                                valor: Number(l.valor || 0),
                                categoria_id: l.categoria || l.categoria_id || null,
                                conta_origem: l.conta_origem || l.cartao || '',
                                is_cartao: (l.is_cartao === 'sim' || l.is_cartao === true) || contasAdaptadas.find(c => c.id === l.conta_origem && c.tipo === 'cartao_credito') != null,
                                is_projecao: l.is_projecao === 'sim',
                                parcela_num: l.parcela_num ? parseInt(l.parcela_num) : null,
                                parcela_total: l.parcela_total ? parseInt(l.parcela_total) : null,
                            };
                        });
                        console.log('Categorias raw:', categorias?.length, categorias);

                        // Categorias agora vêm com teto_mensal direto da aba categorias
                        // Fallback: se aba categorias vazia, tentar aba tetos
                        let catSource = categorias || [];
                        if (catSource.length === 0 && tetos && tetos.length > 0) {
                            console.log('Fallback: gerando categorias a partir dos tetos');
                            catSource = tetos.map(t => ({
                                id: t.id || ('cat_' + (t.categoria || '').replace(/\s+/g, '_')),
                                nome: t.categoria || '',
                                icone: '📌',
                                grupo: 'despesa',
                                teto_mensal: t.teto_mensal,
                            }));
                        }

                        const catAdaptadas = catSource.map(c => ({
                            ...c,
                            nome: c.nome || c.categoria || '',
                            emoji: c.icone || c.emoji || '📌',
                            grupo: c.grupo || 'despesa',
                            teto: Number(c.teto_mensal || c.teto || 0),
                        })).filter(c => c.nome && c.ativa !== 'nao' && c.ativa !== false);
                        const metasAdaptadas = (metas || []).map(m => ({
                            ...m,
                            valor_meta: Number(m.valor_alvo || m.valor_meta || 0),
                            valor_atual: Number(m.valor_atual || 0),
                            ativa: m.status === 'ativa' || m.ativa === true,
                            data_limite: (() => {
                                const raw = m.data_limite || m.prazo || m.data_prazo || '';
                                if (!raw) return '';
                                const s = String(raw).trim();
                                // YYYY-MM-DD
                                if (s.match(/^\d{4}-\d{2}-\d{2}/)) return s.slice(0, 10);
                                // DD/MM/YYYY
                                if (s.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
                                    const [dd, mm, yy] = s.split('/');
                                    return `${yy}-${mm}-${dd}`;
                                }
                                // ISO with T
                                if (s.includes('T')) {
                                    const d = new Date(s);
                                    if (!isNaN(d.getTime())) return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                                }
                                return s;
                            })(),
                        }));

                        setData({
                            contas: contasAdaptadas,
                            lancamentos: lancAdaptados,
                            categorias: catAdaptadas,
                            metas: metasAdaptadas,
                        });
                        setConectado(true);
                    } catch (e) {
                        console.warn('Erro ao carregar da planilha:', e);
                        setErroConexao('Não consegui conectar na planilha. Verifique a URL em Configurar.');
                    }
                    setCarregando(false);
                }
                carregarDados();
            }, [authCarregando]);

            // Se auth ainda carregando, mostrar splash
            if (authCarregando) {
                return (
                    <div style={{
                        minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center',
                        background: 'linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%)', color: '#93c5fd'
                    }}>
                        <div style={{ textAlign: 'center' }}>
                            <p style={{ fontSize: '2.5rem', margin: 0 }}>💰</p>
                            <p style={{ fontSize: '1.1rem', marginTop: '0.75rem' }}>CaixaClara</p>
                        </div>
                    </div>
                );
            }

            // Se não logado, mostrar tela de login
            if (!usuario) {
                return <LoginScreen onLogin={setUsuario} authConfig={authConfig} />;
            }

            // Funções para salvar dados (chamadas pelos componentes)
            const salvarConta = async (conta) => {
                setSalvando(true);
                const isNova = !data.contas.find(c => c.id === conta.id);
                // Atualiza estado local
                if (!isNova) {
                    setData(prev => ({ ...prev, contas: prev.contas.map(c => c.id === conta.id ? conta : c) }));
                } else {
                    if (!conta.id) conta.id = 'C' + Date.now();
                    setData(prev => ({ ...prev, contas: [...prev.contas, conta] }));
                }
                // Salva na planilha
                const dadosPlanilha = {
                    ...conta,
                    saldo_atual: conta.saldo !== undefined ? conta.saldo : (conta.saldo_atual || 0),
                    visao_caixa: conta.visao_caixa ? 'sim' : 'nao',
                    patrimonio_total: conta.patrimonio_total ? 'sim' : 'nao',
                    data_atualizacao: new Date().toISOString().slice(0, 10),
                };
                try {
                    const resultado = await api.post('salvar_conta', dadosPlanilha);
                    console.log('salvarConta resultado:', resultado);
                    if (!resultado || resultado.erro) {
                        console.error('Erro ao salvar conta:', resultado);
                        // Reverter estado local se falhou
                        if (isNova) {
                            setData(prev => ({ ...prev, contas: prev.contas.filter(c => c.id !== conta.id) }));
                        }
                        alert('Erro ao salvar conta: ' + (resultado?.erro || 'Sem resposta do servidor. Verifique se o Code.gs foi implantado.'));
                        setSalvando(false);
                        return null;
                    }
                    if (resultado.id && isNova) {
                        setData(prev => ({ ...prev, contas: prev.contas.map(c => c.id === conta.id ? { ...c, id: resultado.id } : c) }));
                    }
                    setSalvando(false);
                    return resultado;
                } catch (e) {
                    console.error('Exceção ao salvar conta:', e);
                    if (isNova) {
                        setData(prev => ({ ...prev, contas: prev.contas.filter(c => c.id !== conta.id) }));
                    }
                    alert('Erro ao salvar conta. Verifique a conexão com a planilha.');
                    setSalvando(false);
                    return null;
                }
            };

            const salvarLancamento = async (lanc) => {
                setSalvando(true);
                if (data.lancamentos.find(l => l.id === lanc.id)) {
                    setData(prev => ({ ...prev, lancamentos: prev.lancamentos.map(l => l.id === lanc.id ? lanc : l) }));
                } else {
                    if (!lanc.id) lanc.id = 'L' + Date.now();
                    setData(prev => ({ ...prev, lancamentos: [...prev.lancamentos, lanc] }));
                }
                const dadosPlanilha = {
                    ...lanc,
                    data_transacao: lanc.data,
                    data_competencia: lanc.data_competencia || lanc.data,
                    descricao_original: lanc.descricao,
                    categoria: lanc.categoria_id,
                    cartao: lanc.conta_origem || lanc.cartao || '',
                    is_cartao: lanc.is_cartao ? 'sim' : 'nao',
                };
                await api.post('salvar_lancamento', dadosPlanilha);
                setSalvando(false);
            };

            const deletarLancamento = async (id) => {
                setData(prev => ({ ...prev, lancamentos: prev.lancamentos.filter(l => l.id !== id) }));
                await api.post('deletar_lancamento', { id });
            };

            const salvarCategoria = async (cat) => {
                setSalvando(true);
                if (data.categorias.find(c => c.id === cat.id)) {
                    setData(prev => ({ ...prev, categorias: prev.categorias.map(c => c.id === cat.id ? cat : c) }));
                } else {
                    if (!cat.id) cat.id = 'cat' + Date.now();
                    setData(prev => ({ ...prev, categorias: [...prev.categorias, cat] }));
                }
                // Salvar TUDO na aba categorias (unificado com teto)
                const catDados = {
                    id: cat.id,
                    nome: cat.nome,
                    icone: cat.emoji || cat.icone || '📌',
                    grupo: cat.grupo || 'despesa',
                    ativa: 'sim',
                    ordem: cat.ordem || 0,
                    teto_mensal: Number(cat.teto) || 0,
                    tipo: cat.tipo || 'despesa',
                };
                await api.post('salvar_categoria', catDados);
                setSalvando(false);
            };

            const salvarMeta = async (meta) => {
                setSalvando(true);
                if (data.metas.find(m => m.id === meta.id)) {
                    setData(prev => ({ ...prev, metas: prev.metas.map(m => m.id === meta.id ? meta : m) }));
                } else {
                    if (!meta.id) meta.id = 'M' + Date.now();
                    setData(prev => ({ ...prev, metas: [...prev.metas, meta] }));
                }
                await api.post('salvar_meta', {
                    ...meta,
                    valor_alvo: meta.valor_meta,
                    prazo: meta.data_limite || '',
                    data_prazo: meta.data_limite || '',
                    status: meta.ativa ? 'ativa' : 'inativa',
                });
                setSalvando(false);
            };

            // Bundle de ações para passar aos componentes
            // Adicionar lançamentos em lote (usado pelo importador)
            const adicionarLancamentosLote = (novosLancs) => {
                setData(prev => ({ ...prev, lancamentos: [...prev.lancamentos, ...novosLancs] }));
            };

            // Ações em lote
            const deletarLancamentosLote = async (ids) => {
                setData(prev => ({ ...prev, lancamentos: prev.lancamentos.filter(l => !ids.includes(l.id)) }));
                // Deletar no backend em paralelo (mini-lotes de 5)
                for (let i = 0; i < ids.length; i += 5) {
                    const batch = ids.slice(i, i + 5);
                    await Promise.all(batch.map(id => api.post('deletar_lancamento', { id })));
                }
            };

            const atualizarLancamentosLote = async (ids, campos) => {
                // campos = { categoria_id: 'x' } ou { categoria_id: '' }
                setData(prev => ({
                    ...prev,
                    lancamentos: prev.lancamentos.map(l =>
                        ids.includes(l.id) ? { ...l, ...campos } : l
                    )
                }));
                // Salvar no backend
                for (let i = 0; i < ids.length; i += 5) {
                    const batch = ids.slice(i, i + 5);
                    await Promise.all(batch.map(id => {
                        const lanc = data.lancamentos.find(l => l.id === id);
                        if (!lanc) return Promise.resolve();
                        const updated = { ...lanc, ...campos };
                        return api.post('salvar_lancamento', {
                            ...updated,
                            data_transacao: updated.data,
                            descricao_original: updated.descricao,
                            categoria: updated.categoria_id,
                            cartao: updated.conta_origem || updated.cartao || '',
                            is_cartao: updated.is_cartao ? 'sim' : 'nao',
                        });
                    }));
                }
            };

            const deletarCategoria = async (id) => {
                // Remover do estado local imediatamente
                setData(prev => ({ ...prev, categorias: prev.categorias.filter(c => c.id !== id) }));
                // No backend: marcar como inativa (a planilha não suporta delete real de linhas facilmente)
                const cat = data.categorias.find(c => c.id === id);
                if (cat) {
                    await api.post('salvar_categoria', {
                        id: cat.id,
                        nome: cat.nome,
                        icone: cat.emoji || cat.icone || '📌',
                        grupo: cat.grupo || 'despesa',
                        ativa: 'nao',
                        ordem: cat.ordem || 0,
                        teto_mensal: Number(cat.teto) || 0,
                    });
                }
                // Também tentar deletar diretamente (caso o backend suporte)
                try { await api.post('deletar_categoria', { id }); } catch(e) {}
            };

            const removerLancamentosPorIds = (ids) => {
                const idsSet = new Set(ids);
                setData(prev => ({
                    ...prev,
                    lancamentos: prev.lancamentos.filter(l => !idsSet.has(l.id))
                }));
            };

            const actions = { salvarConta, salvarLancamento, deletarLancamento, salvarCategoria, deletarCategoria, salvarMeta, adicionarLancamentosLote, deletarLancamentosLote, atualizarLancamentosLote, removerLancamentosPorIds };

            const sidebarItems = [
                { id: 'visao-geral', label: 'Visão Geral', icon: '📊' },
                { id: 'lancamentos', label: 'Lançamentos', icon: '💸' },
                { id: 'categorias', label: 'Categorias', icon: '🏷️' },
                { id: 'contas', label: 'Contas', icon: '🏦' },
                { id: 'reservas', label: 'Reservas', icon: '📈' },
                { id: 'planejamento', label: 'Planejamento', icon: '🎯' },
                { id: 'relatorios', label: 'Relatórios', icon: '📋' },
                { id: 'importar', label: 'Importar', icon: '📥' },
                { id: 'configurar', label: 'Configurar', icon: '⚙️' }
            ];

            return (
                <div style={{ display: 'flex', width: '100%', minHeight: '100vh' }}>
                    {/* Sidebar */}
                    <div className="sidebar">
                        <div className="sidebar-logo">
                            <span>💰</span>
                            <span>CaixaClara</span>
                        </div>

                        <div style={{ padding: '1rem 0' }}>
                            {sidebarItems.map(item => (
                                <div
                                    key={item.id}
                                    className={`nav-item ${currentPage === item.id ? 'active' : ''}`}
                                    onClick={() => setCurrentPage(item.id)}
                                >
                                    <span>{item.icon}</span>
                                    <span>{item.label}</span>
                                </div>
                            ))}
                        </div>

                        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: '1.5rem', borderTop: '1px solid rgba(255,255,255,0.1)', fontSize: '0.75rem', color: '#64748b' }}>
                            {/* User info */}
                            {usuario && usuario.email !== 'dev@local' && (
                                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.75rem' }}>
                                    {usuario.foto ? (
                                        <img src={usuario.foto} alt="" style={{ width: 24, height: 24, borderRadius: '50%' }} referrerPolicy="no-referrer" />
                                    ) : (
                                        <span style={{ width: 24, height: 24, borderRadius: '50%', background: '#3b82f6', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', fontSize: '0.65rem', fontWeight: 600 }}>
                                            {(usuario.nome || '?')[0].toUpperCase()}
                                        </span>
                                    )}
                                    <span style={{ color: '#cbd5e1', fontSize: '0.8rem', flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                        {usuario.nome}
                                    </span>
                                    <span onClick={handleLogout} style={{ cursor: 'pointer', color: '#94a3b8', fontSize: '0.7rem', padding: '0.2rem 0.4rem', borderRadius: '0.25rem', border: '1px solid rgba(255,255,255,0.1)' }}
                                        title="Sair">Sair</span>
                                </div>
                            )}
                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.5rem' }}>
                                <span style={{ width: 8, height: 8, borderRadius: '50%', background: conectado ? '#22c55e' : '#f59e0b' }}></span>
                                <span>{conectado ? 'Planilha conectada' : 'Modo demo'}</span>
                            </div>
                            {salvando && <p style={{ margin: 0, color: '#93c5fd' }}>Salvando...</p>}
                            <p style={{ margin: '0.25rem 0 0 0' }}>CaixaClara v2</p>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="main-content">
                        {carregando ? (
                            <div style={{ textAlign: 'center', padding: '4rem', color: '#64748b' }}>
                                <p style={{ fontSize: '2rem' }}>⏳</p>
                                <p>Carregando dados da planilha...</p>
                            </div>
                        ) : erroConexao ? (
                            <div style={{ textAlign: 'center', padding: '4rem' }}>
                                <p style={{ fontSize: '2rem' }}>⚠️</p>
                                <p style={{ color: '#ef4444', fontWeight: '600' }}>{erroConexao}</p>
                                <button className="button button-primary" style={{ marginTop: '1rem' }}
                                    onClick={() => setCurrentPage('configurar')}>Ir para Configurar</button>
                            </div>
                        ) : (
                            <>
                                {/* Banner informativo quando conectado mas base vazia */}
                                {conectado && data.contas.length === 0 && data.lancamentos.length === 0 && currentPage === 'visao-geral' && (
                                    <div style={{ padding: '2rem', background: '#eff6ff', borderRadius: '12px', border: '1px solid #93c5fd', marginBottom: '1.5rem', textAlign: 'center' }}>
                                        <p style={{ fontSize: '2.5rem', margin: '0 0 0.75rem 0' }}>🎉</p>
                                        <h3 style={{ margin: '0 0 0.75rem 0', color: '#1e40af', fontSize: '1.2rem' }}>Planilha conectada! Base limpa e pronta.</h3>
                                        <p style={{ margin: '0 0 1rem 0', color: '#3b82f6', fontSize: '0.9rem' }}>
                                            Seus dados estão vindo direto da planilha Google. Comece cadastrando suas contas e depois registre lançamentos.
                                        </p>
                                        <div style={{ display: 'flex', gap: '0.75rem', justifyContent: 'center' }}>
                                            <button className="button button-primary" onClick={() => setCurrentPage('contas')}>1. Cadastrar Contas</button>
                                            <button className="button button-secondary" onClick={() => setCurrentPage('categorias')}>2. Configurar Categorias</button>
                                        </div>
                                    </div>
                                )}

                                {/* Indicador "Modo Demo" quando não conectado */}
                                {!conectado && currentPage === 'visao-geral' && (
                                    <div style={{ padding: '0.75rem 1.25rem', background: '#fffbeb', borderRadius: '8px', border: '1px solid #fcd34d', marginBottom: '1.25rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                        <p style={{ margin: 0, fontSize: '0.85rem', color: '#92400e' }}>
                                            ⚠️ <strong>Modo demonstração</strong> — estes são dados fictícios. Conecte sua planilha Google para usar dados reais.
                                        </p>
                                        <button className="button button-primary" style={{ fontSize: '0.8rem', padding: '0.35rem 0.85rem', whiteSpace: 'nowrap' }}
                                            onClick={() => setCurrentPage('configurar')}>Configurar</button>
                                    </div>
                                )}

                                {currentPage === 'visao-geral' && <Dashboard data={data} />}
                                {currentPage === 'lancamentos' && <Lancamentos data={data} actions={actions} />}
                                {currentPage === 'categorias' && <Categorias data={data} actions={actions} />}
                                {currentPage === 'contas' && <Contas data={data} actions={actions} />}
                                {currentPage === 'reservas' && <Reservas data={data} actions={actions} />}
                                {currentPage === 'planejamento' && <Planejamento data={data} actions={actions} />}
                                {currentPage === 'relatorios' && <Relatorios data={data} />}
                                {currentPage === 'importar' && <Importar data={data} actions={actions} />}
                                {currentPage === 'configurar' && <Configurar />}
                            </>
                        )}
                    </div>
                </div>
            );
        }

        // Render the app
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
