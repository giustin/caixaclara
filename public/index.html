                    if (!Array.isArray(partes) || partes.length < 2) { linhasOut.push(linha); return; }
                    const valorTotal = Number(linha.valor) || 0;
                    if (!(valorTotal > 0)) { linhasOut.push(linha); return; }
                    // Computa valores por parte arredondados; ajusta a última para garantir soma exata
                    let somaParciais = 0;
                    const valores = partes.map((p, i) => {
                        if (i === partes.length - 1) return null;
                        const v = Math.round(valorTotal * (Number(p.pct) || 0) * 100) / 100;
                        somaParciais += v;
                        return v;
                    });
                    valores[valores.length - 1] = Math.round((valorTotal - somaParciais) * 100) / 100;
                    const startIdx = linhasOut.length;
                    partes.forEach((p, n) => {
                        linhasOut.push({
                            ...linha,
                            descricao: `${linha.descricao} (parte ${n + 1})`,
                            valor: valores[n],
                            identificador: linha.identificador || null,
                            origemSplit: true,
                            origemSplitAuto: true,
                            origemSplitIndex: n + 1,
                            origemSplitTotal: partes.length,
                            regraSplitId: regra.id,
                        });
                        const novoIdx = startIdx + n;
                        classifOut[novoIdx] = {
                            categoria_id: p.categoria_id || '',
                            confianca: p.categoria_id ? 'alta' : 'baixa',
                            metodo: 'regra_split',
                        };
                        reembOut[novoIdx] = !!p.reembolsavel;
                    });
                    totalAutoSplits++;
                });
                return { linhas: linhasOut, classificacoes: classifOut, reembolsaveis: reembOut, totalAutoSplits };
            };

            // Aplica automaticamente as regras de split quando o preview é carregado pela primeira vez.
            // Usa a flag preview.regrasAutoAplicadas como gate — classificação aguarda isto rodar.
            useEffect(() => {
                if (!preview || preview.regrasAutoAplicadas) return;
                if (regrasSplit.length === 0) {
                    // sem regras salvas — marca como aplicado (nada a fazer) pra liberar classificação
                    setPreview(prev => prev ? { ...prev, regrasAutoAplicadas: true } : prev);
                    return;
                }
                const res = expandirComRegrasSplit(preview.linhas, regrasSplit);
                if (!res || res.totalAutoSplits === 0) {
                    setPreview(prev => prev ? { ...prev, regrasAutoAplicadas: true } : prev);
                    return;
                }
                setPreview(prev => prev ? { ...prev, linhas: res.linhas, regrasAutoAplicadas: true, totalAutoSplits: res.totalAutoSplits } : prev);
                setClassificacoes(prev => ({ ...prev, ...res.classificacoes }));
                setReembolsaveis(prev => ({ ...prev, ...res.reembolsaveis }));
            }, [preview, regrasSplit]);

            // Classificar lançamentos quando preview, regras ou categorias mudam
            useEffect(() => {
                if (!preview) return;
                if (!preview.regrasAutoAplicadas) return; // aguardar effect de auto-split de regras rodar primeiro
                if (!data.categorias || data.categorias.length === 0) return; // esperar categorias carregarem
                const novasClass = {};
                preview.linhas.forEach((l, i) => {
                    // Manter classificações manuais ou vindas de regra de split
                    if (classificacoes[i]?.metodo === 'manual' || classificacoes[i]?.metodo === 'regra_split') {
                        novasClass[i] = classificacoes[i];
                        return;
                    }
                    // Tentar classificação padrão pela descrição
                    let classif = classificarLancamento(l.descricao, regrasAprendidas, data.categorias);
                    // Se não classificou e tem categoria do Itaú, usar como fallback
                    if (classif.confianca === 'baixa' && l.categoria_itau) {
                        const mapItau = {
                            'ALIMENTAÇÃO': 'Restaurantes', 'EDUCAÇÃO': 'Educação',
                            'SAÚDE': 'Saúde', 'VESTUÁRIO': 'Compras Pessoais',
                            'VEÍCULOS': 'Combustível', 'DIVERSOS': '',
                            'MORADIA': 'Casa', 'HOBBY': 'Lazer',
                            'TURISMO E ENTRETENIM': 'Lazer', 'TURISMOEENTRETENIM': 'Lazer',
                        };
                        const catItauNorm = l.categoria_itau.replace(/\s+/g, ' ').trim().toUpperCase();
                        const catNome = mapItau[catItauNorm] || mapItau[Object.keys(mapItau).find(k => catItauNorm.includes(k))] || '';
                        if (catNome) {
                            const catId = encontrarCategoriaPorNome(catNome, data.categorias);
                            if (catId) {
                                classif = { categoria_id: catId, confianca: 'media', metodo: 'categoria_itau' };
                            }
                        }
                    }
                    novasClass[i] = classif;
                });
                setClassificacoes(novasClass);
            }, [preview, regrasAprendidas, data.categorias]);

            const [duplicadas, setDuplicadas] = useState({});

            // Agrupar lançamentos por lote para mostrar contagem
            const lancsPorLote = {};
            data.lancamentos.forEach(l => {
                if (l.lote_importacao) {
                    if (!lancsPorLote[l.lote_importacao]) lancsPorLote[l.lote_importacao] = 0;
                    lancsPorLote[l.lote_importacao]++;
                }
            });

            // Parser CSV
            // Normalizar data de qualquer formato para YYYY-MM-DD
            const normalizarData = (d) => {
                if (!d) return '';
                const s = String(d).trim();
                if (s.match(/^\d{4}-\d{2}-\d{2}/)) return s.slice(0, 10); // YYYY-MM-DD (já ISO)
                if (s.match(/^\d{2}\/\d{2}\/\d{4}$/)) { const [dd,mm,yy]=s.split('/'); return `${yy}-${mm}-${dd}`; } // DD/MM/YYYY
                if (s.match(/^\d{2}\/\d{2}\/\d{2}$/)) { const [dd,mm,yy]=s.split('/'); return `20${yy}-${mm}-${dd}`; } // DD/MM/YY
                if (s.match(/^\d{2}-\d{2}-\d{4}$/)) { const [dd,mm,yy]=s.split('-'); return `${yy}-${mm}-${dd}`; } // DD-MM-YYYY (Mercado Pago)
                if (s.match(/^\d{2}-\d{2}-\d{2}$/)) { const [dd,mm,yy]=s.split('-'); return `20${yy}-${mm}-${dd}`; } // DD-MM-YY
                if (s.includes('T')) return new Date(s).toISOString().slice(0, 10);
                return s;
            };

            // --- Deduplicação: fingerprint de lançamento ---
            const gerarFingerprint = (data, valor, descricao, contaId) => {
                const d = normalizarData(data);
                const v = Math.abs(Number(valor) || 0).toFixed(2);
                const desc = (descricao || '').trim().toLowerCase().replace(/\s+/g, ' ').slice(0, 60);
                return `${d}|${v}|${desc}|${contaId || ''}`;
            };

            // --- Deduplicação: marcar linhas duplicadas no preview ---
            useEffect(() => {
                if (!preview || !cartaoSelecionado) { setDuplicadas({}); return; }
                const existentes = new Set();
                const identificadoresExistentes = new Set();
                data.lancamentos.forEach(l => {
                    existentes.add(gerarFingerprint(l.data, l.valor, l.descricao || l.descricao_original, l.conta_origem));
                    existentes.add(gerarFingerprint(l.data, l.valor, l.descricao || l.descricao_original, ''));
                    // Também indexa por identificador UUID se existir
                    if (l.identificador) identificadoresExistentes.add(l.identificador);
                });
                const novasDup = {};
                let count = 0;
                preview.linhas.forEach((l, i) => {
                    // Deduplicação por UUID (perfeita) — se disponível
                    if (l.identificador && identificadoresExistentes.has(l.identificador)) {
                        novasDup[i] = true;
                        count++;
                        return;
                    }
                    // Fallback: deduplicação por fingerprint
                    const fp1 = gerarFingerprint(l.data, l.valor, l.descricao, cartaoSelecionado);
                    const fp2 = gerarFingerprint(l.data, l.valor, l.descricao, '');
                    if (existentes.has(fp1) || existentes.has(fp2)) {
                        novasDup[i] = true;
                        count++;
                    }
                });
                setDuplicadas(novasDup);
                if (count > 0) {
                    setResultado(prev => ({
                        tipo: 'aviso',
                        msg: `⚠️ ${count} lançamento${count > 1 ? 's' : ''} já existe${count > 1 ? 'm' : ''} na base. Duplicados serão ignorados na importação.`
                    }));
                }
            }, [preview, cartaoSelecionado, data.lancamentos]);

            // Normalizar valor BR (1.234,56 → 1234.56)
            const normalizarValor = (v) => {
                const s = String(v).replace(/[R$\s]/g, '');
                // Se tem ponto E vírgula, é formato BR: 1.234,56
                if (s.includes('.') && s.includes(',')) return parseFloat(s.replace(/\./g, '').replace(',', '.'));
                // Se só tem vírgula, é BR: 1234,56
                if (s.includes(',') && !s.includes('.')) return parseFloat(s.replace(',', '.'));
                // Se só tem ponto, é EN: 1234.56
                return parseFloat(s);
            };

            // Detecta se um lançamento é transferência entre contas próprias (ou da família)
            // Retorna a conta destino detectada, ou null se não for transferência interna.
            // Lógica: match por titular/co-titular (PIX sempre traz nome), depois instituição,
            // e por fim match cruzado com lançamentos já importados (mesma data+valor).
            const detectarContaTransferencia = (descricao, valor, dataStr, contaAtualId) => {
                const descUpper = String(descricao || '').toUpperCase();
                if (!descUpper.includes('TRANSFER') &&
                    !descUpper.includes('PIX ENVIADO') &&
                    !descUpper.includes('PIX RECEBIDO') &&
                    !descUpper.includes('PIX - ENVIADO') &&
                    !descUpper.includes('PIX - RECEBIDO')) return null;

                const outrasContas = data.contas.filter(c => c.id !== contaAtualId && c.status !== 'arquivada');
                const extrairNomes = (conta) => {
                    const nomes = [];
                    if (conta?.titular) nomes.push(conta.titular.toUpperCase().trim());
                    if (conta?.co_titulares) {
                        conta.co_titulares.split(',').forEach(n => {
                            const nome = n.trim().toUpperCase();
                            if (nome.length > 3) nomes.push(nome);
                        });
                    }
                    return nomes;
                };
                const contasComNomes = outrasContas.map(conta => ({ conta, nomes: extrairNomes(conta) }));
                const contaAtual = data.contas.find(c => c.id === contaAtualId);
                const nomesContaAtual = extrairNomes(contaAtual);

                // Critério 1: extrair nome do PIX e match contra titulares/co-titulares
                const matchNome = descricao.match(/Transfer[eê]ncia\s+(?:enviada|recebida)\s+(?:pelo Pix\s*-\s*)?(.+?)(?:\s*-\s*[•\d])/i)
                    || descricao.match(/Transfer[eê]ncia\s+Recebida\s*-\s*(.+?)(?:\s*-\s*[•\d])/i)
                    || descricao.match(/Pix\s+(?:enviado|recebido)\s+(.+?)(?:\s*-\s*[•\d])/i)
                    || descricao.match(/Pix\s+(?:enviado|recebido)\s+(.+)$/i)
                    || descricao.match(/Pix\s*-\s*(?:Enviado|Recebido)\s*-\s*\d{2}\/\d{2}\s+\d{2}:\d{2}\s+\d*\s*([A-ZÁ-Ú][A-ZÁ-Ú\s]+?)(?:\s*$)/i);
                let nomeExtraido = false;
                if (matchNome) {
                    nomeExtraido = true;
                    const nomePix = matchNome[1].trim().toUpperCase();
                    const palavrasNome = nomePix.split(/\s+/).filter(p => p.length > 2);
                    const matchaConta = (nomesList) => {
                        for (const nomeRef of nomesList) {
                            const palavrasRef = nomeRef.split(/\s+/).filter(p => p.length > 2);
                            const matchCount = palavrasRef.filter(p => palavrasNome.includes(p)).length;
                            const minPalavras = Math.min(palavrasRef.length, palavrasNome.length);
                            const threshold = Math.max(2, Math.ceil(minPalavras * 0.7));
                            if (matchCount >= threshold) return true;
                        }
                        return false;
                    };
                    const ehFamilia = matchaConta(nomesContaAtual) || contasComNomes.some(cn => matchaConta(cn.nomes));
                    if (ehFamilia) {
                        for (const { conta, nomes } of contasComNomes) {
                            if (matchaConta(nomes) || matchaConta(nomesContaAtual)) {
                                const inst = (conta.instituicao || '').toUpperCase().trim();
                                if (inst.length >= 4 && descUpper.includes(inst)) return conta;
                            }
                        }
                        for (const { conta, nomes } of contasComNomes) {
                            if (matchaConta(nomes) || matchaConta(nomesContaAtual)) return conta;
                        }
                    }
                }

                // Critério 2: match por instituição (só se não extraiu nome)
                if (!nomeExtraido) {
                    for (const conta of outrasContas) {
                        const inst = (conta.instituicao || '').toUpperCase().trim();
                        if (inst.length >= 4 && descUpper.includes(inst)) return conta;
                    }
                }

                // Critério 3: match cruzado com lançamentos já importados (mesma data+valor)
                if (data.lancamentos && data.lancamentos.length > 0 && dataStr) {
                    const valorAbs = Math.abs(valor);
                    const lancMatch = data.lancamentos.find(l =>
                        l.tipo === 'transferencia_interna' &&
                        l.conta_origem !== contaAtualId &&
                        l.data === dataStr &&
                        Math.abs(Math.abs(Number(l.valor)) - valorAbs) < 0.01
                    );
                    if (lancMatch) {
                        const contaOrigem = outrasContas.find(c => c.id === lancMatch.conta_origem);
                        if (contaOrigem) return contaOrigem;
                    }
                }

                return null;
            };

            // Parser CSV inteligente (Nubank, BB, genérico)
            const parsearCSV = (text, nomeArquivo) => {
                const lines = text.split('\n').filter(l => l.trim());
                if (lines.length < 2) { setResultado({ tipo: 'erro', msg: 'Arquivo vazio ou sem dados' }); return; }

                const sep = lines[0].includes(';') ? ';' : ',';
                const headers = lines[0].split(sep).map(h => h.trim().replace(/"/g, '').toLowerCase());

                // ========== DETECTAR FORMATO ==========
                const isNubankCartao = headers.includes('date') && headers.includes('title') && headers.includes('amount');
                const isNubankCC = headers.includes('data') && headers.includes('valor') && headers.includes('identificador') && headers.some(h => h.includes('descri'));
                const isBB = headers.some(h => h.includes('histórico') || h.includes('historico')) && headers.some(h => h.includes('valor'));
                // Itaú PDA / Cartão: headers = "data", "lançamento", "valor" (com BOM UTF-8)
                const headersClean = headers.map(h => h.replace(/^\ufeff/, ''));
                const isItauCartao = (headersClean.includes('data') || headers.some(h => h.includes('data')))
                    && (headersClean.some(h => h.includes('lançamento') || h.includes('lancamento')) || headers.some(h => h.includes('lançamento') || h.includes('lancamento')))
                    && (headersClean.includes('valor') || headers.some(h => h.includes('valor')));
                let formato = isNubankCartao ? 'Nubank Cartão' : isNubankCC ? 'Nubank Conta Corrente' : isBB ? 'Banco do Brasil' : isItauCartao ? 'Itaú Cartão (CSV)' : 'Genérico';

                // Mapear colunas
                let colData, colDesc, colVal, colCat, colIdentificador;
                if (isNubankCartao) {
                    colData = headers.indexOf('date');
                    colDesc = headers.indexOf('title');
                    colVal = headers.indexOf('amount');
                    colCat = headers.indexOf('category');
                    colIdentificador = -1;
                } else if (isNubankCC) {
                    colData = headers.indexOf('data');
                    colDesc = headers.findIndex(h => h.includes('descri'));
                    colVal = headers.indexOf('valor');
                    colCat = -1;
                    colIdentificador = headers.indexOf('identificador');
                } else if (isBB) {
                    colData = headers.findIndex(h => h === 'data' || h.includes('data'));
                    colDesc = headers.findIndex(h => h.includes('histórico') || h.includes('historico'));
                    colVal = headers.findIndex(h => h.includes('valor'));
                    colIdentificador = -1;
                } else if (isItauCartao) {
                    colData = headersClean.findIndex(h => h === 'data' || h.includes('data'));
                    if (colData < 0) colData = headers.findIndex(h => h.includes('data'));
                    colDesc = headersClean.findIndex(h => h.includes('lançamento') || h.includes('lancamento'));
                    if (colDesc < 0) colDesc = headers.findIndex(h => h.includes('lançamento') || h.includes('lancamento'));
                    colVal = headersClean.findIndex(h => h === 'valor');
                    if (colVal < 0) colVal = headers.findIndex(h => h.includes('valor'));
                    colCat = -1;
                    colIdentificador = -1;
                } else {
                    colData = headers.findIndex(h => h.includes('data') || h === 'date');
                    colDesc = headers.findIndex(h => h.includes('descri') || h.includes('title') || h.includes('histor') || h.includes('estabelecimento'));
                    colVal = headers.findIndex(h => h.includes('valor') || h.includes('amount') || h.includes('quantia'));
                    colIdentificador = headers.findIndex(h => h.includes('identificador'));
                }

                if (colDesc < 0 || colVal < 0) {
                    setResultado({ tipo: 'erro', msg: `Formato não reconhecido. Cabeçalhos encontrados: ${headers.join(', ')}` });
                    return;
                }

                const linhas = [];
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(sep).map(c => c.trim().replace(/"/g, ''));
                    if (cols.length < 2) continue;

                    const rawVal = cols[colVal] || '0';
                    const valNum = normalizarValor(rawVal);
                    const valor = Math.abs(valNum);
                    if (valor === 0 || isNaN(valor)) continue;

                    const dataStr = normalizarData(cols[colData >= 0 ? colData : 0] || '');
                    const descricao = cols[colDesc] || '';

                    // Filtrar linhas de saldo/resumo (manter rendimentos de investimento)
                    const descLower = descricao.toLowerCase();
                    if (descLower.includes('saldo') || descLower.includes('total')) continue;

                    // Pagamento de fatura: filtrar apenas em fatura de cartão (não em extrato de conta corrente)
                    // No extrato CC, "Pagamento de fatura" é uma saída real de dinheiro e deve ser importada
                    if (!isNubankCC) {
                        if (descLower.includes('pagamento') && descLower.includes('fatura')) continue;
                        if (descLower === 'pagamento') continue;
                        // Itaú CSV: "PAGTO FICHA COMPENSACAO" é o pagamento da fatura anterior
                        if (descLower.includes('pagto') && descLower.includes('ficha') && descLower.includes('compensacao')) continue;
                    }
                    // Cartão de crédito: "pagamento recebido" é pgto da fatura anterior, filtrar
                    if (ehCartao && descLower.includes('pagamento') && descLower.includes('recebido')) continue;

                    // Cartão de crédito CSV (ex: Nubank): positivo = compra (despesa), negativo = estorno/crédito
                    // Conta bancária CSV: negativo = débito (despesa), positivo = crédito (receita)
                    let tipo;
                    let investimentoInfo = null;

                    // Detectar movimentos de investimento antes de definir tipo
                    const descUpper = descricao.toUpperCase();
                    const padroesResgate = ['RESGATE CDB', 'RESGATE RDB', 'RESGATE LCI', 'RESGATE LCA', 'RESGATE TESOURO', 'RESGATE POUPANCA', 'RESGATE POUPANÇA', 'RESGATE FUNDO', 'RESGATE RENDA FIXA', 'RESGATE INVESTIMENTO', 'RESGATE APLICACAO', 'RESGATE APLICAÇÃO', 'RESG CDB', 'RESG RDB', 'RESG APLIC', 'RESGATE ANTECIPADO'];
                    const padroesAporte = ['APLICACAO CDB', 'APLICAÇÃO CDB', 'APLICACAO RDB', 'APLICAÇÃO RDB', 'APLICACAO LCI', 'APLICAÇÃO LCI', 'APLICACAO LCA', 'APLICAÇÃO LCA', 'APLICACAO TESOURO', 'APLICAÇÃO TESOURO', 'APLICACAO FUNDO', 'APLICAÇÃO FUNDO', 'APLIC CDB', 'APLIC RDB', 'COMPRA TESOURO', 'INVESTIMENTO CDB'];
                    const padroesRendimento = ['RENDIMENTO CDB', 'RENDIMENTO RDB', 'RENDIMENTO LCI', 'RENDIMENTO LCA', 'RENDIMENTO POUPANCA', 'RENDIMENTO POUPANÇA', 'RENDIMENTO FUNDO', 'RENDIMENTO TESOURO', 'JUROS INVESTIMENTO', 'JUROS CDB', 'JUROS RDB', 'CUPOM TESOURO', 'DIVIDENDOS', 'REND APLIC', 'REND POUP'];
                    const ehResgateSozinho = /^RESGATE\b/.test(descUpper) && !descUpper.includes('SEGURO');

                    // Padrões de pagamento de fatura de cartão
                    const padroesPgtoFatura = ['PAGTO CARTAO', 'PAGAMENTO CARTAO', 'FATURA CARTAO', 'PAGTO FATURA', 'PAGAMENTO FATURA', 'PAGAMENTO DE FATURA'];
                    const ehPgtoFatura = padroesPgtoFatura.some(p => descUpper.includes(p));

                    // Detectar auto-transferência (PIX/TED entre contas próprias do usuário)
                    // Retorna a conta detectada (ou null se não for transferência própria)
                    const contaTransfDetectada = (() => {
                        if (!descUpper.includes('TRANSFER') && !descUpper.includes('PIX ENVIADO') && !descUpper.includes('PIX RECEBIDO')) return null;
                        const outrasContas = data.contas.filter(c => c.id !== cartaoSelecionado && c.status !== 'arquivada');

                        // Montar lista de nomes reconhecidos (titular + co-titulares) para cada conta
                        const contasComNomes = outrasContas.map(conta => {
                            const nomes = [];
                            if (conta.titular) nomes.push(conta.titular.toUpperCase().trim());
                            if (conta.co_titulares) {
                                conta.co_titulares.split(',').forEach(n => {
                                    const nome = n.trim().toUpperCase();
                                    if (nome.length > 3) nomes.push(nome);
                                });
                            }
                            return { conta, nomes };
                        });
                        // Também incluir co-titulares da conta sendo importada (a conta corrente atual)
                        const contaAtual = data.contas.find(c => c.id === cartaoSelecionado);
                        const nomesContaAtual = [];
                        if (contaAtual?.titular) nomesContaAtual.push(contaAtual.titular.toUpperCase().trim());
                        if (contaAtual?.co_titulares) {
                            contaAtual.co_titulares.split(',').forEach(n => {
                                const nome = n.trim().toUpperCase();
                                if (nome.length > 3) nomesContaAtual.push(nome);
                            });
                        }

                        // Critério 1: Match por nome do titular/co-titular (PIX sempre traz nome)
                        // Formatos cobertos: "Transferência enviada pelo Pix - NOME", "Transferência Recebida - NOME",
                        // "Pix enviado NOME" (Mercado Pago), "Pix recebido NOME" (Mercado Pago)
                        const matchNome = descricao.match(/Transfer[eê]ncia\s+(?:enviada|recebida)\s+(?:pelo Pix\s*-\s*)?(.+?)(?:\s*-\s*[•\d])/i)
                            || descricao.match(/Transfer[eê]ncia\s+Recebida\s*-\s*(.+?)(?:\s*-\s*[•\d])/i)
                            || descricao.match(/Pix\s+(?:enviado|recebido)\s+(.+?)(?:\s*-\s*[•\d])/i);
                        let nomeExtraido = false;
                        if (matchNome) {
                            nomeExtraido = true;
                            const nomePix = matchNome[1].trim().toUpperCase();
                            const palavrasNome = nomePix.split(/\s+/).filter(p => p.length > 2);

                            // Função de match: verifica se nomePix bate com algum dos nomes da conta
                            // Exige 70% das palavras do nome mais curto (evita falso positivo com sobrenomes comuns)
                            const matchaConta = (nomesList) => {
                                for (const nomeRef of nomesList) {
                                    const palavrasRef = nomeRef.split(/\s+/).filter(p => p.length > 2);
                                    const matchCount = palavrasRef.filter(p => palavrasNome.includes(p)).length;
                                    const minPalavras = Math.min(palavrasRef.length, palavrasNome.length);
                                    const threshold = Math.max(2, Math.ceil(minPalavras * 0.7));
                                    if (matchCount >= threshold) return true;
                                }
                                return false;
                            };

                            // Verificar se o nome no PIX é alguém da família (titular ou co-titular de qualquer conta)
                            const ehFamilia = matchaConta(nomesContaAtual) ||
                                contasComNomes.some(cn => matchaConta(cn.nomes));

                            if (ehFamilia) {
                                // Passo 1a: nome + instituição (identifica a conta certa)
                                for (const { conta, nomes } of contasComNomes) {
                                    if (matchaConta(nomes) || matchaConta(nomesContaAtual)) {
                                        const inst = (conta.instituicao || '').toUpperCase().trim();
                                        if (inst.length >= 4 && descUpper.includes(inst)) return conta;
                                    }
                                }
                                // Passo 1b: só nome (fallback)
                                for (const { conta, nomes } of contasComNomes) {
                                    if (matchaConta(nomes) || matchaConta(nomesContaAtual)) return conta;
                                }
                            }
                        }

                        // Critério 2: Match por instituição — SÓ para transferências sem nome extraído
                        // (ex: TED genérica, DOC). Se extraímos nome e não bateu, a instituição
                        // na descrição é do TERCEIRO, não do usuário → não usar.
                        if (!nomeExtraido) {
                            for (const conta of outrasContas) {
                                const inst = (conta.instituicao || '').toUpperCase().trim();
                                const nome = (conta.nome || '').toUpperCase().trim();
                                if (inst.length >= 4 && descUpper.includes(inst)) return conta;
                                if (nome.length >= 4) {
                                    const palavrasNome = nome.split(/\s+/).filter(p => p.length > 2 && !['CDB', 'CDI', 'LCI', 'LCA', 'VENC'].includes(p));
                                    const matchCount = palavrasNome.filter(p => descUpper.includes(p)).length;
                                    if (matchCount >= 2) return conta;
                                }
                            }
                        }

                        // Critério 3: Match cruzado com lançamentos já importados em outras contas
                        // Se existe um lançamento transferencia_interna em outra conta, mesma data, mesmo valor → contrapartida
                        if (data.lancamentos && data.lancamentos.length > 0) {
                            const valorAbs = Math.abs(valor);
                            const lancMatch = data.lancamentos.find(l =>
                                l.tipo === 'transferencia_interna' &&
                                l.conta_origem !== cartaoSelecionado &&
                                l.data === dataStr &&
                                Math.abs(Math.abs(Number(l.valor)) - valorAbs) < 0.01
                            );
                            if (lancMatch) {
                                const contaOrigem = outrasContas.find(c => c.id === lancMatch.conta_origem);
                                if (contaOrigem) return contaOrigem;
                            }
                        }

                        return null;
                    })();
                    const ehAutoTransferencia = contaTransfDetectada !== null;

                    if (padroesResgate.some(p => descUpper.includes(p)) || ehResgateSozinho) {
                        tipo = 'transferencia_interna';
                        investimentoInfo = { tipoMovimento: 'Resgate', subtipo: 'resgate_investimento' };
                    } else if (padroesAporte.some(p => descUpper.includes(p))) {
                        tipo = 'transferencia_interna';
                        investimentoInfo = { tipoMovimento: 'Aporte', subtipo: 'aporte_investimento' };
                    } else if (padroesRendimento.some(p => descUpper.includes(p))) {
                        tipo = 'transferencia_interna';
                        investimentoInfo = { tipoMovimento: 'Rendimento', subtipo: 'rendimento_investimento' };
                    } else if (ehPgtoFatura) {
                        tipo = 'transferencia_interna';
                        investimentoInfo = { tipoMovimento: 'Pgto Fatura', subtipo: 'fatura_cartao' };
                    } else if (ehAutoTransferencia) {
                        tipo = 'transferencia_interna';
                        investimentoInfo = null; // conta detectada vai em contaTransfDetectada
                    } else if (ehCartao || isItauCartao) {
                        tipo = valNum < 0 ? 'estorno' : 'despesa';
                    } else {
                        tipo = valNum > 0 ? 'receita' : 'despesa';
                    }

                    // Detectar parcela (padrão XX/YY na descrição, ex: "05/10", "03/03")
                    let parcelaNum = null, parcelaTotal = null;
                    const parcelaMatch = descricao.match(/(\d{2})\/(\d{2})\s*$/);
                    if (parcelaMatch) {
                        const pNum = parseInt(parcelaMatch[1]);
                        const pTot = parseInt(parcelaMatch[2]);
                        if (pTot >= 2 && pNum >= 1 && pNum <= pTot) {
                            parcelaNum = pNum;
                            parcelaTotal = pTot;
                        }
                    }

                    linhas.push({
                        data: dataStr,
                        descricao: descricao,
                        valor: valor,
                        tipo: tipo,
                        investimentoInfo: investimentoInfo,
                        contaTransfDetectada: contaTransfDetectada || null,
                        identificador: (colIdentificador >= 0 && cols[colIdentificador]) ? cols[colIdentificador] : null,
                        parcelaNum,
                        parcelaTotal,
                    });
                }

                if (linhas.length === 0) {
                    setResultado({ tipo: 'erro', msg: 'Nenhum lançamento encontrado no arquivo.' });
                    return;
                }

                // Para Itaú CSV: tentar detectar competência (mês da fatura) a partir do cartão e datas
                let dataVencimentoFatura = '';
                if (isItauCartao && linhas.length > 0) {
                    const contaSel = data.contas.find(c => c.id === cartaoSelecionado);
                    const diaVenc = parseInt(contaSel?.dia_vencimento) || 0;
                    const diaFech = parseInt(contaSel?.dia_fechamento) || 0;

                    // PRIORIDADE 1: Extrair data do nome do arquivo (mais confiável)
                    // Padrão "fatura-YYYYMMDD" (ex: "fatura-20260309 - março.csv")
                    const matchDataNome = nomeArquivo.match(/(\d{4})(\d{2})(\d{2})/);
                    if (matchDataNome) {
                        dataVencimentoFatura = `${matchDataNome[1]}-${matchDataNome[2]}-${matchDataNome[3]}`;
                    }
                    // Padrão "Março 2026", "Abril 2026", etc.
                    if (!dataVencimentoFatura) {
                        const mesesPt = { 'janeiro':1,'fevereiro':2,'março':3,'marco':3,'abril':4,'maio':5,'junho':6,
                            'julho':7,'agosto':8,'setembro':9,'outubro':10,'novembro':11,'dezembro':12 };
                        const matchMes = nomeArquivo.toLowerCase().match(/(janeiro|fevereiro|março|marco|abril|maio|junho|julho|agosto|setembro|outubro|novembro|dezembro)\s*(\d{4})/);
                        if (matchMes) {
                            const mesNum = mesesPt[matchMes[1]];
                            const anoNum = parseInt(matchMes[2]);
                            dataVencimentoFatura = `${anoNum}-${String(mesNum).padStart(2,'0')}-${String(diaVenc || 1).padStart(2,'0')}`;
                        }
                    }

                    // PRIORIDADE 2 (fallback): Calcular a partir das datas de compra + ciclo do cartão
                    if (!dataVencimentoFatura && diaFech > 0) {
                        const datasCompras = linhas.filter(l => l.tipo === 'despesa').map(l => l.data).filter(Boolean).sort();
                        const dataRecente = datasCompras[datasCompras.length - 1] || '';
                        if (dataRecente) {
                            const [ay, am, ad] = dataRecente.split('-').map(Number);
                            let compMes, compAno;
                            if (ad >= diaFech) {
                                compMes = am + 1;
                                compAno = ay;
                                if (compMes > 12) { compMes = 1; compAno++; }
                            } else {
                                compMes = am;
                                compAno = ay;
                            }
                            dataVencimentoFatura = `${compAno}-${String(compMes).padStart(2,'0')}-${String(diaVenc || 1).padStart(2,'0')}`;
                        }
                    }
                }

                setPreview({ linhas, nomeArquivo, dataVencimentoFatura, formato });
                // Carregar saldos existentes para detectar duplicatas na vinculação
                api.get('saldos_historico').then(s => setSaldosReservas(s || [])).catch(() => {});
                setResultado({ tipo: 'ok', msg: `Formato detectado: ${formato}. ${linhas.length} lançamentos encontrados.` });
            };

            // Parser XLSX para faturas Porto Seguro
            // Formato: abas "nacional" e "internacional"
            // Linha 1: cabeçalho [vazio, vazio, Crédito, Débito, Total, Cartão]
            // Blocos por cartão: linha do titular (nome + final cartão na col F)
            // Transações: [DD/MM, descrição, crédito_ou_espaço, débito_ou_espaço, -, -]
            // Linha TOTAL: [TOTAL, -, crédito_total, débito_total, total_líquido, -]
            const parsearXLSXPortoSeguro = (workbook, nomeArquivo) => {
                // Extrair data de vencimento do nome do arquivo: "Fatura_Porto_Seguro_2026-04-02.xlsx"
                const matchData = nomeArquivo.match(/(\d{4})-(\d{2})-(\d{2})/);
                const dataVencimentoFatura = matchData ? `${matchData[1]}-${matchData[2]}-${matchData[3]}` : '';
                const anoVenc = matchData ? parseInt(matchData[1]) : new Date().getFullYear();
                const mesVenc = matchData ? parseInt(matchData[2]) : new Date().getMonth() + 1;
                const diaVenc = matchData ? parseInt(matchData[3]) : 28;

                const linhas = [];

                // Processar abas "nacional" e "internacional"
                for (const sheetName of workbook.SheetNames) {
                    const sheet = workbook.Sheets[sheetName];
                    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                    if (rows.length < 2) continue;

                    let cartaoAtual = '';

                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        const colA = String(row[0] || '').trim();
                        const colB = String(row[1] || '').trim();
                        const colC = String(row[2] || '').trim(); // Crédito
                        const colD = String(row[3] || '').trim(); // Débito
                        const colF = String(row[5] || '').trim(); // Cartão (final)

                        // Detectar linha de titular (tem número do cartão na col F)
                        if (colF && /^\d{4}$/.test(colF)) {
                            cartaoAtual = colF;
                            continue;
                        }

                        // Pular linhas TOTAL
                        if (colA.toUpperCase() === 'TOTAL') continue;

                        // Pular linhas sem data ou sem descrição
                        if (!colA || !colB) continue;

                        // Verificar se col A é data DD/MM
                        const matchDate = colA.match(/^(\d{2})\/(\d{2})$/);
                        if (!matchDate) continue;

                        const dia = parseInt(matchDate[1]);
                        const mes = parseInt(matchDate[2]);

                        // Inferir ano: transação deve ser ANTES do vencimento
                        let ano = anoVenc;
                        const candidata = new Date(anoVenc, mes - 1, dia);
                        const vencDate = new Date(anoVenc, mesVenc - 1, diaVenc);
                        if (candidata > vencDate) {
                            ano = anoVenc - 1;
                        }

                        const dataStr = `${ano}-${String(mes).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;

                        // Determinar se é crédito ou débito
                        const credito = colC.trim() ? normalizarValor(colC) : 0;
                        const debito = colD.trim() ? normalizarValor(colD) : 0;

                        // Filtrar PAGAMENTO (pagamento da fatura anterior)
                        const descUpper = colB.toUpperCase();
                        if (descUpper.includes('PAGAMENTO')) continue;

                        let valor, tipo;
                        if (debito > 0) {
                            valor = debito;
                            tipo = 'despesa';
                        } else if (credito > 0) {
                            valor = credito;
                            tipo = 'estorno';
                        } else {
                            continue;
                        }

                        // Detectar parcela (padrão XX/YY na descrição)
                        let parcelaNum = null, parcelaTotal = null;
                        const parcelaMatchPS = colB.match(/(\d{2})\/(\d{2})\s*$/);
                        if (parcelaMatchPS) {
                            const pN = parseInt(parcelaMatchPS[1]);
                            const pT = parseInt(parcelaMatchPS[2]);
                            if (pT >= 2 && pN >= 1 && pN <= pT) {
                                parcelaNum = pN;
                                parcelaTotal = pT;
                            }
                        }

                        linhas.push({
                            data: dataStr,
                            descricao: colB,
                            valor: valor,
                            tipo: tipo,
                            cartaoFinal: cartaoAtual,
                            parcelaNum,
                            parcelaTotal,
                        });
                    }
                }

                if (linhas.length === 0) {
                    setResultado({ tipo: 'erro', msg: 'Nenhum lançamento encontrado na fatura Porto Seguro.' });
                    return;
                }

                setPreview({ linhas, nomeArquivo, dataVencimentoFatura, formato: 'Porto Seguro (XLSX)' });
                api.get('saldos_historico').then(s => setSaldosReservas(s || [])).catch(() => {});
                setResultado({ tipo: 'ok', msg: `🏦 Porto Seguro: ${linhas.length} lançamentos encontrados.` });
            };

            // Parser XLSX (Banco do Brasil e outros)
            const parsearXLSX = (arrayBuffer, nomeArquivo) => {
                if (typeof XLSX === 'undefined') {
                    setResultado({ tipo: 'erro', msg: 'Biblioteca SheetJS não carregou. Verifique sua conexão.' });
                    return;
                }
                try {
                    const workbook = XLSX.read(arrayBuffer, { type: 'array', cellDates: true });

                    // ======== Detectar formato Porto Seguro ========
                    // Porto Seguro XLSX tem abas "nacional" e "internacional"
                    // Cabeçalho: [vazio, vazio, "Crédito", "Débito", "Total", "Cartão"]
                    const hasNacional = workbook.SheetNames.some(s => s.toLowerCase() === 'nacional');
                    if (hasNacional) {
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const headerRow = XLSX.utils.sheet_to_json(firstSheet, { header: 1, range: 0 })[0] || [];
                        const headerLower = headerRow.map(h => String(h || '').toLowerCase());
                        const isPortoSeguro = headerLower.some(h => h.includes('crédito') || h.includes('credito')) &&
                                              headerLower.some(h => h.includes('débito') || h.includes('debito'));
                        if (isPortoSeguro) {
                            return parsearXLSXPortoSeguro(workbook, nomeArquivo);
                        }
                    }

                    // ======== Detectar formato Mercado Pago ========
                    // Mercado Pago XLSX: linha 1 = resumo (INITIAL_BALANCE, CREDITS...), linha 4 = headers reais
                    // Headers: RELEASE_DATE, TRANSACTION_TYPE, REFERENCE_ID, TRANSACTION_NET_AMOUNT, PARTIAL_BALANCE
                    const sheetName = workbook.SheetNames[0];
                    const sheet = workbook.Sheets[sheetName];
                    const rawRows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

                    // Procurar linha de cabeçalho do Mercado Pago
                    // Detecção 1: procurar RELEASE_DATE nas primeiras 10 linhas
                    // Detecção 2: primeira linha com INITIAL_BALANCE (resumo MP) → header está mais abaixo
                    let mpHeaderIdx = -1;
                    let isMPResumo = false;
                    console.log('[XLSX] rawRows (primeiras 6):', rawRows.slice(0, 6).map(r => (r || []).map(c => String(c ?? '')).join(' | ')));
                    for (let r = 0; r < Math.min(rawRows.length, 10); r++) {
                        const row = (rawRows[r] || []).map(c => String(c == null ? '' : c).toLowerCase().trim());
                        if (row.some(c => c.includes('release_date')) && row.some(c => c.includes('transaction'))) {
                            mpHeaderIdx = r;
                            break;
                        }
                        if (r === 0 && row.some(c => c.includes('initial_balance'))) {
                            isMPResumo = true;
                        }
                    }
                    // Se detectou resumo MP mas não achou header, procurar pela primeira linha com data DD-MM-YYYY
                    if (mpHeaderIdx < 0 && isMPResumo) {
                        for (let r = 1; r < Math.min(rawRows.length, 10); r++) {
                            const row = (rawRows[r] || []).map(c => String(c == null ? '' : c).toLowerCase().trim());
                            if (row.some(c => c.includes('release_date') || c.includes('transaction'))) {
                                mpHeaderIdx = r;
                                break;
                            }
                            // Se tem uma linha com DD-MM-YYYY, o header é a linha anterior
                            const firstCell = String((rawRows[r] || [])[0] || '');
                            if (/^\d{2}-\d{2}-\d{4}$/.test(firstCell.trim())) {
                                mpHeaderIdx = r - 1;
                                break;
                            }
                        }
                    }

                    if (mpHeaderIdx >= 0 || isMPResumo) {
                        // ======== Parser Mercado Pago XLSX ========
                        // Tentar mapear colunas pelo nome dos headers
                        const headerRow = mpHeaderIdx >= 0 ? rawRows[mpHeaderIdx] : [];
                        const mpHeaders = (headerRow || []).map(c => String(c == null ? '' : c).toLowerCase().trim());
                        console.log('[XLSX MP] mpHeaderIdx:', mpHeaderIdx, 'isMPResumo:', isMPResumo, 'headers:', mpHeaders);
                        let colData = mpHeaders.findIndex(h => h.includes('release_date'));
                        let colDesc = mpHeaders.findIndex(h => h.includes('transaction_type'));
                        let colId = mpHeaders.findIndex(h => h.includes('reference_id'));
                        let colVal = mpHeaders.findIndex(h => h.includes('transaction_net_amount') || h.includes('net_amount'));

                        // Fallback: posição fixa do formato padrão MP (RELEASE_DATE=0, TRANSACTION_TYPE=1, REFERENCE_ID=2, AMOUNT=3)
                        if (colData < 0) colData = 0;
                        if (colDesc < 0) colDesc = 1;
                        if (colId < 0) colId = 2;
                        if (colVal < 0) colVal = 3;

                        // Determinar primeira linha de dados: pular header e linhas vazias/resumo
                        let startRow = (mpHeaderIdx >= 0 ? mpHeaderIdx + 1 : 1);
                        // Avançar até achar uma linha com data DD-MM-YYYY na coluna 0
                        while (startRow < rawRows.length) {
                            const firstCell = String((rawRows[startRow] || [])[colData] || '').trim();
                            if (/^\d{2}-\d{2}-\d{4}$/.test(firstCell)) break;
                            startRow++;
                        }
                        console.log('[XLSX MP] startRow:', startRow, 'totalRows:', rawRows.length);

                        const linhas = [];
                        for (let r = startRow; r < rawRows.length; r++) {
                            const row = rawRows[r];
                            if (!row || row.length < 2) continue;

                            const dataRaw = String(row[colData] || '').trim();
                            if (!dataRaw) continue;
                            const dataStr = normalizarData(dataRaw);

                            const rawVal = row[colVal];
                            const valNum = typeof rawVal === 'number' ? rawVal : normalizarValor(String(rawVal));
                            const valor = Math.abs(valNum);
                            if (valor === 0 || isNaN(valor)) continue;

                            const descricao = colDesc >= 0 ? String(row[colDesc] || '').trim() : '';
                            const identificador = colId >= 0 ? String(row[colId] || '').trim() : null;

                            // Detectar tipo e movimentos de investimento (Porquinho = CDI Mercado Pago)
                            let tipo;
                            let investimentoInfo = null;
                            const descUpper = descricao.toUpperCase();

                            // Porquinho/CDI: resgate vem como crédito, aporte como débito
                            const ehResgatePorquinho = descUpper.includes('DINHEIRO RETIRADO PORQUINHO') || descUpper.includes('RESGATE PORQUINHO') || descUpper.includes('RESGATE CDB');
                            const ehAportePorquinho = descUpper.includes('DINHEIRO GUARDADO PORQUINHO') || descUpper.includes('GUARDADO PORQUINHO') || descUpper.includes('APLICACAO CDB') || descUpper.includes('APLICAÇÃO CDB');
                            const ehRendimento = descUpper.includes('RENDIMENTO') && (descUpper.includes('CDB') || descUpper.includes('CDI') || descUpper.includes('PORQUINHO'));

                            // Detecção de transferências entre contas (co-titulares + PIX)
                            let contaTransfDetectada = null;
                            if (!ehResgatePorquinho && !ehAportePorquinho && !ehRendimento) {
                                if (descUpper.includes('TRANSFER') || descUpper.includes('PIX ENVIADO') || descUpper.includes('PIX RECEBIDO')) {
                                    const outrasContas = data.contas.filter(c => c.id !== cartaoSelecionado && c.status !== 'arquivada');
                                    const contasComNomes = outrasContas.map(conta => {
                                        const nomes = [];
                                        if (conta.titular) nomes.push(conta.titular.toUpperCase().trim());
                                        if (conta.co_titulares) {
                                            conta.co_titulares.split(',').forEach(n => {
                                                const nome = n.trim().toUpperCase();
                                                if (nome.length > 3) nomes.push(nome);
                                            });
                                        }
                                        return { conta, nomes };
                                    });
                                    const contaAtual = data.contas.find(c => c.id === cartaoSelecionado);
                                    const nomesContaAtual = [];
                                    if (contaAtual?.titular) nomesContaAtual.push(contaAtual.titular.toUpperCase().trim());
                                    if (contaAtual?.co_titulares) {
                                        contaAtual.co_titulares.split(',').forEach(n => {
                                            const nome = n.trim().toUpperCase();
                                            if (nome.length > 3) nomesContaAtual.push(nome);
                                        });
                                    }

                                    const matchNome = descricao.match(/Transfer[eê]ncia\s+(?:enviada|recebida)\s+(?:pelo Pix\s*-\s*)?(.+?)(?:\s*-\s*[•\d])/i)
                                        || descricao.match(/Transfer[eê]ncia\s+Recebida\s*-\s*(.+?)(?:\s*-\s*[•\d])/i)
                                        || descricao.match(/Pix\s+(?:enviado|recebido)\s+(.+?)(?:\s*-\s*[•\d])/i)
                                        || descricao.match(/Pix\s+(?:enviado|recebido)\s+(.+)$/i);
                                    let nomeExtraido = false;
                                    if (matchNome) {
                                        nomeExtraido = true;
                                        const nomePix = matchNome[1].trim().toUpperCase();
                                        const palavrasNome = nomePix.split(/\s+/).filter(p => p.length > 2);
                                        const matchaConta = (nomesList) => {
                                            for (const nomeRef of nomesList) {
                                                const palavrasRef = nomeRef.split(/\s+/).filter(p => p.length > 2);
                                                const matchCount = palavrasRef.filter(p => palavrasNome.includes(p)).length;
                                                const minPalavras = Math.min(palavrasRef.length, palavrasNome.length);
                                                const threshold = Math.max(2, Math.ceil(minPalavras * 0.7));
                                                if (matchCount >= threshold) return true;
                                            }
                                            return false;
                                        };
                                        const ehFamilia = matchaConta(nomesContaAtual) || contasComNomes.some(cn => matchaConta(cn.nomes));
                                        if (ehFamilia) {
                                            for (const { conta, nomes } of contasComNomes) {
                                                if (matchaConta(nomes) || matchaConta(nomesContaAtual)) {
                                                    const inst = (conta.instituicao || '').toUpperCase().trim();
                                                    if (inst.length >= 4 && descUpper.includes(inst)) { contaTransfDetectada = conta; break; }
                                                }
                                            }
                                            if (!contaTransfDetectada) {
                                                for (const { conta, nomes } of contasComNomes) {
                                                    if (matchaConta(nomes) || matchaConta(nomesContaAtual)) { contaTransfDetectada = conta; break; }
                                                }
                                            }
                                        }
                                    }
                                    if (!nomeExtraido && !contaTransfDetectada) {
                                        for (const conta of outrasContas) {
                                            const inst = (conta.instituicao || '').toUpperCase().trim();
                                            if (inst.length >= 4 && descUpper.includes(inst)) { contaTransfDetectada = conta; break; }
                                        }
                                    }
                                    // Critério 3: Match cruzado com lançamentos já importados
                                    if (!contaTransfDetectada && data.lancamentos && data.lancamentos.length > 0) {
                                        const outrasContas2 = data.contas.filter(c => c.id !== cartaoSelecionado && c.status !== 'arquivada');
                                        const lancMatch = data.lancamentos.find(l =>
                                            l.tipo === 'transferencia_interna' &&
                                            l.conta_origem !== cartaoSelecionado &&
                                            l.data === dataStr &&
                                            Math.abs(Math.abs(Number(l.valor)) - valor) / Math.max(valor, 0.01) < 0.02
                                        );
                                        if (lancMatch) {
                                            contaTransfDetectada = outrasContas2.find(c => c.id === lancMatch.conta_origem) || null;
                                        }
                                    }
                                }
                            }

                            if (ehResgatePorquinho) {
                                tipo = 'transferencia_interna';
                                investimentoInfo = { tipoMovimento: 'Resgate', subtipo: 'resgate_investimento' };
                            } else if (ehAportePorquinho) {
                                tipo = 'transferencia_interna';
                                investimentoInfo = { tipoMovimento: 'Aporte', subtipo: 'aporte_investimento' };
                            } else if (ehRendimento) {
                                tipo = 'transferencia_interna';
                                investimentoInfo = { tipoMovimento: 'Rendimento', subtipo: 'rendimento_investimento' };
                            } else if (contaTransfDetectada) {
                                tipo = 'transferencia_interna';
                            } else {
                                tipo = valNum > 0 ? 'receita' : 'despesa';
                            }

                            linhas.push({
                                data: dataStr,
                                descricao: descricao || 'Movimentação Mercado Pago',
                                valor: valor,
                                tipo: tipo,
                                investimentoInfo: investimentoInfo,
                                contaTransfDetectada: contaTransfDetectada || null,
                                identificador: identificador,
                            });
                        }

                        if (linhas.length === 0) {
                            setResultado({ tipo: 'erro', msg: 'Nenhum lançamento encontrado no XLSX do Mercado Pago.' });
                            return;
                        }

                        setPreview({ linhas, nomeArquivo, formato: 'Mercado Pago Extrato' });
                        api.get('saldos_historico').then(s => setSaldosReservas(s || [])).catch(() => {});
                        setResultado({ tipo: 'ok', msg: `Formato detectado: Mercado Pago Extrato (XLSX). ${linhas.length} lançamentos encontrados.` });
                        return;
                    }

                    // ======== Formato genérico / Banco do Brasil ========
                    const jsonData = XLSX.utils.sheet_to_json(sheet, { defval: '' });

                    if (jsonData.length === 0) {
                        setResultado({ tipo: 'erro', msg: 'Planilha vazia ou sem dados na primeira aba.' });
                        return;
                    }

                    const keys = Object.keys(jsonData[0]);
                    const findCol = (patterns) => keys.find(k => patterns.some(p => k.toLowerCase().includes(p)));

                    // Detectar formato BB: "Data", "Lançamento", "Detalhes", "Valor", "Tipo Lançamento"
                    const colData = findCol(['data', 'date']);
                    const colLanc = findCol(['lançamento', 'lancamento', 'histórico', 'historico']);
                    const colDet = findCol(['detalhe', 'descri', 'title']);
                    const colVal = findCol(['valor', 'amount', 'quantia']);
                    const colTipo = findCol(['tipo lançamento', 'tipo lancamento', 'tipo']);
                    const isBB = !!colLanc && !!colDet && !!colTipo;

                    if (!colVal) {
                        setResultado({ tipo: 'erro', msg: `Coluna de valor não encontrada. Colunas: ${keys.join(', ')}` });
                        return;
                    }

                    const linhas = [];
                    for (const row of jsonData) {
                        // Ignorar data inválida (00/00/0000 = saldo diário no BB)
                        const dataRaw = colData ? String(row[colData] || '') : '';
                        if (dataRaw.includes('00/00') || dataRaw === '00/00/0000') continue;

                        const rawVal = row[colVal];
                        const valNum = typeof rawVal === 'number' ? rawVal : normalizarValor(String(rawVal));
                        const valor = Math.abs(valNum);
                        if (valor === 0 || isNaN(valor)) continue;

                        let dataStr = '';
                        if (colData) {
                            const raw = row[colData];
                            if (raw instanceof Date) dataStr = raw.toISOString().slice(0, 10);
                            else dataStr = normalizarData(String(raw));
                        }

                        // Montar descrição: Lançamento + Detalhes (formato BB)
                        let descricao = '';
                        if (isBB) {
                            const lanc = String(row[colLanc] || '').trim();
                            const det = String(row[colDet] || '').trim();
                            descricao = det ? `${lanc} - ${det}` : lanc;
                        } else {
                            descricao = String(row[colLanc || colDet || keys[1]] || '');
                        }

                        // Filtrar linhas de saldo
                        const descLower = descricao.toLowerCase();
                        if (descLower.includes('saldo anterior') || descLower.includes('s a l d o') || descLower.includes('saldo do dia')) continue;

                        // Tipo: usar coluna "Tipo Lançamento" do BB se disponível
                        let tipo;
                        if (colTipo) {
                            const tipoRaw = String(row[colTipo] || '').toLowerCase().trim();
                            tipo = tipoRaw === 'entrada' ? 'receita' : tipoRaw === 'saída' || tipoRaw === 'saida' ? 'despesa' : (valNum >= 0 ? 'receita' : 'despesa');
                        } else {
                            tipo = valNum >= 0 ? 'receita' : 'despesa';
                        }

                        // Detectar transferência entre contas próprias/família (PIX, TED, DOC)
                        const contaTransfDetectada = detectarContaTransferencia(descricao, valor, dataStr, cartaoSelecionado);
                        if (contaTransfDetectada) {
                            tipo = 'transferencia_interna';
                        }

                        linhas.push({
                            data: dataStr,
                            descricao: descricao,
                            valor: valor,
                            tipo: tipo,
                            contaTransfDetectada: contaTransfDetectada || null,
                        });
                    }

                    if (linhas.length === 0) {
                        setResultado({ tipo: 'erro', msg: 'Nenhum lançamento encontrado no XLSX.' });
                        return;
                    }

                    setPreview({ linhas, nomeArquivo, formato: 'Excel (XLSX)' });
                    api.get('saldos_historico').then(s => setSaldosReservas(s || [])).catch(() => {});
                    setResultado({ tipo: 'ok', msg: `${linhas.length} lançamentos encontrados no Excel.` });
                } catch (e) {
                    setResultado({ tipo: 'erro', msg: 'Erro ao ler XLSX: ' + e.message });
                }
            };

            // Parser de PDF (usa PDF.js para extrair texto)
            // Parser de PDF de fatura de cartão (Porto Bank, Nubank, etc.)
            // ========== Extração de texto colunar para PDFs Itaú ==========
            // Itaú usa layout 2 colunas: esquerda (transações) e direita (próximas faturas ou mais transações)
            // pdf.js retorna items com posição X,Y - separamos colunas pelo ponto médio da página
            const extrairTextoItauColumnar = async (pdf) => {
                const allLeft = [];
                const allRight = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const viewport = page.getViewport({ scale: 1 });
                    // Ponto de corte: 59% da largura (valores da coluna esquerda vão até ~57%, descrições da direita começam ~62%)
                    const midX = viewport.width * 0.59;

                    // Coletar items com posição (incluindo xMax para detecção de sinal negativo)
                    const items = content.items
                        .map(item => ({ x: item.transform[4], y: Math.round(item.transform[5]), text: item.str, xMax: item.transform[4] + (item.width || 0) }))
                        .filter(item => item.text.trim());

                    // Agrupar por Y (tolerância 3 unidades)
                    const yGroups = {};
                    items.forEach(item => {
                        const yKey = Math.round(item.y / 3) * 3;
                        if (!yGroups[yKey]) yGroups[yKey] = [];
                        yGroups[yKey].push(item);
                    });

                    // Ordenar Y decrescente (PDF: Y=0 é base, maior Y = topo da página)
                    const sortedYs = Object.keys(yGroups).map(Number).sort((a, b) => b - a);

                    // Helper: juntar items com detecção posicional de sinal negativo.
                    // Se um "-" isolado está próximo do valor (gap < 20px), é sinal negativo → merge com valor.
                    // Se está longe do valor (gap >= 20px), é parte da descrição → manter separado.
                    // Aceita variantes Unicode de traço: - (002D), − (2212), – (2013), — (2014)
                    const isDash = (ch) => /^[\-\u2212\u2013\u2014]$/.test(ch.trim());
                    const joinItems = (colItems) => {
                        if (!colItems.length) return null;
                        const parts = [];
                        let idx = 0;
                        while (idx < colItems.length) {
                            const it = colItems[idx];
                            if (isDash(it.text) && idx + 1 < colItems.length) {
                                const nextIt = colItems[idx + 1];
                                const gap = nextIt.x - it.xMax;
                                if (gap < 20) {
                                    // Sinal negativo: merge com próximo item (ex: "-" + "0,02" → "-0,02")
                                    parts.push('-' + nextIt.text);
                                    idx += 2;
                                    continue;
                                }
                            }
                            parts.push(it.text);
                            idx++;
                        }
                        return parts.join(' ').trim();
                    };

                    const leftLines = [];
                    const rightLines = [];

                    for (const yKey of sortedYs) {
                        const group = yGroups[yKey].sort((a, b) => a.x - b.x);
                        const leftItems = group.filter(it => it.x < midX);
                        const rightItems = group.filter(it => it.x >= midX);

                        const leftLine = joinItems(leftItems);
                        const rightLine = joinItems(rightItems);
                        if (leftLine) leftLines.push(leftLine);
                        if (rightLine) rightLines.push(rightLine);
                    }

                    // Acumular colunas SEPARADAMENTE (cada uma terá tracking de seção independente)
                    allLeft.push(...leftLines);
                    allRight.push(...rightLines);
                }
                // Retornar com marcador de separação de coluna para tracking independente
                return allLeft.join('\n') + '\n§COL_BREAK§\n' + allRight.join('\n');
            };

            // Mercado Pago PDF: bloqueia com orientação para usar XLSX
            const parsearPDFMercadoPago = async (pdf, nomeArquivo) => {
                setResultado({ tipo: 'erro', msg: '⚠️ O extrato do Mercado Pago em PDF não é suportado — a extração de dados do PDF é imprecisa. Use a versão XLSX (Excel) disponível na mesma tela de extrato do Mercado Pago.' });
            };

            const parsearPDF = async (arrayBuffer, nomeArquivo) => {
                if (typeof pdfjsLib === 'undefined') {
                    setResultado({ tipo: 'erro', msg: 'Biblioteca PDF.js não carregou. Verifique sua conexão.' });
                    return;
                }
                try {
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                    // Detecção rápida do banco: ler texto bruto das primeiras 2 páginas
                    let textoRapido = '';
                    for (let i = 1; i <= Math.min(pdf.numPages, 2); i++) {
                        const pg = await pdf.getPage(i);
                        const ct = await pg.getTextContent();
                        ct.items.forEach(item => { textoRapido += item.str + ' '; });
                    }

                    // Detectar banco: Itaú tem prioridade (pode conter "MERCADOPAGO" como estabelecimento)
                    const isItau = /itaú|itau|financeira\s*ita/i.test(textoRapido);

                    // Mercado Pago: extrato de conta (PDF com tabela Data/Descrição/ID/Valor/Saldo)
                    // Só considera MP se NÃO for Itaú (transações Itaú podem ter "MERCADOPAGO" como lojista)
                    const isMercadoPago = !isItau && /mercado\s*pago|EXTRATO DE CONTA/i.test(textoRapido);
                    if (isMercadoPago) {
                        return await parsearPDFMercadoPago(pdf, nomeArquivo);
                    }

                    // Extrair texto conforme o banco
                    let textoCompleto = '';
                    if (isItau) {
                        // Itaú: extração colunar (separa esquerda/direita)
                        textoCompleto = await extrairTextoItauColumnar(pdf);
                    } else {
                        // Porto Bank / genérico: extração linear por posição Y
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            let lastY = null;
                            let line = '';
                            content.items.forEach(item => {
                                const y = Math.round(item.transform[5]);
                                if (lastY !== null && Math.abs(y - lastY) > 3) {
                                    textoCompleto += line.trim() + '\n';
                                    line = '';
                                }
                                line += item.str + ' ';
                                lastY = y;
                            });
                            if (line.trim()) textoCompleto += line.trim() + '\n';
                        }
                    }

                    // 1. Capturar vencimento da fatura
                    let dataVencimentoFatura = '';
                    let mesVenc = 0, anoVenc = new Date().getFullYear();
                    // Itaú: "vencimento" + DD/MM/YYYY (com ou sem espaços)
                    let mVenc = textoCompleto.match(/[Vv]encimento[^0-9]*(\d{2}\/\d{2}\/\d{4})/);
                    if (!mVenc) {
                        // Porto Bank: "vence em DD/MM"
                        mVenc = textoCompleto.match(/vence\s*(?:em)?\s*(\d{2}\/\d{2}(?:\/\d{2,4})?)/i);
                    }
                    if (mVenc) {
                        let dv = mVenc[1];
                        if (dv.match(/^\d{2}\/\d{2}$/)) dv += '/' + anoVenc;
                        if (dv.match(/^\d{2}\/\d{2}\/\d{2}$/)) { const p=dv.split('/'); dv=p[0]+'/'+p[1]+'/20'+p[2]; }
                        if (dv.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
                            const [dd,mm,yy]=dv.split('/');
                            dataVencimentoFatura=`${yy}-${mm}-${dd}`;
                            mesVenc=parseInt(mm); anoVenc=parseInt(yy);
                        }
                    }

                    // 2. Inferir ano: se mês da compra > mês do vencimento → ano anterior
                    const inferirAno = (m) => (mesVenc > 0 && m > mesVenc) ? anoVenc - 1 : anoVenc;

                    // 3. Textos para ignorar (genérico + Itaú-específico)
                    const lixo = [
                        'pagamento mínimo','saldo anterior','saldo fatura','total da fatura',
                        'crédito rotativo','juros de mora','valor total',
                        'valor mínimo','próx. período','lançamentos no cartão',
                        'total de despesas','previsão de fechamento','limite total',
                        'limite de crédito','limite disponível','limite de saque',
                        'central de','ouvidoria','whatsapp','chat online',
                        'nome do beneficiário','cnpj','linha digitável',
                        'detalhamento','resumo da fatura','confira','acesse','consulte',
                        'parcelamento de','cet ','contestações','resolução','banco central',
                        'despesas no brasil','despesas no exterior','encargos financeiros',
                        'pagamento/créditos','saldo financiado','despesas/débitos',
                        'utilizado r$','disponível r$','nosso-número','espécie',
                        'rotativo','crediário','renegociação','taxa','multa de',
                        'processamento','opções de','canais de','beneficiário',
                        // Itaú-específico
                        'encargosde','total dos lançamentos',
                        'totaldoslançamentos','totaldoslancamentos',
                        'lançamentos no cartão','lançamentosnocartão',
                        'total para próximas','totalparapróximas',
                        'próxima fatura','próximafatura','demais faturas','demaisfaturas',
                    ];

                    // 4. Parsear linha por linha: DD/MM DESCRICAO VALOR
                    const linhas = [];
                    const allLines = textoCompleto.split('\n');
                    let skipProximasFaturas = false;

                    for (let idx = 0; idx < allLines.length; idx++) {
                        const line = allLines[idx].trim();
                        if (!line) continue;

                        // Itaú: marcador de troca de coluna → resetar tracking de seção
                        // (cada coluna tem seção "próximas faturas" independente)
                        if (isItau && line === '§COL_BREAK§') {
                            skipProximasFaturas = false;
                            continue;
                        }

                        // Itaú: controle de seção (pular "Compras parceladas - próximas faturas")
                        if (isItau) {
                            const lineClean = line.toLowerCase().replace(/\s+/g, '');
                            if (lineClean.includes('comprasparceladas') || lineClean.includes('próximasfaturas') || lineClean.includes('proximasfaturas')) {
                                skipProximasFaturas = true;
                                continue;
                            }
                            // Resetar ao encontrar nova seção de lançamentos
                            if ((lineClean.includes('lançamentos:') || lineClean.includes('lancamentos:')) && (lineClean.includes('compras') || lineClean.includes('produtos'))) {
                                skipProximasFaturas = false;
                                continue;
                            }
                            if (skipProximasFaturas) continue;
                        }

                        // Match: DD/MM + texto + valor (positivo ou negativo) no final
                        const m = line.match(/^(\d{2}\/\d{2})\s+(.+?)\s+(-?\d{1,3}(?:\.\d{3})*,\d{2})\s*$/);
                        if (!m) continue;

                        let [, dataDDMM, desc, valStr] = m;
                        let valNum = parseFloat(valStr.replace(/\./g, '').replace(',', '.'));

                        // Limpar traço solto no final da descrição (artefato do PDF, ex: "MILKY MOO MI-CT MOO -")
                        // Valores negativos reais são detectados posicionalmente na extração columnar:
                        // joinItems merge "-" próximo ao valor → "-0,02" capturado pelo regex com sinal
                        // Traço longe do valor (ex: MILKY MOO) fica na descrição e é apenas artefato visual
                        desc = desc.replace(/\s+[\-\u2212\u2013\u2014]\s*$/, '').trim();

                        const valor = Math.abs(valNum);
                        if (valor < 0.01) continue;

                        const descLower = desc.toLowerCase();
                        // Filtrar lixo e textos longos (boleto, dados jurídicos)
                        if (desc.length > 60) continue;
                        if (lixo.some(p => descLower.includes(p))) continue;
                        // Filtrar "PAGAMENTO" (pagamento da fatura anterior)
                        if (descLower === 'pagamento') continue;
                        if (descLower.includes('pagamento') && valNum < 0) continue;

                        // Inferir ano correto
                        const [dd, mm] = dataDDMM.split('/');
                        const ano = inferirAno(parseInt(mm));
                        const dataISO = `${ano}-${mm}-${dd}`;

                        // Itaú: capturar categoria da próxima linha (ex: "ALIMENTAÇÃO .CRICIUMA")
                        let categoriaItau = '';
                        if (isItau && idx + 1 < allLines.length) {
                            const nextLine = allLines[idx + 1].trim();
                            // Categoria: PALAVRA(S).Cidade (com ou sem espaços ao redor do ponto)
                            const catMatch = nextLine.match(/^([A-ZÁÉÍÓÚÀÂÊÔÃÕÇ\s]+)\s*\.\s*(.*)$/i);
                            if (catMatch && !nextLine.match(/^\d{2}\//)) {
                                categoriaItau = catMatch[1].trim();
                            }
                        }

                        // Detectar parcela (padrão XX/YY na descrição)
                        let parcelaNum = null, parcelaTotal = null;
                        const parcelaMatchPDF = desc.match(/(\d{2})\/(\d{2})\s*$/);
                        if (parcelaMatchPDF) {
                            const pN = parseInt(parcelaMatchPDF[1]);
                            const pT = parseInt(parcelaMatchPDF[2]);
                            if (pT >= 2 && pN >= 1 && pN <= pT) {
                                parcelaNum = pN;
                                parcelaTotal = pT;
