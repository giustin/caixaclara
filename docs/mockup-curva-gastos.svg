    <linearGradient id="green-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="red-fill" x1="0" y1="0" x2="0" y2="1">
